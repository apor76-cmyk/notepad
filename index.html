<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Link Manager</title>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mammoth@1.6.0/mammoth.browser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f0f2f5;
  --surface:#f8f9fb;
  --card:#ffffff;
  --card2:#f4f5f8;
  --text:#1a1d23;
  --text2:#3d4148;
  --sub:#8b909a;
  --border:#e2e5ea;
  --accent:#3a5bd9;
  --accent-light:#eef1fc;
  --accent2:#22c55e;
  --ok:#16a34a;
  --ok-light:#dcfce7;
  --no:#dc2626;
  --no-light:#fee2e2;
  --star:#f59e0b;
  --pomo:#e55353;
  --pomo-light:#fde8e0;
  --radius:14px;
  --shadow:0 2px 12px rgba(0,0,0,0.06);
  --shadow-md:0 4px 18px rgba(0,0,0,0.09);
  --shadow-hover:0 6px 24px rgba(0,0,0,0.12);
}
.dark{
  --bg:#13151a;
  --surface:#1c1f26;
  --card:#222630;
  --card2:#292d38;
  --text:#e8eaf0;
  --text2:#b0b5c0;
  --sub:#636875;
  --border:#2e3240;
  --accent:#5b7af5;
  --accent-light:#1e2340;
  --accent2:#4ade80;
  --ok:#4ade80;
  --ok-light:#14291e;
  --no:#f87171;
  --no-light:#2a1515;
  --pomo:#f87171;
  --pomo-light:#2a1515;
  --shadow:0 2px 12px rgba(0,0,0,0.3);
  --shadow-md:0 4px 18px rgba(0,0,0,0.4);
  --shadow-hover:0 6px 24px rgba(0,0,0,0.5);
}

*{ box-sizing:border-box; }
body{
  margin:0;
  font-family:'DM Sans', -apple-system, sans-serif;
  background:var(--bg);
  color:var(--text);
  font-size:14px;
  line-height:1.5;
}

/* ── Header ── */
header{
  padding:10px 20px;
  background:var(--card);
  border-bottom:1px solid var(--border);
  display:flex;
  gap:6px;
  flex-wrap:wrap;
  align-items:center;
  position:sticky;
  top:38px;
  z-index:100;
  box-shadow:0 1px 0 var(--border);
}

/* ── Buttons ── */
button{
  padding:6px 13px;
  border-radius:8px;
  border:1px solid var(--border);
  background:var(--card2);
  cursor:pointer;
  font-size:12.5px;
  font-family:inherit;
  color:var(--text2);
  font-weight:500;
  transition:all 0.15s;
  white-space:nowrap;
}
button:hover{
  border-color:var(--accent);
  color:var(--accent);
  background:var(--accent-light);
}
.dark button{ color:var(--text2); background:var(--card2); }
.dark button:hover{ color:var(--accent); background:var(--accent-light); }
.primary{
  background:var(--accent);
  color:#fff !important;
  border:none;
  font-weight:600;
}
.primary:hover{
  background:#2d4bc4;
  color:#fff !important;
  border:none;
}

/* ── Layout ── */
.container{
  max-width:1440px;
  margin:0 auto;
  padding:20px 24px;
  padding-top:20px;
  display:flex;
  flex-direction:column;
  gap:14px;
}

/* ── Cards / Panels ── */
.card{
  background:var(--card);
  padding:16px 20px;
  border-radius:var(--radius);
  border:1px solid var(--border);
  box-shadow:var(--shadow);
}

/* ── Form inputs ── */
input, select, textarea{
  padding:8px 12px;
  border-radius:8px;
  border:1px solid var(--border);
  background:var(--surface);
  color:var(--text);
  font-family:inherit;
  font-size:13px;
  transition:border-color 0.15s;
  outline:none;
}
input:focus, select:focus, textarea:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px var(--accent-light);
}
textarea{ width:100%; min-height:100px; resize:vertical; }

/* ── Category bar ── */
.category-bar{ display:flex; gap:7px; flex-wrap:wrap; align-items:center; }
.category-btn{
  padding:6px 15px;
  border-radius:999px;
  font-size:12.5px;
  font-weight:500;
  transition:all 0.15s;
}
.category-btn.active{
  background:var(--accent);
  color:#fff;
  border:none;
  box-shadow:0 2px 8px rgba(58,91,217,0.25);
}
.category-btn.active:hover{ background:var(--accent); color:#fff; }

/* ── Group bar ── */
.group-bar{ display:flex; gap:7px; flex-wrap:wrap; align-items:center; }
.group-btn{ padding:6px 14px; border-radius:999px; font-size:12.5px; font-weight:600; }
.group-btn.active{ background:var(--accent); color:#fff; border:none; }
.dark .group-btn.active{ background:var(--accent); }
.cat-group-tag{
  font-size:11px; padding:2px 8px; border-radius:999px;
  background:var(--accent-light); color:var(--accent);
  margin-left:4px; cursor:pointer;
}

/* ── Section heading ── */
.section-title{
  font-size:12px;
  font-weight:600;
  color:var(--sub);
  text-transform:uppercase;
  letter-spacing:0.06em;
  margin:0 0 12px 0;
}

/* ══════════════════════════════════
   BENTO GRID — 저장된 카드들
══════════════════════════════════ */
.link-list{
  display:grid;
  gap:10px;
  grid-template-columns:repeat(var(--cols,5), 1fr);
}

/* 카드: 1:1 비율, 배툭판 스타일 */
.link-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
  display:flex;
  flex-direction:column;
  position:relative;
  aspect-ratio:1/1;
  min-height:0;
  transition:transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
  box-shadow:var(--shadow);
}
.link-card:hover{
  transform:translateY(-3px) scale(1.015);
  box-shadow:var(--shadow-hover);
  border-color:var(--accent);
  z-index:2;
}
.link-card.favorite{ order:-1; }

/* 썸네일 영역 */
.thumb{
  width:100%;
  flex:1;
  min-height:0;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  background:var(--card2);
}
.thumb img{ width:100%; height:100%; object-fit:cover; display:block; }

/* 카드 하단 레이블 */
.link-body{
  padding:5px 8px;
  flex:0 0 auto;
  display:flex;
  align-items:center;
  gap:5px;
  min-height:36px;
  background:var(--card);
  border-top:1px solid var(--border);
}
.link-title{
  font-size:11.5px;
  font-weight:600;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  flex:1;
  min-width:0;
  color:var(--text);
}
.title-youtube{ color:var(--accent) !important; }
.title-link{ color:#e25252 !important; }
.title-photo{ color:#16a34a !important; }
.title-text{ color:#7c3aed !important; }
.title-file{ color:#d97706 !important; }
.dark .title-youtube{ color:var(--accent) !important; }
.dark .title-link{ color:#f87171 !important; }
.dark .title-photo{ color:#4ade80 !important; }
.dark .title-text{ color:#a78bfa !important; }
.dark .title-file{ color:#fbbf24 !important; }

/* ── 파일 미리보기 모달 ── */
#filePreviewModal{
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.82);
  justify-content:center;
  align-items:center;
  z-index:99990;
  backdrop-filter:blur(6px);
}
#filePreviewModal.show{ display:flex; }
.file-preview-box{
  background:var(--card);
  color:var(--text);
  border-radius:18px;
  box-shadow:0 24px 64px rgba(0,0,0,0.4);
  display:flex;
  flex-direction:column;
  width:90vw;
  max-width:1000px;
  height:88vh;
  overflow:hidden;
}
.file-preview-header{
  display:flex;
  align-items:center;
  gap:10px;
  padding:12px 16px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.file-preview-title{
  font-size:14px;
  font-weight:700;
  flex:1;
  min-width:0;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.file-preview-body{
  flex:1;
  min-height:0;
  overflow:auto;
  padding:16px 20px;
  font-size:13.5px;
  line-height:1.7;
}
.file-preview-body iframe{
  width:100%;
  height:100%;
  border:none;
  border-radius:6px;
}
/* xlsx 테이블 스타일 */
.xlsx-sheet-tabs{
  display:flex;
  gap:4px;
  flex-wrap:wrap;
  padding:8px 16px;
  border-bottom:1px solid var(--border);
  background:var(--surface);
  flex-shrink:0;
}
.xlsx-tab{
  padding:4px 14px;
  border-radius:6px;
  font-size:12px;
  font-weight:600;
  cursor:pointer;
  border:1px solid var(--border);
  background:var(--card2);
  color:var(--text2);
  transition:all 0.12s;
}
.xlsx-tab.active{
  background:var(--accent);
  color:#fff;
  border-color:var(--accent);
}
.xlsx-table-wrap{
  overflow:auto;
  height:100%;
}
.xlsx-table-wrap table{
  border-collapse:collapse;
  font-size:12.5px;
  white-space:nowrap;
}
.xlsx-table-wrap th{
  background:var(--card2);
  padding:5px 10px;
  border:1px solid var(--border);
  font-weight:600;
  position:sticky;
  top:0;
  z-index:1;
}
.xlsx-table-wrap td{
  padding:4px 10px;
  border:1px solid var(--border);
  max-width:280px;
  overflow:hidden;
  text-overflow:ellipsis;
}
/* docx 렌더링 */
.docx-preview{ max-width:720px; margin:0 auto; }
.docx-preview h1,.docx-preview h2,.docx-preview h3{ margin:1em 0 0.4em; }
.docx-preview p{ margin:0.4em 0; }
.docx-preview table{ border-collapse:collapse; width:100%; margin:0.8em 0; }
.docx-preview td,.docx-preview th{ border:1px solid var(--border); padding:5px 8px; }
/* pptx/hwpx 텍스트 */
.pptx-slide{
  border:1px solid var(--border);
  border-radius:8px;
  padding:14px 18px;
  margin-bottom:12px;
  background:var(--surface);
}
.pptx-slide-num{
  font-size:11px;
  color:var(--sub);
  font-weight:700;
  margin-bottom:6px;
}
.hwpx-preview{
  white-space:pre-wrap;
  font-family:'DM Mono', monospace;
  font-size:12.5px;
  color:var(--text2);
  line-height:1.8;
}

/* 별 아이콘 */
.star{ cursor:pointer; font-size:13px; color:var(--sub); line-height:1; flex-shrink:0; }
.star.active{ color:var(--star); }

/* 관리 액션 버튼 */
.manage-actions{
  display:flex;
  gap:4px;
  padding:4px 6px;
  background:rgba(0,0,0,0.04);
}
.dark .manage-actions{ background:rgba(255,255,255,0.04); }
.manage-actions button{ padding:3px 8px; font-size:11px; border-radius:6px; }

/* ── 모달 ── */
#photoModal,#textModal{
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.75);
  justify-content:center;
  align-items:center;
  z-index:9999;
  backdrop-filter:blur(6px);
}
.modalBox{
  background:var(--card);
  color:var(--text);
  padding:28px;
  border-radius:16px;
  max-width:700px;
  width:90%;
  max-height:80vh;
  overflow:auto;
  white-space:pre-wrap;
  box-shadow:0 20px 60px rgba(0,0,0,0.3);
}

/* ── 프로그레스 ── */
#progressOverlay{
  display:none;
  position:fixed; top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.6);
  z-index:99999;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  gap:14px;
  backdrop-filter:blur(4px);
}
#progressOverlay.show{ display:flex; }
#progressBar{ width:300px; height:6px; background:rgba(255,255,255,0.2); border-radius:999px; overflow:hidden; }
#progressFill{ height:100%; background:var(--accent); width:0%; transition:width 0.25s; border-radius:999px; }
#progressLabel{ color:#fff; font-size:13px; font-weight:600; }

/* ── 뽀모도로 애니 ── */
@keyframes pomoBlink{ 0%,100%{ opacity:1; } 50%{ opacity:0.25; } }

/* ── 할일 항목 ── */
.todo-row{
  display:flex; align-items:center; gap:8px;
  padding:7px 10px; border-radius:8px;
  background:var(--card2);
  color:var(--text);
  transition:background 0.12s;
}
.todo-row:hover{ background:var(--border); }
.todo-drag-ghost{ opacity:0.4; background:var(--accent-light) !important; border:1px dashed var(--accent) !important; }
.todo-row .todo-text-done{ text-decoration:line-through; color:var(--sub); }
.todo-row .todo-text-normal{ color:var(--text); }

/* ── 뱃지 위젯 (상단 툴바 아래 첫 카드) ── */
.badge-row{
  display:flex; gap:8px; flex-wrap:wrap; align-items:center;
}
.badge-item{
  cursor:pointer;
  display:flex; align-items:center; gap:5px;
  padding:5px 13px;
  border-radius:8px;
  border:1px solid var(--border);
  background:var(--card2);
  font-size:12.5px;
  font-weight:600;
  color:var(--text2);
  transition:all 0.15s;
}
.badge-item:hover{ border-color:var(--accent); color:var(--accent); background:var(--accent-light); }

/* ── 입력 폼 그리드 ── */
.input-form{
  display:grid;
  grid-template-columns:auto 1fr 1fr;
  gap:8px;
  align-items:start;
}
.input-form .full-row{ grid-column:1/-1; }
.input-form .save-row{ grid-column:1/-1; display:flex; justify-content:flex-end; }

/* ══════════════════════════════════════════
   LAYOUT — 상단 고정 2단 바 + 탭 시스템
══════════════════════════════════════════ */

/* ─ 왼쪽 세로 사이드바 메뉴 ─ */
#topMenuBar{
  position:fixed;
  top:0; left:0; bottom:0;
  width:54px;
  z-index:99999;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:2px;
  padding:8px 0 12px;
  background:var(--card);
  border-right:1px solid var(--border);
  box-shadow:1px 0 8px rgba(0,0,0,0.07);
  overflow-x:hidden;
  overflow-y:auto;
  scrollbar-width:none;
}
#topMenuBar::-webkit-scrollbar{ display:none; }

/* 사이드바 뱃지 아이템 */
#topMenuBar .badge-item{
  width:42px;
  height:42px;
  padding:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:2px;
  font-size:10px;
  white-space:nowrap;
  flex-shrink:0;
  border-radius:10px;
  cursor:pointer;
}
#topMenuBar .badge-item > span:first-child{ font-size:16px; line-height:1; }
#topMenuBar .badge-item > span:not(:first-child){ font-size:9px; font-weight:600; color:var(--sub); }

/* 사이드바 버튼 */
#topMenuBar button{
  width:42px;
  height:42px;
  padding:0;
  font-size:9px;
  flex-shrink:0;
  white-space:nowrap;
  border-radius:10px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:1px;
  line-height:1.2;
}
#topMenuBar button .sb-icon{ font-size:16px; line-height:1; }
#topMenuBar button .sb-label{ font-size:9px; font-weight:600; color:var(--sub); }
#topMenuBar button:hover .sb-label{ color:var(--accent); }

.menu-brand{
  font-size:9px;
  font-weight:700;
  color:var(--accent);
  letter-spacing:-0.3px;
  flex-shrink:0;
  writing-mode:vertical-rl;
  transform:rotate(180deg);
  margin-bottom:4px;
  padding:2px 0;
  line-height:1;
}
.sb-divider{
  width:30px;
  height:1px;
  background:var(--border);
  margin:3px 0;
  flex-shrink:0;
}

/* ─ 탭바 ─ */
#tabBar{
  position:fixed;
  top:0; left:54px; right:0;
  height:38px;
  z-index:99998;
  display:flex;
  align-items:stretch;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  overflow-x:auto;
  overflow-y:hidden;
  scrollbar-width:none;
}
#tabBar::-webkit-scrollbar{ display:none; }

.tab-item{
  display:flex;
  align-items:center;
  gap:5px;
  padding:0 12px;
  font-size:12px;
  font-weight:500;
  color:var(--sub);
  cursor:pointer;
  white-space:nowrap;
  border-right:1px solid var(--border);
  border-bottom:2px solid transparent;
  transition:all 0.14s;
  flex-shrink:0;
  min-width:80px;
  max-width:180px;
  position:relative;
  user-select:none;
}
.tab-item:hover{
  background:var(--card2);
  color:var(--text2);
}
.tab-item.active{
  background:var(--card);
  color:var(--accent);
  border-bottom-color:var(--accent);
  font-weight:600;
}
.tab-item.tab-home{
  min-width:110px;
}
.tab-label{
  overflow:hidden;
  text-overflow:ellipsis;
  flex:1;
  min-width:0;
}
.tab-favicon{
  width:14px; height:14px;
  object-fit:contain;
  flex-shrink:0;
  border-radius:2px;
}
.tab-close{
  width:16px; height:16px;
  border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:10px;
  color:var(--sub);
  flex-shrink:0;
  transition:background 0.12s, color 0.12s;
  margin-left:2px;
}
.tab-close:hover{
  background:var(--pomo-light);
  color:var(--pomo);
}

/* ─ 컨텐츠 레이어 ─ */
/* 링크매니저 패널 (기본 탭) */
#lmPanel{
  padding-top:38px; /* 탭바 높이 */
  padding-left:54px; /* 사이드바 너비 */
}
#lmPanel header{
  top:38px !important;
  left:54px !important;
}

/* iframe 탭 패널 */
.iframe-panel{
  position:fixed;
  top:38px; left:54px; right:0; bottom:0;
  display:none;
  flex-direction:column;
  background:var(--surface);
  z-index:99980;
}
.iframe-panel.panel-active{
  display:flex;
}

/* ══════════════════════════════════════════
   전체화면 — 두 가지 모드 명확히 분리
   ① tab-fs  : 탭 패널만 전체화면 (상단바 숨김)
   ② browser-fs : 브라우저 크롬 숨김 (상단바 유지)
══════════════════════════════════════════ */

/* ① 탭 전체화면: 탭바만 숨김, 사이드바는 유지 */
body.tab-fs #tabBar{
  display:none !important;
}
body.tab-fs .iframe-panel.panel-active{
  top:0 !important;
  left:54px !important;
  bottom:0 !important;
}
body.tab-fs #lmPanel{
  padding-top:0 !important;
  padding-left:54px !important;
}
body.tab-fs #lmPanel header{
  top:0 !important;
  left:54px !important;
}
body.tab-fs .iframe-panel.panel-active .iframe-toolbar{
  display:none !important;
}

/* ② 브라우저 전체화면: 상단바는 그대로, 레이아웃 변화 없음 */
/* (document.requestFullscreen이 브라우저 크롬만 숨김 — CSS 불필요) */

/* 탭 전체화면 해제 핫코너 — 사이드바가 항상 표시되므로 left:54px 고정 */
#fsHotCorner{
  position:fixed;
  top:0; right:0;
  height:38px;
  padding:0 18px;
  z-index:99999999;
  display:none;
  align-items:center;
  gap:8px;
  background:rgba(0,0,0,0.72);
  border-bottom-left-radius:14px;
  color:#fff;
  font-size:12.5px;
  font-weight:700;
  cursor:pointer;
  pointer-events:all !important;
  user-select:none;
  transition:background 0.15s;
  backdrop-filter:blur(4px);
  -webkit-backdrop-filter:blur(4px);
}
#fsHotCorner:hover{ background:rgba(0,0,0,0.92); }

/* 탭 전체화면 활성화 시 핫코너 표시 */
body.tab-fs #fsHotCorner{
  display:flex;
}

/* iframe 탭 내부 툴바 */
.iframe-toolbar{
  display:flex;
  align-items:center;
  gap:5px;
  padding:5px 8px;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
  min-height:38px;
}
.iframe-toolbar button{
  padding:3px 9px;
  font-size:11.5px;
  border-radius:7px;
  flex-shrink:0;
}
.iframe-url-bar{
  flex:1;
  min-width:0;
  display:flex;
  align-items:center;
  gap:5px;
  background:var(--card2);
  border:1px solid var(--border);
  border-radius:8px;
  padding:4px 9px;
  overflow:hidden;
  cursor:default;
}
.iframe-url-text{
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  flex:1;
  min-width:0;
  font-family:'DM Mono', monospace;
  font-size:11px;
  color:var(--sub);
}
.iframe-frame{
  flex:1;
  width:100%;
  border:none;
  background:var(--surface);
}

/* 로딩/차단 오버레이 */
.iframe-overlay{
  position:absolute;
  inset:38px 0 0 0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:10px;
  background:var(--surface);
  z-index:5;
  text-align:center;
  padding:24px;
}
.iframe-overlay.hidden{ display:none; }
.tab-spinner{
  width:30px; height:30px;
  border:3px solid var(--border);
  border-top-color:var(--accent);
  border-radius:50%;
  animation:tabSpin 0.7s linear infinite;
}
@keyframes tabSpin{ to{ transform:rotate(360deg); } }
/* ── 숨김모드 드래그 완전 차단 ── */
body.hide-mode .link-card {
  cursor: default !important;
  -webkit-user-drag: none !important;
}
body.hide-mode .link-list {
  -webkit-touch-callout: none;
}

</style>
</head>
<body>

<!-- ══════════════════════════════════════
     ① 최상단 고정 메뉴바 (항상 표시)
══════════════════════════════════════ -->
<div id="topMenuBar">
  <span class="menu-brand">Link Mgr</span>
  <div class="sb-divider"></div>

  <!-- 루틴 (링크매니저 루틴 분류로 이동) -->
  <button onclick="goToRoutineGroup()" title="루틴">
    <span class="sb-icon">🔄</span>
    <span class="sb-label">루틴</span>
  </button>

  <!-- 학습카드 -->
  <button onclick="openMemorycard()" title="학습카드">
    <span class="sb-icon">⭐</span>
    <span class="sb-label">학습카드</span>
  </button>

  <!-- 학습체크 -->
  <button onclick="openPracticecheck()" title="학습체크">
    <span class="sb-icon">📋</span>
    <span class="sb-label">학습체크</span>
  </button>

  <div class="sb-divider"></div>

  <!-- 스케줄 -->
  <button onclick="openSchedule()" title="스케줄">
    <span class="sb-icon">📅</span>
    <span class="sb-label">스케줄</span>
  </button>

  <!-- 달력 -->
  <div id="calBadge" class="badge-item" onclick="toggleCalPanel()" title="달력">
    <span>📆</span>
    <span>달력</span>
  </div>

  <!-- 할일 -->
  <div id="todoBadgeBtn" class="badge-item" onclick="toggleTodoPanel()" title="할일">
    <span>✅</span>
    <span>할일</span>
  </div>

  <!-- 뽀모도로 -->
  <div id="pomoBadge" class="badge-item" onclick="togglePomoPanel()" title="뽀모도로 타이머">
    <span>⏱</span>
    <span id="pomoText" style="font-size:9px;font-weight:600;color:var(--sub);">0🍅</span>
  </div>

  <!-- 오늘 클릭 통계 -->
  <div id="clickStatBadge" class="badge-item" onclick="openClickStat()" title="오늘 클릭 통계">
    <span>📊</span>
    <span id="clickStatText" style="font-size:9px;font-weight:600;color:var(--sub);">0회</span>
  </div>


  <div class="sb-divider" style="margin-top:auto;"></div>

  <!-- 전체화면 -->
  <button id="browserFsBtn" onclick="toggleBrowserFullscreen()" title="브라우저 전체화면" style="background:var(--accent);color:#fff;border:none;">
    <span class="sb-icon">⛶</span>
    <span class="sb-label" style="color:#fff;">전체</span>
  </button>
</div>

<!-- ══════════════════════════════════════
     ② 탭바
══════════════════════════════════════ -->
<div id="tabBar">
  <!-- 홈 탭 (링크매니저) — 항상 첫번째 -->
  <div class="tab-item tab-home active" id="tab-home" onclick="switchToHomeTab()">
    <span style="font-size:13px;">🏠</span>
    <span class="tab-label">링크매니저</span>
  </div>
  <!-- 동적 탭들은 JS가 여기에 추가 -->
</div>

<!-- ══════════════════════════════════════
     ③ 링크매니저 패널 (홈 탭 컨텐츠)
══════════════════════════════════════ -->
<div id="lmPanel">

<header id="topbar">
  <span style="font-size:14px;font-weight:700;color:var(--accent);margin-right:4px;letter-spacing:-0.3px;">StudyLink</span>
  <button style="background:var(--accent);color:#fff;border:none;font-weight:600;" onclick="addGroup()">+ 분류</button>
  <button class="primary" onclick="addCategory()">+ 카테고리</button>
  <button onclick="toggleManage()">⚙ 관리</button>
  <button onclick="toggleDark()">◐ 테마</button>
  <button onclick="toggleHide()">숨김</button>
  <button onclick="downloadBackup()">↓ 백업</button>
  <button onclick="restoreBackup()">↑ 복원</button>
  <button onclick="syncFromGit()">⬇ 동기화</button>
  <button onclick="syncToGit()">⬆ 업로드</button>
  <button onclick="resetToken()" style="color:var(--sub);">🗑 토큰삭제</button>
  <button onclick="changeToken()" style="color:var(--sub);">🔑 토큰변경</button>
  <button onclick="openAllSyncModal()" style="background:#7c3aed;color:#fff;border:none;font-weight:600;">☁ 전체 동기화</button>
  <button onclick="changeGrid(1)" title="열 줄이기" style="padding:6px 10px;">−</button>
  <button onclick="changeGrid(-1)" title="열 늘리기" style="padding:6px 10px;">+</button>
  <input id="searchInput" placeholder="🔍 검색..." oninput="renderLinks()" style="margin-left:auto;min-width:180px;">
</header>

<div class="container">
  <!-- 입력 폼 -->
  <div class="card" id="inputBox" style="padding:14px 18px;">
    <p class="section-title" style="margin-bottom:10px;">새 항목 추가</p>
    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:flex-start;">
      <select id="type" style="min-width:100px;" onchange="onTypeChange()">
        <option value="youtube">유튜브</option>
        <option value="link">링크</option>
        <option value="photo">사진</option>
        <option value="text">텍스트</option>
        <option value="file">파일</option>
      </select>
      <input id="title" placeholder="제목" style="flex:1;min-width:160px;">
      <input id="url" placeholder="URL" style="flex:2;min-width:200px;">
      <input type="file" id="file" accept="image/*" multiple style="flex:1;min-width:140px;padding:6px 8px;">
      <button class="primary" onclick="addLink()" style="white-space:nowrap;">저장</button>
    </div>
    <textarea id="text" rows="3" placeholder="텍스트 내용 입력..." style="margin-top:8px;min-height:80px;"></textarea>
  </div>

  <!-- 분류 바 -->
  <div class="card" id="groupCard" style="padding:12px 16px;"><div id="groupBar" class="group-bar"></div></div>

  <!-- 카테고리 바 -->
  <div class="card" style="padding:12px 16px;"><div id="categoryBar" class="category-bar"></div></div>

  <!-- 즐겨찾기 -->
  <div class="card" id="favSection">
    <p class="section-title">⭐ 즐겨찾기</p>
    <div id="favList" class="link-list"></div>
  </div>

  <!-- 전체 링크 -->
  <div class="card">
    <p class="section-title">모든 항목</p>
    <div id="linkList" class="link-list"></div>
  </div>
</div>

</div><!-- /lmPanel -->

<!-- 클릭 집계 모달 -->
<div id="clickStatModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);justify-content:center;align-items:center;z-index:999990;backdrop-filter:blur(4px);" onclick="if(event.target===this)this.style.display='none'">
  <div id="clickStatBox" style="background:var(--card);color:var(--text);border-radius:20px;padding:24px;width:95%;max-width:800px;max-height:88vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,0.3);">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px;">
      <h3 style="margin:0;font-size:16px;">📊 즐겨찾기 클릭 + 🍅 뽀모도로 주간 통계</h3>
      <div style="display:flex;gap:8px;align-items:center;">
        <button onclick="moveWeek(-1)" style="min-height:32px;padding:0 12px;font-size:13px;">◀ 이전</button>
        <span id="weekLabel" style="font-size:13px;font-weight:600;white-space:nowrap;"></span>
        <button onclick="moveWeek(1)" style="min-height:32px;padding:0 12px;font-size:13px;">다음 ▶</button>
        <button onclick="goToCurrentWeek()" style="min-height:32px;padding:0 12px;font-size:13px;background:var(--accent);color:#fff;border:none;">오늘</button>
        <button onclick="document.getElementById('clickStatModal').style.display='none'" style="min-height:32px;padding:0 12px;font-size:16px;">✕</button>
      </div>
    </div>
    <div id="clickStatTable"></div>
  </div>
</div>

<!-- 할일 패널 (탭: 할일 / 한일 / 일정) -->
<div id="todoPanel" style="display:none;position:fixed;bottom:20px;right:20px;z-index:99996;
  background:var(--card);border:1px solid var(--border);border-radius:16px;
  box-shadow:0 4px 24px rgba(0,0,0,0.15);padding:12px 14px;width:280px;
  max-height:calc(100vh - 80px);display:none;flex-direction:column;
  font-family:var(--font);">

  <!-- 헤더 -->
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-shrink:0;">
    <div style="display:flex;align-items:center;gap:5px;">
      <div id="todoDateLabel" style="font-size:12px;font-weight:700;color:var(--accent);">오늘</div>
      <button onclick="todoGoToday()" title="오늘로 이동" style="min-height:18px;padding:0 5px;font-size:11px;border-radius:5px;color:var(--sub);background:transparent;border:none;">↩</button>
    </div>
    <div style="display:flex;gap:5px;align-items:center;">
      <span id="todoBadge" style="font-size:11px;font-weight:700;padding:1px 8px;border-radius:999px;background:var(--accent-light);color:var(--accent);">0/0</span>
      <button onclick="toggleTodoPanel()" style="min-height:20px;padding:0 7px;font-size:12px;border-radius:6px;color:var(--sub);background:transparent;border:none;">✕</button>
    </div>
  </div>

  <!-- 탭 -->
  <div style="display:flex;gap:3px;margin-bottom:8px;background:var(--card2);border-radius:9px;padding:3px;flex-shrink:0;">
    <button id="tab-todo" onclick="switchTodoTab('todo')"
      style="flex:1;padding:4px 0;font-size:11.5px;font-weight:600;border-radius:7px;border:none;background:var(--accent);color:#fff;">할일</button>
    <button id="tab-done" onclick="switchTodoTab('done')"
      style="flex:1;padding:4px 0;font-size:11.5px;font-weight:600;border-radius:7px;border:none;background:transparent;color:var(--sub);">한일</button>
    <button id="tab-sched" onclick="switchTodoTab('sched')"
      style="flex:1;padding:4px 0;font-size:11.5px;font-weight:600;border-radius:7px;border:none;background:transparent;color:var(--sub);">일정</button>
  </div>

  <!-- [탭] 할일 -->
  <div id="tabPane-todo" style="display:flex;flex-direction:column;flex:1;min-height:0;">
    <div style="display:flex;gap:5px;margin-bottom:8px;flex-shrink:0;">
      <input id="todoInput" placeholder="새 할일 추가..." onkeydown="if(event.key==='Enter')addTodo()"
        style="flex:1;min-height:28px;padding:0 9px;border-radius:7px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:12.5px;">
      <button onclick="addTodo()" style="min-height:28px;padding:0 10px;border-radius:7px;background:var(--accent);color:#fff;border:none;font-size:13px;">+</button>
    </div>
    <div id="todoList" style="flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:3px;min-height:0;"></div>
  </div>

  <!-- [탭] 한일 -->
  <div id="tabPane-done" style="display:none;flex:1;min-height:0;">
    <div id="doneList" style="height:100%;overflow-y:auto;display:flex;flex-direction:column;gap:3px;"></div>
  </div>

  <!-- [탭] 일정 (schedule.html 양방향 연동) -->
  <div id="tabPane-sched" style="display:none;flex-direction:column;flex:1;min-height:0;">
    <div style="display:flex;gap:5px;margin-bottom:8px;flex-shrink:0;">
      <input id="schedInput" placeholder="새 일정 추가..." onkeydown="if(event.key==='Enter')addScheduleEvent()"
        style="flex:1;min-height:28px;padding:0 9px;border-radius:7px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:12.5px;">
      <button onclick="addScheduleEvent()" style="min-height:28px;padding:0 10px;border-radius:7px;background:var(--accent);color:#fff;border:none;font-size:13px;">+</button>
    </div>
    <div id="scheduleList" style="flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:3px;min-height:0;"></div>
    <div style="margin-top:6px;text-align:right;flex-shrink:0;">
      <button onclick="window.open('schedule.html','_blank')"
        style="font-size:10.5px;padding:3px 10px;border-radius:7px;color:var(--accent);background:var(--accent-light);border:none;font-weight:600;">📅 달력 전체보기</button>
    </div>
  </div>

  <!-- scheduleSection (하위 호환용, 숨김) -->
  <div id="scheduleSection" style="display:none;"></div>
</div>

<!-- 달력 패널 -->
<div id="calPanel" style="display:none;position:fixed;bottom:20px;right:20px;z-index:99997;
  background:var(--card);border:1px solid var(--border);border-radius:16px;
  box-shadow:0 4px 24px rgba(0,0,0,0.15);padding:14px 16px;width:280px;
  font-family:var(--font);">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
    <div style="display:flex;align-items:center;gap:6px;">
      <button onclick="calMove(-1)" style="min-height:24px;padding:0 8px;font-size:12px;border-radius:6px;">◀</button>
      <div id="calTitle" style="font-size:13px;font-weight:700;min-width:80px;text-align:center;"></div>
      <button onclick="calMove(1)" style="min-height:24px;padding:0 8px;font-size:12px;border-radius:6px;">▶</button>
    </div>
    <button onclick="toggleCalPanel()" style="min-height:22px;padding:0 8px;font-size:12px;border-radius:6px;color:var(--sub);background:transparent;border:none;">✕</button>
  </div>
  <div id="calGrid" style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center;font-size:12px;"></div>
  <!-- 범례 + 바로가기 -->
  <div style="display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-top:8px;border-top:1px solid var(--border);">
    <div style="display:flex;align-items:center;gap:8px;">
      <span style="display:flex;align-items:center;gap:3px;font-size:10.5px;color:var(--sub);">
        <span style="width:6px;height:6px;border-radius:50%;background:#e55353;display:inline-block;"></span>할일
      </span>
      <span style="display:flex;align-items:center;gap:3px;font-size:10.5px;color:var(--sub);">
        <span style="width:6px;height:6px;border-radius:50%;background:#f59e0b;display:inline-block;"></span>일정
      </span>
    </div>
    <button onclick="window.open('schedule.html','_blank')"
      style="font-size:10.5px;padding:3px 10px;border-radius:7px;color:var(--accent);background:var(--accent-light);border:none;font-weight:600;">
      📅 일정 관리
    </button>
  </div>
</div>

<!-- 뽀모도로 인앱 패널 (컴팩트) -->
<div id="pomoPanel" style="display:none;position:fixed;bottom:20px;right:20px;z-index:99998;
  background:var(--card);border:1px solid var(--border);border-radius:16px;
  box-shadow:0 8px 32px rgba(0,0,0,0.18);padding:12px 14px 10px;width:280px;
  flex-direction:column;gap:8px;font-family:inherit;">

  <!-- 헤더: 모드 탭 + 닫기 -->
  <div style="display:flex;align-items:center;justify-content:space-between;gap:6px;">
    <div style="display:flex;gap:3px;flex:1;">
      <button id="ptab-pomo" onclick="pomoSetMode('pomo')"
        style="flex:1;padding:4px 0;font-size:11px;font-weight:600;border-radius:7px;border:none;background:#e55353;color:#fff;">집중</button>
      <button id="ptab-short" onclick="pomoSetMode('short')"
        style="flex:1;padding:4px 0;font-size:11px;font-weight:600;border-radius:7px;border:none;background:transparent;color:var(--sub);">짧은휴식</button>
      <button id="ptab-long" onclick="pomoSetMode('long')"
        style="flex:1;padding:4px 0;font-size:11px;font-weight:600;border-radius:7px;border:none;background:transparent;color:var(--sub);">긴휴식</button>
    </div>
    <button onclick="togglePomoPanel()"
      style="width:22px;height:22px;padding:0;border-radius:50%;font-size:12px;
      color:var(--sub);background:transparent;border:none;flex-shrink:0;line-height:1;">✕</button>
  </div>

  <!-- 원형 링 + 타이머 (컴팩트) -->
  <div style="display:flex;align-items:center;gap:10px;">
    <div style="position:relative;width:88px;height:88px;flex-shrink:0;">
      <svg width="88" height="88" style="transform:rotate(-90deg);">
        <circle cx="44" cy="44" r="36" fill="none" stroke="var(--border)" stroke-width="5"/>
        <circle id="pomoRing" cx="44" cy="44" r="36" fill="none" stroke="#e55353" stroke-width="5"
          stroke-linecap="round"
          stroke-dasharray="226.19"
          stroke-dashoffset="0"
          style="transition:stroke-dashoffset 0.8s ease,stroke 0.4s;"/>
      </svg>
      <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;">
        <div id="pomoModeDot" style="width:5px;height:5px;border-radius:50%;background:#e55353;"></div>
        <div id="pomoTime" style="font-size:20px;font-weight:700;letter-spacing:-0.5px;line-height:1;cursor:pointer;"
          onclick="pomoClickTime()" title="클릭하면 모드 전환">25:00</div>
        <div id="pomoModeLabel" style="font-size:9.5px;color:var(--sub);font-weight:500;">집중 시간</div>
      </div>
    </div>
    <!-- 오른쪽: 조절 + 컨트롤 -->
    <div style="flex:1;display:flex;flex-direction:column;gap:8px;align-items:center;">
      <!-- 시간 조절 -->
      <div style="display:flex;align-items:center;gap:6px;">
        <button onclick="pomoAdjTime(-1)"
          style="width:24px;height:24px;padding:0;border-radius:50%;font-size:14px;font-weight:700;
          border:1px solid var(--border);background:var(--card2);color:var(--text2);">−</button>
        <span id="pomoSetLabel" style="font-size:12px;font-weight:600;color:var(--text);min-width:30px;text-align:center;">25분</span>
        <button onclick="pomoAdjTime(1)"
          style="width:24px;height:24px;padding:0;border-radius:50%;font-size:14px;font-weight:700;
          border:1px solid var(--border);background:var(--card2);color:var(--text2);">+</button>
      </div>
      <!-- 컨트롤 버튼 -->
      <div style="display:flex;align-items:center;gap:7px;">
        <button onclick="pomoSkipBack()"
          style="width:28px;height:28px;padding:0;border-radius:50%;font-size:13px;

<script>
/* ══════════════════════════════════════════
   pcSync — practicecheck 연동 모듈
   localStorage 공유 키:
     pc_areas   : 영역/항목 데이터
     pc_repeats : 반복 스케줄
══════════════════════════════════════════ */
const pcSync = (function(){
  const PC_AREAS_KEY   = 'pc_areas'
  const PC_REPEATS_KEY = 'pc_repeats'
  const REPEAT_OFFSETS = [1, 3, 7, 30]

  function getAreas(){
    try{ return JSON.parse(localStorage.getItem(PC_AREAS_KEY)||'[]') }catch{ return [] }
  }
  function saveAreas(a){ localStorage.setItem(PC_AREAS_KEY, JSON.stringify(a)) }
  function getRepeats(){
    try{ return JSON.parse(localStorage.getItem(PC_REPEATS_KEY)||'{}') }catch{ return {} }
  }
  function saveRepeats(r){ localStorage.setItem(PC_REPEATS_KEY, JSON.stringify(r)) }

  function localDate(d){
    const dt=d||new Date()
    return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0')
  }

  /* 루틴 분류 소속 카테고리인지 확인 */
  function isRutine(catName){
    const g = groupsData.find(x => x.name === '루틴')
    return g ? g.cats.includes(catName) : false
  }

  /* 카테고리 → pc 영역 보장 */
  function ensureArea(catName){
    const areas = getAreas()
    if(!areas.find(a => a.name === catName)){
      areas.push({ name: catName, habits:[], data:{} })
      saveAreas(areas)
    }
  }

  /* 카드 제목 → pc 항목 보장 (source:'lm') */
  function ensureHabit(catName, title){
    const areas = getAreas()
    let area = areas.find(a => a.name === catName)
    if(!area){ area = { name: catName, habits:[], data:{} }; areas.push(area) }
    if(!area.habits.find(h => h.name === title)){
      area.habits.push({ name: title, source: 'lm' })
      saveAreas(areas)
    }
  }

  /* 카드 클릭 → 오늘 체크 + 반복 스케줄 설정 */
  function markDone(catName, title){
    const today = new Date()
    const todayStr = today.toDateString()   // pc data 키 형식과 일치
    const areas = getAreas()
    let area = areas.find(a => a.name === catName)
    if(!area){ area = { name:catName, habits:[], data:{} }; areas.push(area) }
    if(!area.habits.find(h => h.name === title))
      area.habits.push({ name: title, source:'lm' })

    const key = title + todayStr
    area.data[key] = 1
    saveAreas(areas)

    // 반복 스케줄 (30일 이내 중복 방지)
    const repeats = getRepeats()
    const rKey    = catName + '::' + title
    const existing = repeats[rKey]
    if(existing){
      const base = new Date(existing.baseDate + 'T12:00:00')
      today.setHours(12,0,0,0)
      if(Math.round(Math.abs(today-base)/86400000) < 30) return
    }
    const due = REPEAT_OFFSETS.map(d => {
      const dt = new Date(today); dt.setDate(dt.getDate()+d); return localDate(dt)
    })
    repeats[rKey] = { baseDate: localDate(today), due }
    saveRepeats(repeats)
  }

  /* 오늘이 해당 카드의 반복일인지 */
  function checkRepeatToday(catName, title){
    const today = localDate()
    const rep = getRepeats()[catName + '::' + title]
    return rep ? rep.due.includes(today) : false
  }

  /* 즐겨찾기 해제 시 pc 항목 제거 (source:'lm' 인 것만) */
  function removeHabit(catName, title){
    const areas = getAreas()
    const area = areas.find(a => a.name === catName)
    if(!area) return
    const idx = area.habits.findIndex(h => h.name === title && h.source === 'lm')
    if(idx === -1) return
    area.habits.splice(idx, 1)
    // 해당 항목의 data 키도 정리
    Object.keys(area.data).forEach(k => { if(k.startsWith(title)) delete area.data[k] })
    saveAreas(areas)
    // 반복 스케줄도 제거
    const repeats = getRepeats()
    delete repeats[catName + '::' + title]
    saveRepeats(repeats)
  }

  return { isRutine, ensureArea, ensureHabit, removeHabit, markDone, checkRepeatToday }
})()

/* ══════════════════════════════════════════
   토큰 — AES-GCM으로 암호화해서 localStorage 보관
   복호화된 값은 세션 메모리에만 캐싱
══════════════════════════════════════════ */
let _tokenCache = ""  // 복호화된 토큰 메모리 캐시

async function _encryptToken(token, pw){
  const enc = new TextEncoder()
  const km = await crypto.subtle.importKey("raw", enc.encode(pw), "PBKDF2", false, ["deriveKey"])
  const key = await crypto.subtle.deriveKey(
    {name:"PBKDF2", salt:enc.encode("lm_token_v1"), iterations:200000, hash:"SHA-256"},
    km, {name:"AES-GCM", length:256}, false, ["encrypt"])
  const iv = crypto.getRandomValues(new Uint8Array(12))
  const encrypted = await crypto.subtle.encrypt({name:"AES-GCM", iv}, key, enc.encode(token))
  return btoa(JSON.stringify({iv:Array.from(iv), data:Array.from(new Uint8Array(encrypted))}))
}
async function _decryptToken(cipher, pw){
  try{
    const enc = new TextEncoder()
    const obj = JSON.parse(atob(cipher))
    const km = await crypto.subtle.importKey("raw", enc.encode(pw), "PBKDF2", false, ["deriveKey"])
    const key = await crypto.subtle.deriveKey(
      {name:"PBKDF2", salt:enc.encode("lm_token_v1"), iterations:200000, hash:"SHA-256"},
      km, {name:"AES-GCM", length:256}, false, ["decrypt"])
    const dec = await crypto.subtle.decrypt({name:"AES-GCM", iv:new Uint8Array(obj.iv)}, key, new Uint8Array(obj.data))
    return new TextDecoder().decode(dec)
  }catch{ return null }
}

async function getToken(){
  if(_tokenCache) return _tokenCache
  const cipher = localStorage.getItem("GH_TOKEN_ENC")
  if(cipher){
    // 저장된 토큰 있음 → 마스터 비밀번호만 입력
    const pw = prompt("🔑 GitHub 토큰 잠금 해제\n마스터 비밀번호를 입력하세요")

    if(!token){ alert("❌ 비밀번호가 틀렸습니다."); return "" }
    _tokenCache = token
    return _tokenCache
  } else {

    const cipher = await _encryptToken(token.trim(), pw)
    localStorage.setItem("GH_TOKEN_ENC", cipher)
    _tokenCache = token.trim()
    alert("✅ 토큰이 암호화되어 저장되었습니다.")
    return _tokenCache
  }
}

/* ══════════════════════════════════════════
   AutoSync — 변경 감지 → debounce 45초 후 자동 push
   상태 표시: 우상단 작은 배지
══════════════════════════════════════════ */
;(function setupAutoSync(){
  // 배지 생성
  const badge = document.createElement("div")
  badge.id = "autoSyncBadge"
  badge.style.cssText = `
    position:fixed;top:92px;left:50%;transform:translateX(-50%);
    z-index:99999;font-size:11px;font-weight:600;
    padding:3px 10px;border-radius:20px;
    background:rgba(0,0,0,0.65);color:#fff;
    pointer-events:none;opacity:0;
    transition:opacity 0.4s;white-space:nowrap;
  `
  document.addEventListener("DOMContentLoaded", ()=> document.body.appendChild(badge))

  let timer = null
  const DELAY = 45000  // 45초

  function showBadge(text, color="#374151"){
    badge.textContent = text
    badge.style.background = color
    badge.style.opacity = "1"
    clearTimeout(badge._hide)
    badge._hide = setTimeout(()=> badge.style.opacity = "0", 3500)
  }

  window._autoSyncBadge = showBadge

  function scheduleAutoSync(){
    if(!localStorage.getItem("GH_TOKEN_ENC") && !_tokenCache) return  // 토큰 없으면 스킵
    clearTimeout(timer)
    showBadge("✏️ 변경 감지됨 — 45초 후 자동 저장", "#92400e")
    timer = setTimeout(async ()=>{
      showBadge("☁️ 자동 저장 중...", "#1d4ed8")
      try{
        await syncToGit(true)  // silent=true
        showBadge("✅ 자동 저장 완료", "#065f46")
      }catch(e){
        showBadge("❌ 자동 저장 실패: "+e.message, "#991b1b")
      }
    }, DELAY)
  }

  // localStorage 변경 감지 (같은 탭 — 원본 setItem 래핑)
  const _origSet = localStorage.setItem.bind(localStorage)
  localStorage.setItem = function(key, val){
    _origSet(key, val)
    const watchKeys = ["lmData","lmTodos","lmPomoLog","lmClickLog","lmGroups"]
    if(watchKeys.includes(key)) scheduleAutoSync()
  }
})()


/* ══════════════════════════════════════════
   로컬 날짜 헬퍼
   toISOString()은 UTC 기준이라 UTC+9(한국) 환경에서
   자정~오전 9시 사이에 어제 날짜를 반환하는 버그가 있음.
   → 브라우저 로컬 시간 기준의 YYYY-MM-DD 문자열을 반환.
══════════════════════════════════════════ */
function getLocalDateStr(date){
  const d = date || new Date()
  const y = d.getFullYear()
  const m = String(d.getMonth()+1).padStart(2,"0")
  const day = String(d.getDate()).padStart(2,"0")
  return `${y}-${m}-${day}`
}

/* ══════════════════════════════════════════
   이미지 캐시 — IndexedDB (file:// · https 모두 동작)
══════════════════════════════════════════ */
const imageCache = new Map()

let _idb = null
function openIDB(){
  if(_idb) return Promise.resolve(_idb)
  return new Promise((resolve, reject) => {
    const req = indexedDB.open("lmImgCache", 1)
    req.onupgradeneeded = e => { e.target.result.createObjectStore("imgs") }
    req.onsuccess = e => { _idb = e.target.result; resolve(_idb) }
    req.onerror   = e => reject(e.target.error)
  })
}
function idbSet(key, val){
  return openIDB().then(db => new Promise((resolve, reject) => {
    const tx = db.transaction("imgs", "readwrite")
    tx.objectStore("imgs").put(val, key)
    tx.oncomplete = resolve
    tx.onerror = e => reject(e.target.error)
  }))
}
function idbGet(key){
  return openIDB().then(db => new Promise((resolve, reject) => {
    const req = db.transaction("imgs").objectStore("imgs").get(key)
    req.onsuccess = e => resolve(e.target.result)
    req.onerror   = e => reject(e.target.error)
  }))
}
function idbGetAll(){
  return openIDB().then(db => new Promise((resolve, reject) => {
    const store = db.transaction("imgs").objectStore("imgs")
    const keys = []
    store.openKeyCursor().onsuccess = e => {
      const c = e.target.result
      if(c){ keys.push(c.key); c.continue() }
      else{
        Promise.all(keys.map(k => idbGet(k))).then(vs => {
          const map = {}
          keys.forEach((k,i) => map[k] = vs[i])
          resolve(map)
        })
      }
    }
    store.openKeyCursor().onerror = e => reject(e.target.error)
  }))
}

async function saveImageCache(){
  try{
    const writes = []
    imageCache.forEach((v,k) => { writes.push(idbSet(k, v)) })
    await Promise.all(writes)
    localStorage.removeItem("lmImgCache") // 구 localStorage 캐시 정리
  }catch(e){ console.warn("이미지 캐시 저장 실패:", e) }
}
async function loadImageCache(){
  // 구 localStorage 캐시 → IndexedDB 마이그레이션
  try{
    const old = localStorage.getItem("lmImgCache")
    if(old){
      const obj = JSON.parse(old)
      await Promise.all(Object.entries(obj).map(([k,v]) => idbSet(k, v)))
      localStorage.removeItem("lmImgCache")
      Object.entries(obj).forEach(([k,v]) => imageCache.set(k, v))
      return
    }
  }catch{}
  // IndexedDB에서 로드
  try{
    const all = await idbGetAll()
    Object.entries(all).forEach(([k,v]) => { if(v) imageCache.set(k, v) })
  }catch(e){ console.warn("이미지 캐시 로드 실패:", e) }
}

  return ""
}

/* ══════════════════════════════════════════
   Base64 ↔ UTF-8
══════════════════════════════════════════ */
function b64EncodeUnicode(str){
  const bytes = new TextEncoder().encode(str)
  let binary = ""
  bytes.forEach(b => binary += String.fromCharCode(b))
  return btoa(binary)
}
function b64DecodeUnicode(str){
  const binary = atob(str.replace(/\n/g,""))
  const bytes = new Uint8Array(binary.length)
  for(let i=0; i<binary.length; i++) bytes[i] = binary.charCodeAt(i)
  return new TextDecoder().decode(bytes)
}
function dataURLtoBase64(dataURL){ return dataURL.split(",")[1] }

async function encryptText(text, pw){
  const enc = new TextEncoder()
  const km = await crypto.subtle.importKey("raw", enc.encode(pw), "PBKDF2", false, ["deriveKey"])
  const key = await crypto.subtle.deriveKey(
    {name:"PBKDF2", salt:enc.encode("linkmanager"), iterations:100000, hash:"SHA-256"},
    km, {name:"AES-GCM",length:256}, false, ["encrypt"])
  const iv = crypto.getRandomValues(new Uint8Array(12))
  const encrypted = await crypto.subtle.encrypt({name:"AES-GCM",iv}, key, enc.encode(text))
  return btoa(JSON.stringify({iv:Array.from(iv), data:Array.from(new Uint8Array(encrypted))}))
}
async function decryptText(cipher, pw){
  try{
    const enc = new TextEncoder()

    const dec = await crypto.subtle.decrypt({name:"AES-GCM",iv:new Uint8Array(obj.iv)}, key, new Uint8Array(obj.data))
    return new TextDecoder().decode(dec)

}

/* ══════════════════════════════════════════
   이미지 처리
══════════════════════════════════════════ */
async function compressToDataURL(file, maxPx=1920, quality=0.92){
  return new Promise(resolve => {
    const img = new Image(), reader = new FileReader()
    reader.onload = e => { img.src = e.target.result }
    img.onload = () => {
      let w=img.width, h=img.height
      if(w>maxPx||h>maxPx){ const r=Math.min(maxPx/w,maxPx/h); w*=r; h*=r }
      const canvas=document.createElement("canvas"), ctx=canvas.getContext("2d")
      canvas.width=w; canvas.height=h
      ctx.drawImage(img,0,0,w,h)
      resolve(canvas.toDataURL("image/jpeg",quality))
    }
    reader.readAsDataURL(file)
  })
}
async function makeThumbDataURL(file){
  return new Promise(resolve => {
    const img = new Image(), reader = new FileReader()
    reader.onload = e => { img.src = e.target.result }
    img.onload = () => {
      const size=400, canvas=document.createElement("canvas"), ctx=canvas.getContext("2d")
      canvas.width=size; canvas.height=size
      const ratio=Math.max(size/img.width,size/img.height)
      ctx.drawImage(img,(size-img.width*ratio)/2,(size-img.height*ratio)/2,img.width*ratio,img.height*ratio)
      resolve(canvas.toDataURL("image/jpeg",0.82))
    }
    reader.readAsDataURL(file)
  })
}

const GROUP_PALETTES=[
  {light:"#3a5bd9",dark:"#7b9eff"},
  {light:"#16a34a",dark:"#4ade80"},
  {light:"#dc2626",dark:"#f87171"},
  {light:"#9333ea",dark:"#c084fc"},
  {light:"#ea580c",dark:"#fb923c"},
  {light:"#0891b2",dark:"#38bdf8"},
  {light:"#be185d",dark:"#f472b6"},
  {light:"#854d0e",dark:"#fbbf24"},
  {light:"#065f46",dark:"#34d399"},
  {light:"#1e40af",dark:"#93c5fd"},
]
function getGroupColor(groupId){
  const idx=groupsData.findIndex(g=>g.id===groupId)
  if(idx<0) return null
  const p=GROUP_PALETTES[idx%GROUP_PALETTES.length]
  return document.body.classList.contains("dark")?p.dark:p.light
}
function hexToRgba(hex,alpha){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16)
  return `rgba(${r},${g},${b},${alpha})`
}
function getCatGroup(cat){ return groupsData.find(g=>g.cats.includes(cat))||null }
function getCatColor(cat){ const g=getCatGroup(cat); return g?getGroupColor(g.id):null }

   카테고리 암호
══════════════════════════════════════════ */
let catPasswords = {}
let unlockedCats = new Set()

function loadCatPasswords(){
  try{ catPasswords = JSON.parse(localStorage.getItem("lmCatPw")||"{}") }catch{}
}
function saveCatPasswords(){
  localStorage.setItem("lmCatPw", JSON.stringify(catPasswords))
}

async function hashPw(pw){
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(pw))
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("")
}

async function setCatPassword(cat){
  const pw = prompt(`"${cat}" 카테고리 암호 설정\n(비워두면 암호 제거)`)
  if(pw === null) return
  if(pw === ""){
    delete catPasswords[cat]
    unlockedCats.delete(cat)
    saveCatPasswords()
    renderCategories(); renderLinks()
    return
  }
  const pw2 = prompt("암호 확인")
  if(pw !== pw2){ alert("암호가 일치하지 않습니다"); return }
  catPasswords[cat] = await hashPw(pw)
  unlockedCats.add(cat)
  saveCatPasswords()
  renderCategories(); renderLinks()
  alert(`"${cat}" 암호가 설정되었습니다`)
}

async function tryUnlockCat(cat){
  if(unlockedCats.has(cat)) return true
  if(!catPasswords[cat]) return true
  const pw = prompt(`🔒 "${cat}" 잠긴 카테고리\n암호를 입력하세요`)
  if(!pw) return false
  const h = await hashPw(pw)
  if(h === catPasswords[cat]){
    unlockedCats.add(cat)
    return true
  }
  alert("암호가 틀렸습니다")
  return false
}

function isCatLocked(cat){
  return catPasswords[cat] && !unlockedCats.has(cat)
}

/* ══════════════════════════════════════════
   깨진 한글 자동 복구
══════════════════════════════════════════ */
function fixGarbled(str){
  if(typeof str !== "string") return str
  if(/[가-힣]/.test(str)) return str
  if(!/[\x80-\xFF]/.test(str)) return str
  try{
    const bytes = new Uint8Array(str.length)
    for(let i=0; i<str.length; i++) bytes[i] = str.charCodeAt(i) & 0xFF
    const decoded = new TextDecoder("utf-8", {fatal:true}).decode(bytes)
    return decoded
  }catch(e){
    return str
  }
}

function fixGarbledData(obj){
  if(Array.isArray(obj)){
    return obj.map(item => fixGarbledData(item))
  } else if(obj && typeof obj === "object"){
    const fixed = {}
    for(const [k, v] of Object.entries(obj)){
      const fixedKey = fixGarbled(k)
      if(typeof v === "string"){
        fixed[fixedKey] = fixGarbled(v)
      } else {
        fixed[fixedKey] = fixGarbledData(v)
      }
    }
    return fixed
  }
  return obj
}

function load(){
  const s=localStorage.getItem("lmData")
  if(s){
    let parsed=JSON.parse(s)
    parsed = fixGarbledData(parsed)
    if(parsed.__lmgroups__){
      groupsData=parsed.__lmgroups__
      saveGroups()
      delete parsed.__lmgroups__
    }
    data=parsed
    currentCategory=Object.keys(data).filter(k=>!k.startsWith("__"))[0] || "Home"
    save()
  }
}

   GitHub API 헬퍼
══════════════════════════════════════════ */

async function getFileSha(token, path){
  const r=await fetch(
    `https://api.github.com/repos/${GITHUB.user}/${GITHUB.repo}/contents/${path}`,
    {headers:{Authorization:`Bearer ${token}`}}
  )
  if(!r.ok) return null
  return (await r.json()).sha
}

async function ghPut(token, path, base64Content, message="update"){
  const sha = await getFileSha(token, path)
  const body = {message, content:base64Content}
  if(sha) body.sha = sha
  return fetch(
    `https://api.github.com/repos/${GITHUB.user}/${GITHUB.repo}/contents/${path}`,
    {method:"PUT", headers:{Authorization:`Bearer ${token}`,"Content-Type":"application/json"}, body:JSON.stringify(body)}
  )
}

async function ghGet(token, path){
  const r=await fetch(
    `https://api.github.com/repos/${GITHUB.user}/${GITHUB.repo}/contents/${path}`,
    {headers:{Authorization:`Bearer ${token}`}}
  )
  if(!r.ok){
    const errJson=await r.json().catch(()=>({}))
    throw new Error(`GitHub API 오류 [${r.status}]: ${errJson.message||r.statusText} (${path})`)
  }
  const json=await r.json()
  if(json.content && json.content.trim()!=="") return json.content
  if(json.download_url){
    const dr=await fetch(json.download_url)
    if(!dr.ok) throw new Error(`download_url 실패 [${dr.status}]: ${path}`)
    const blob=await dr.blob()
    return await new Promise(resolve=>{
      const reader=new FileReader()
      reader.onload=()=>resolve(reader.result.split(",")[1])
      reader.readAsDataURL(blob)
    })
  }
  return null
}

function safeDirName(cat){
  return (cat||"default").replace(/[\\/:*?"<>|]/g,"").replace(/\\s+/g,"_") || "default"
}
function makeImgPath(id, suffix, cat){
  const dir = safeDirName(cat || currentCategory)
  return `${GITHUB.imgDir}/${dir}/${id}_${suffix}.jpg`
}

/* ══════════════════════════════════════════
   ⬆ GitHub 업로드
══════════════════════════════════════════ */
async function syncToGit(silent=false){
  const token=await getToken(); if(!token) return

  // 이전에 저장된 이미지 SHA 맵 로드
  let knownImgSHA = {}
  try{
    const prev = localStorage.getItem("lmImgSHA")
    if(prev) knownImgSHA = JSON.parse(prev)
  }catch{}

  // 업로드할 파일/이미지 목록 수집
  const uploads = []
  Object.entries(data).forEach(([k,items]) => {
    if(k.startsWith("__")||!Array.isArray(items)) return
    items.forEach(item => {
      for(const key of ["imgFile","thumbFile","iconFile","fileData"]){
        if(!item[key] || !imageCache.has(item[key])) continue
        const val = imageCache.get(item[key])
        let b64
        if(key==="fileData"){
          try{ b64=btoa(val) }catch{ b64=btoa(unescape(encodeURIComponent(val))) }
        } else {
          b64 = val.startsWith("data:") ? dataURLtoBase64(val) : (()=>{ try{ return btoa(val) }catch{ return val } })()
        }
        const fingerprint = b64.length + "|" + b64.slice(0,50)
        if(knownImgSHA[item[key]] === fingerprint) continue
        uploads.push({path:item[key], b64, fingerprint})
      }
    })
  })

  const total = uploads.length + 1
  let done = 0
  const newImgSHA = Object.assign({}, knownImgSHA)
  try{
    if(!silent) showProgress(`이미지 ${uploads.length}개 업로드 시작...`, 2)
    for(const {path, b64, fingerprint} of uploads){
      if(!silent) showProgress(`이미지 업로드 (${done+1}/${uploads.length})`, Math.round(done/total*95))
      const res = await ghPut(token, path, b64, "add image")
      if(res.ok) newImgSHA[path] = fingerprint
      else console.warn("이미지 업로드 실패:", path, res.status)
      done++
    }
    if(!silent) showProgress("JSON 업로드 중...", 97)

    let todosData = {}, pomoLogData = {}, clickLogData = {}, catPwData = {}
    try{ todosData    = JSON.parse(localStorage.getItem("lmTodos")||"{}") }catch{}
    try{ pomoLogData  = JSON.parse(localStorage.getItem("lmPomoLog")||"{}") }catch{}
    try{ clickLogData = JSON.parse(localStorage.getItem("lmClickLog")||"{}") }catch{}
    try{ catPwData    = JSON.parse(localStorage.getItem("lmCatPw")||"{}") }catch{}

    const uploadData = Object.assign({}, data, {
      __lmgroups__: groupsData,
      __todos__:    todosData,
      __pomolog__:  pomoLogData,
      __clicklog__: clickLogData,
      __catpw__:    catPwData,
      __imgSHA__:   newImgSHA
    })
    const res = await ghPut(token, GITHUB.dataPath, b64EncodeUnicode(JSON.stringify(uploadData,null,2)), "update data")
    if(res.ok){
      localStorage.setItem("lmImgSHA", JSON.stringify(newImgSHA))
    }
    hideProgress()
    if(!silent){
      const msg = uploads.length > 0
        ? `업로드 완료 (이미지 ${uploads.length}개 변경분 + JSON)`
        : `업로드 완료 (이미지 변경 없음, JSON만)`
      alert(res.ok ? msg : "JSON 업로드 실패: "+res.status)
    } else if(!res.ok){
      throw new Error("JSON 업로드 실패: "+res.status)
    }
  }catch(e){
    hideProgress()
    if(!silent) alert("업로드 오류: "+e.message)
    else throw e
  }
}

/* ══════════════════════════════════════════
   ⬇ GitHub 동기화
══════════════════════════════════════════ */
async function syncFromGit(){
  const token=await getToken(); if(!token) return
  try{
    showProgress("JSON 다운로드 중...", 3)
    const jsonB64 = await ghGet(token, GITHUB.dataPath)
    if(!jsonB64){ hideProgress(); return alert("GitHub에서 파일을 찾을 수 없습니다.\n경로: "+GITHUB.user+"/"+GITHUB.repo+"/"+GITHUB.dataPath) }
    let parsed = JSON.parse(b64DecodeUnicode(jsonB64))
    parsed = fixGarbledData(parsed)

    // studyapp이 lmData(raw string) 포맷으로 업로드한 경우 변환
    if(parsed.lmData !== undefined){
      try{
        const lmDataObj = typeof parsed.lmData === 'string' ? JSON.parse(parsed.lmData) : parsed.lmData
        const lmGroupsArr = typeof parsed.lmGroups === 'string' ? JSON.parse(parsed.lmGroups||'[]') : (parsed.lmGroups||[])
        // lmData를 root에 펼쳐서 linkmanager 네이티브 포맷으로 변환
        Object.assign(parsed, lmDataObj)
        parsed.__lmgroups__ = lmGroupsArr
        delete parsed.lmData
        delete parsed.lmGroups
      }catch(e){ console.warn('lmData 변환 실패', e) }
    }

    if(parsed.__lmgroups__){
      groupsData = parsed.__lmgroups__
      saveGroups()
      delete parsed.__lmgroups__
    }

    if(parsed.__todos__){
      localStorage.setItem("lmTodos", JSON.stringify(parsed.__todos__))
      delete parsed.__todos__
    }
    if(parsed.__pomolog__){
      localStorage.setItem("lmPomoLog", JSON.stringify(parsed.__pomolog__))
      delete parsed.__pomolog__
    }
    if(parsed.__clicklog__ || parsed.lmClickLog){
      const cl = parsed.__clicklog__ || (typeof parsed.lmClickLog==='string' ? JSON.parse(parsed.lmClickLog||'{}') : parsed.lmClickLog)
      localStorage.setItem("lmClickLog", JSON.stringify(cl))
      delete parsed.__clicklog__; delete parsed.lmClickLog
    }
    if(parsed.__catpw__){
      localStorage.setItem("lmCatPw", JSON.stringify(parsed.__catpw__))
      catPasswords = parsed.__catpw__
      unlockedCats = new Set()
      delete parsed.__catpw__
    }
    if(parsed.__imgSHA__){
      localStorage.setItem("lmImgSHA", JSON.stringify(parsed.__imgSHA__))
      delete parsed.__imgSHA__
    }
    // 잔여 메타 키 정리
    ;['darkMode','__pomoconfig__','pomoConfig'].forEach(k=>delete parsed[k])

    data = parsed
    currentCategory = Object.keys(data).filter(k=>!k.startsWith("__"))[0] || "Home"
    save()

    const needed = new Set()
    const fileDataPaths = new Set()
    Object.entries(data).forEach(([k,items]) => {
      if(k.startsWith("__")||!Array.isArray(items)) return
      items.forEach(item => {
        for(const key of ["imgFile","thumbFile","iconFile","fileData"]){
          if(item[key] && !imageCache.has(item[key])) needed.add(item[key])
        }
        if(item.fileData) fileDataPaths.add(item.fileData)
      })
    })

    const arr = [...needed]
    let done = 0
    for(const path of arr){
      showProgress(`파일 다운로드 (${done+1}/${arr.length})`, 5 + Math.round(done/Math.max(arr.length,1)*92))
      const b64 = await ghGet(token, path)
      if(b64){
        const clean = b64.replace(/\n/g,"")
        if(fileDataPaths.has(path)){
          // 파일: btoa로 감싸서 올렸으므로 atob로 복원
          try{ imageCache.set(path, atob(clean)) }
          catch{ imageCache.set(path, clean) }
        } else {
          const raw = atob(clean)
          if(raw.startsWith("\xFF\xD8") || clean.startsWith("/9j")){
            imageCache.set(path, "data:image/jpeg;base64,"+clean)
          } else {
            try{ imageCache.set(path, atob(clean)) }
            catch{ imageCache.set(path, clean) }
          }
        }
      }
      done++
    }

    saveImageCache()
    hideProgress()
    renderGroups(); renderCategories(); renderLinks()
    renderTodos()
    updatePomoBadge()
    updateClickStatBadge()
    alert("동기화 완료 (할일·뽀모도로·클릭기록·카테고리암호 포함)")
  }catch(e){
    hideProgress(); alert("동기화 오류: "+e.message)
  }
}

async function addLink(){
  const type  = document.getElementById("type").value
  const title = document.getElementById("title").value
  const url   = document.getElementById("url").value
  const text  = document.getElementById("text").value
  const files = document.getElementById("file").files   // FileList (다중 가능)
  if(!title) return alert("제목 입력")

  if(type === "photo" && files.length > 0){
    // 암호 설정은 한 번만 물어보기
    let pw = null, encrypted = false
    if(confirm("사진에 암호를 설정하시겠습니까?")){
      pw = prompt("암호 입력")
      if(pw) encrypted = true
    }

    for(let i = 0; i < files.length; i++){
      const file = files[i]
      const id   = Date.now() + i   // 같은 ms 충돌 방지
      const cardTitle = files.length === 1 ? title : `${title} (${i+1})`

      showProgress(`사진 처리 중 (${i+1}/${files.length})`, Math.round(i/files.length*90))

      const fullDataURL  = await compressToDataURL(file, 1920, 0.92)
      const thumbDataURL = await makeThumbDataURL(file)
      const imgFile   = makeImgPath(id, "full",  currentCategory)
      const thumbFile = makeImgPath(id, "thumb", currentCategory)

      let storedFull = fullDataURL
      if(pw){ storedFull = await encryptText(fullDataURL, pw) }

      imageCache.set(imgFile,   storedFull)
      imageCache.set(thumbFile, thumbDataURL)
      data[currentCategory].push({id, title:cardTitle, type, imgFile, thumbFile, encrypted, favorite:false})
    }

    saveImageCache()
    hideProgress()

  } else if(type === "link" || type === "youtube"){
    const id = Date.now()
    data[currentCategory].push({id, title, url, text, type, iconFile:null, favorite:false})
    // 루틴 분류이더라도 즐겨찾기 시에만 practicecheck 항목 등록 (favorite 토글 시점에서 처리)
  } else if(type === "text"){
    const id = Date.now()
    let encrypted=false, storedText=text
    if(confirm("텍스트를 암호화하시겠습니까?")){
      const pw=prompt("암호 입력")
      if(pw){ storedText=await encryptText(text,pw); encrypted=true }
    }
    data[currentCategory].push({id, title, text:storedText, type, encrypted, favorite:false})
  } else if(type === "file"){
    if(files.length === 0) return alert("파일을 선택해주세요")
    let pw = null, encrypted = false
    if(confirm("파일에 암호를 설정하시겠습니까?")){
      pw = prompt("암호 입력")
      if(pw) encrypted = true
    }
    for(let i = 0; i < files.length; i++){
      const file = files[i]
      const id = Date.now() + i
      const cardTitle = files.length === 1 ? title : `${title} (${i+1})`
      const ext = file.name.split(".").pop().toLowerCase()
      const origName = file.name
      showProgress(`파일 처리 중 (${i+1}/${files.length})`, Math.round(i/files.length*90))
      const b64DataURL = await new Promise(resolve => {
        const reader = new FileReader()
        reader.onload = e => resolve(e.target.result)
        reader.readAsDataURL(file)
      })
      let stored = b64DataURL
      if(pw){ stored = await encryptText(b64DataURL, pw) }
      const filePath = makeImgPath(id, "file_"+ext, currentCategory)
      imageCache.set(filePath, stored)
      data[currentCategory].push({id, title:cardTitle, type, fileData:filePath, ext, origName, encrypted, favorite:false})
    }
    saveImageCache()
    hideProgress()
  }

  save(); renderLinks()
  document.getElementById("title").value=""
  document.getElementById("url").value=""
  document.getElementById("text").value=""
  document.getElementById("file").value=""
}
