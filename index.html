<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📝 Notepad</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f0f13;
  --surface:#16161e;
  --card:#1e1e2a;
  --card2:#252535;
  --text:#e8e8f0;
  --text2:#a0a0b8;
  --sub:#5a5a72;
  --border:#2a2a3e;
  --accent:#7c6af7;
  --accent-light:#1e1a3e;
  --accent2:#4af7c4;
  --red:#f76a6a;
  --orange:#f7a84a;
  --yellow:#f7e34a;
  --green:#4af77a;
  --blue:#4ab4f7;
  --indigo:#7c6af7;
  --pink:#f76ab4;
  --white:#ffffff;
  --star:#f7d44a;
  --radius:12px;
  --shadow:0 2px 16px rgba(0,0,0,0.4);
  --shadow-md:0 4px 24px rgba(0,0,0,0.5);
}

*{ box-sizing:border-box; margin:0; padding:0; }

body{
  font-family:'Syne', sans-serif;
  background:var(--bg);
  color:var(--text);
  font-size:14px;
  height:100dvh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  user-select:none;
}

/* ── Scrollbar ── */
::-webkit-scrollbar{ width:5px; height:5px; }
::-webkit-scrollbar-track{ background:transparent; }
::-webkit-scrollbar-thumb{ background:var(--border); border-radius:99px; }

/* ── Button base ── */
button{
  font-family:'Syne', sans-serif;
  cursor:pointer;
  border:none;
  outline:none;
  transition:all 0.14s;
}

/* ══════════════════════════════
   HEADER — 2줄 고정 툴바 (iPad 최적화)
══════════════════════════════ */
#headerBar{
  display:flex; flex-direction:column;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  flex-shrink:0; position:relative; z-index:100;
  -webkit-user-select:none; user-select:none;
}
/* 행1: 제목 + 저장/동기화/모드 */
#tb-row1{
  display:flex; align-items:center; gap:5px;
  padding:5px 8px; min-height:44px;
  border-bottom:1px solid var(--border);
}
/* 행2: 도구 + 색상 + 옵션 */
#tb-row2{
  display:flex; align-items:center; gap:4px;
  padding:4px 8px; min-height:42px;
}
.brand{
  font-size:14px; font-weight:800; color:var(--accent);
  letter-spacing:-0.5px; white-space:nowrap; flex-shrink:0;
}
.hbtn{
  padding:5px 10px; border-radius:8px;
  background:var(--card2); color:var(--text2);
  font-size:12px; font-weight:600;
  border:1px solid var(--border); white-space:nowrap;
  flex-shrink:0; touch-action:manipulation;
  font-family:'Syne',sans-serif; min-height:34px;
}
.hbtn:hover{ background:var(--accent-light); color:var(--accent); border-color:var(--accent); }
.hbtn.danger{ color:var(--red); }
.hbtn.danger:hover{ background:rgba(247,106,106,0.12); border-color:var(--red); }
.hsep{ width:1px; height:18px; background:var(--border); flex-shrink:0; margin:0 1px; }
.hspacer{ flex:1; min-width:0; }

/* 도구 버튼 */
.tool-btn{
  width:38px; height:38px; border-radius:9px;
  background:transparent; color:var(--text2);
  font-size:17px; border:1.5px solid transparent;
  flex-shrink:0; display:flex; align-items:center; justify-content:center;
  touch-action:manipulation;
}
.tool-btn:hover{ background:var(--accent-light); border-color:var(--accent); }
.tool-btn.active-tool{
  background:var(--accent-light); border-color:var(--accent);
  box-shadow:0 0 0 2px rgba(124,106,247,0.25);
}

/* 색상 점 */
.clr-dot{
  width:22px; height:22px; border-radius:50%; cursor:pointer;
  border:2px solid transparent; transition:transform 0.12s;
  flex-shrink:0; touch-action:manipulation;
}
.clr-dot.selected{ border-color:var(--accent); outline:2px solid var(--accent); outline-offset:1px; }

/* 굵기 */
#noteWidthSliderH{ width:70px; cursor:pointer; flex-shrink:0; accent-color:var(--accent); touch-action:manipulation; }
#noteWidthLabelH{ font-size:11px; color:var(--sub); min-width:18px; flex-shrink:0; font-family:'JetBrains Mono',monospace; text-align:center; }

/* 줌 */
#noteZoomLabelH{ font-size:11px; color:var(--sub); min-width:34px; text-align:center; flex-shrink:0; font-family:'JetBrains Mono',monospace; }

/* 제목 */
#noteTitleInputH{
  flex:1; min-width:60px; max-width:180px;
  padding:5px 10px; font-family:'Syne',sans-serif;
  font-size:13px; font-weight:700;
  background:var(--card); color:var(--text);
  border:1px solid var(--border); border-radius:8px;
  outline:none; min-height:34px;
  transition:border-color 0.14s;
}
#noteTitleInputH:focus{ border-color:var(--accent); }

/* 사이드바 토글 */
#sidebarToggle{
  width:38px; height:38px; border-radius:9px; font-size:15px;
  background:var(--card2); color:var(--sub); border:1px solid var(--border);
  flex-shrink:0; display:flex; align-items:center; justify-content:center;
  touch-action:manipulation;
}
#sidebarToggle:hover{ color:var(--accent); border-color:var(--accent); background:var(--accent-light); }

/* 펜 모드 버튼 */
#palmModeBtn{
  padding:5px 10px; border-radius:8px; font-size:12px; font-weight:700;
  border:1.5px solid var(--border); background:var(--card2); color:var(--text2);
  flex-shrink:0; white-space:nowrap; transition:all 0.14s;
  font-family:'Syne',sans-serif; touch-action:manipulation; min-height:34px;
}
#palmModeBtn.pen-only{ background:rgba(124,106,247,0.18); border-color:var(--accent); color:var(--accent); }
#palmModeBtn.finger-ok{ background:rgba(74,247,196,0.13); border-color:#4af7c4; color:#4af7c4; }

/* 지우개 옵션 바 */
#noteToolbar2H{
  display:none; align-items:center; gap:5px;
  padding:3px 10px; background:var(--card);
  border-bottom:1px solid var(--border); flex-shrink:0;
  font-size:11px; color:var(--sub); min-height:32px;
  -webkit-user-select:none; user-select:none;
}
#noteToolbar2H.visible{ display:flex; }
.mode-pill{
  padding:4px 11px; border-radius:999px; font-size:11px; font-weight:600;
  border:1.5px solid var(--border); background:var(--card2); cursor:pointer;
  transition:all 0.12s; white-space:nowrap; color:var(--text2); touch-action:manipulation;
}
.mode-pill:hover{ border-color:var(--accent); color:var(--accent); }
.mode-pill.active{ background:var(--accent); color:#fff; border-color:var(--accent); }

/* 더블탭 Undo 피드백 */
#undoFlash{
  position:fixed; inset:0; background:rgba(124,106,247,0.12);
  pointer-events:none; opacity:0; z-index:9990; transition:opacity 0.3s;
}
#undoFlash.flash{ opacity:1; }

/* ══════════════════════════════
   MAIN LAYOUT
══════════════════════════════ */
#appBody{ display:flex; flex:1; overflow:hidden; min-height:0; }

/* ══════════════════════════════
   SIDEBAR
══════════════════════════════ */
#sidebar{
  width:220px; min-width:220px;
  background:var(--surface); border-right:1px solid var(--border);
  display:flex; flex-direction:column; overflow:hidden; flex-shrink:0;
  transition:width 0.22s cubic-bezier(0.4,0,0.2,1), min-width 0.22s;
  -webkit-user-select:none; user-select:none;
}
#sidebar.collapsed{ width:0; min-width:0; }
</style>
</head>
<body>

<!-- ══ Header (2줄 툴바) ══ -->
<div id="headerBar">

  <!-- 1행: 제목 / 저장·동기화 / 모드 -->
  <div id="tb-row1">
    <button id="sidebarToggle" onclick="toggleSidebar()" title="사이드바 토글">☰</button>
    <span class="brand">📝</span>
    <input id="noteTitleInputH" placeholder="노트 제목..." onchange="noteUpdateTitle()" onblur="noteUpdateTitle()">
    <div class="hspacer"></div>
    <button onclick="noteUndo()" class="hbtn" title="실행취소 (Ctrl+Z)">↩</button>
    <button onclick="noteRedo()" class="hbtn" title="다시실행 (Ctrl+Y)">↪</button>
    <div class="hsep"></div>
    <button onclick="noteSyncUpload()" class="hbtn" title="GitHub 저장">⬆</button>
    <button onclick="noteSyncDownload()" class="hbtn" title="GitHub 불러오기">⬇</button>
    <div class="hsep"></div>
    <button id="palmModeBtn" onclick="togglePalmMode()" class="pen-only" title="터치 모드 전환">🖊 펜</button>
    <button onclick="toggleDarkCanvas()" class="hbtn" id="darkCanvasBtn" title="배경 토글">🌙</button>
    <button onclick="noteExportPNG()" class="hbtn" title="PNG 저장">💾</button>
  </div>

  <!-- 2행: 도구 / 색상 / 굵기 / 배경 / 사진·텍스트 / 줌 -->
  <div id="tb-row2">
    <!-- 도구 버튼 -->
    <button id="noteTool-pen"       class="tool-btn active-tool" onclick="noteSetTool('pen')"       title="연필 (P)">✏️</button>
    <button id="noteTool-fountain"  class="tool-btn"             onclick="noteSetTool('fountain')"  title="만년필 (F)">🖊️</button>
    <button id="noteTool-brush"     class="tool-btn"             onclick="noteSetTool('brush')"     title="붓 (B)">🖌</button>
    <button id="noteTool-highlight" class="tool-btn"             onclick="noteSetTool('highlight')" title="형광펜 (H)">🟡</button>
    <button id="noteTool-lasso"     class="tool-btn"             onclick="noteSetTool('lasso')"     title="올가미 (L)">⭕</button>
    <button id="noteTool-eraser"    class="tool-btn"             onclick="noteSetTool('eraser')"    title="지우개 (E)">⬜</button>
    <div class="hsep"></div>
    <!-- 색상 -->
    <input type="color" id="noteColorPickerH" value="#e8e8f0" oninput="noteSetColor(this.value)"
      style="width:26px;height:26px;border-radius:6px;border:1px solid var(--border);cursor:pointer;padding:1px 2px;flex-shrink:0;touch-action:manipulation;">
    <div id="noteColorDotsH" style="display:flex;gap:3px;align-items:center;"></div>
    <div class="hsep"></div>
    <!-- 굵기 -->
    <input type="range" id="noteWidthSliderH" min="1" max="60" value="3" oninput="noteSetWidth(this.value)">
    <span id="noteWidthLabelH">3</span>
    <div class="hsep"></div>
    <!-- 배경 -->
    <button onclick="noteToggleBgType()" id="noteBgBtnH" class="hbtn">📄</button>
    <input type="color" id="noteBgColorPickerH" value="#1a1a24" oninput="noteSetBgColor(this.value)"
      title="배경색" style="width:26px;height:26px;border-radius:6px;border:1px solid var(--border);cursor:pointer;padding:1px 2px;flex-shrink:0;touch-action:manipulation;">
    <div class="hsep"></div>
    <!-- 삽입 -->
    <button onclick="document.getElementById('noteImgInputH').click()" class="hbtn" title="사진 추가">📷</button>
    <button onclick="noteInsertTextBox()" class="hbtn" title="텍스트 상자">📝</button>
    <button onclick="noteClearCanvas()" class="hbtn danger" title="전체 초기화">🗑</button>
    <input type="file" id="noteImgInputH" accept="image/*" style="display:none" onchange="noteHandleFileInput(this)">
    <div class="hsep"></div>
    <!-- 줌 -->
    <button onclick="noteZoomChange(-0.25)" class="hbtn" style="padding:5px 9px;" title="축소">−</button>
    <span id="noteZoomLabelH">100%</span>
    <button onclick="noteZoomChange(+0.25)" class="hbtn" style="padding:5px 9px;" title="확대">+</button>
    <button onclick="noteZoomReset()" class="hbtn" style="padding:5px 8px;font-size:10px;" title="100%">↺</button>
  </div>

</div>

<div id="undoFlash"></div>

<!-- ── 지우개/올가미 옵션 바 ── -->
<div id="noteToolbar2H">
  <span id="noteToolOptsH"></span>
</div>

<!-- ══ Body ══ -->
<div id="appBody">

  <!-- Sidebar -->
  <div id="sidebar">
    <div class="sidebar-section">
      <button id="newNoteBtn" onclick="noteNewNote()">+ 새 노트</button>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">
        <span>카테고리</span>
        <button onclick="noteAddCategory()">+</button>
      </div>
      <div id="noteCategoryList" style="display:flex;flex-direction:column;gap:2px;max-height:130px;overflow-y:auto;"></div>
    </div>
    <div id="noteList"></div>
    <div style="padding:10px 12px;border-top:1px solid var(--border);flex-shrink:0;">
      <button onclick="noteNewNote()" id="newNoteBtn">+ 새 노트</button>
    </div>
  </div>

  <!-- Canvas -->
  <div id="canvasArea">
    <div id="noteCanvasOuter">
      <div id="noteZoomSpacer" style="position:relative;flex-shrink:0;">
        <div id="noteCanvasContainer" style="position:absolute;top:0;left:0;transform-origin:top left;">
          <canvas id="noteCanvas"     style="display:block;border-radius:8px;box-shadow:0 4px 32px rgba(0,0,0,0.5);cursor:crosshair;touch-action:none;"></canvas>
          <canvas id="noteTempCanvas" style="position:absolute;top:0;left:0;border-radius:8px;pointer-events:none;"></canvas>
          <canvas id="noteSelCanvas"  style="position:absolute;top:0;left:0;border-radius:8px;pointer-events:none;"></canvas>
        </div>
      </div>
      <div id="emptyState">
        <div class="big">📝</div>
        <div class="msg">왼쪽에서 노트를 선택하거나 새 노트를 만드세요</div>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
/* ══════════════════════════════════════════
   📝 NOTE SYSTEM — Standalone App
   원본: linkmanage__2_.html 노트 모듈
══════════════════════════════════════════ */

const NOTE_LS_IDX  = 'lmNotes_index'
const NOTE_LS_DATA = id => 'lmNotes_' + id
const NOTE_GH_IDX  = 'data/notes/_index.json'
const NOTE_GH_PATH = (cat, id) =>
  `data/notes/${encodeURIComponent(safeDirName(cat))}/${id}.json`

const NOTE_COLORS = ['#e8e8f0','#f76a6a','#f7a84a','#f7e34a','#4af77a','#4ab4f7','#7c6af7','#f76ab4','#4af7c4','#1a1a24']
const NOTE_BG_TYPES  = ['plain','grid','lined']
const NOTE_BG_LABELS = ['📄 흰배경','📐 모눈','📃 줄']

/* default background is dark (#1a1a24) matching app theme */
let noteState = {
  tool:'pen', color:'#e8e8f0', width:3,
  bgType:0, bgColor:'#1a1a24',
  eraserMode:'pixel',
  currentNoteId:null, currentCategory:'일반',
  strokes:[], objects:[],
  undoStack:[], redoStack:[],
  isDrawing:false, curStrokePts:[],
  lassoActive:false, lassoPts:[],
  selectedIdxs:[], selBBox:null,
  selDragging:false, selDragOrigin:null, selStrokesOrigin:null,
  zoom:1,
  _pinchPtrs:{}, _pinchDist:0,
  _dpr:1, _W:0, _H:0, _pageH:0,
  _initialized:false,
  palmMode:true   // true = 펜 전용 (손가락 드로잉 차단)
}
let noteIndex = { categories:['일반'], notes:[] }
let sidebarOpen = true

/* ── helpers ── */
function noteEl(id){ return document.getElementById(id) }
function noteCtx(id){ return noteEl(id)?.getContext('2d') }

function showToast(msg, ok=null){
  const t=noteEl('toast')
  t.textContent=msg
  t.style.borderColor = ok===true ? '#4af77a' : ok===false ? '#f76a6a' : 'var(--border)'
  t.classList.add('show')
  clearTimeout(t._tid)
  t._tid=setTimeout(()=>t.classList.remove('show'), 2200)
}

/* ── index ── */
function noteLoadIndex(){
  try{
    const r=localStorage.getItem(NOTE_LS_IDX)
    if(r) noteIndex=JSON.parse(r)
    if(!noteIndex.categories?.length) noteIndex.categories=['일반']
    if(!Array.isArray(noteIndex.notes)) noteIndex.notes=[]
  }catch{ noteIndex={categories:['일반'],notes:[]} }
}
function noteSaveIndex(){ localStorage.setItem(NOTE_LS_IDX,JSON.stringify(noteIndex)) }

/* ── sidebar render ── */
function noteRenderSidebar(){
  const catEl=noteEl('noteCategoryList')
  if(catEl) catEl.innerHTML=noteIndex.categories.map(cat=>`
    <div class="cat-item ${noteState.currentCategory===cat?'active':''}"
      onclick="noteSelectCategory('${cat.replace(/'/g,"\\'")}')">
      <span>📁 ${cat}</span>
      ${cat!=='일반'?`<span class="cat-del" onclick="event.stopPropagation();noteDeleteCategory('${cat.replace(/'/g,"\\'")}');" title="삭제">✕</span>`:''}
    </div>`).join('')

  const listEl=noteEl('noteList')
  if(!listEl) return
  const notes=noteIndex.notes.filter(n=>n.category===noteState.currentCategory)
  if(!notes.length){
    listEl.innerHTML='<div class="empty-note">노트가 없습니다.<br>새 노트를 만들어보세요.</div>'
    return
  }
  listEl.innerHTML=notes.map(n=>`
    <div class="note-item ${noteState.currentNoteId===n.id?'active':''}" onclick="noteOpenNote('${n.id}')">
      <div class="note-item-title">${n.title||'제목 없음'}</div>
      <div class="note-item-meta">
        <span class="note-item-date">${(n.updatedAt||'').slice(0,10)}</span>
        <span class="note-item-del" onclick="event.stopPropagation();noteDeleteNote('${n.id}');" title="삭제">🗑</span>
      </div>
    </div>`).join('')
}

function noteRenderColorDots(){
  const el=noteEl('noteColorDotsH')
  if(!el) return
  el.innerHTML=NOTE_COLORS.map(c=>`
    <div class="clr-dot ${noteState.color===c?'selected':''}"
      style="background:${c};${c==='#1a1a24'?'border:2px solid #444!important;':''}"
      onclick="noteSetColor('${c}')"></div>`).join('')
}

/* ── categories ── */
function noteAddCategory(){
  const name=(prompt('새 카테고리 이름')||'').trim(); if(!name) return
  if(noteIndex.categories.includes(name)){alert('이미 있습니다');return}
  noteIndex.categories.push(name); noteSaveIndex(); noteRenderSidebar()
}
function noteDeleteCategory(cat){
  if(!confirm(`'${cat}' 카테고리와 모든 노트를 삭제할까요?`)) return
  noteIndex.notes.filter(n=>n.category===cat).forEach(n=>localStorage.removeItem(NOTE_LS_DATA(n.id)))
  noteIndex.notes=noteIndex.notes.filter(n=>n.category!==cat)
  noteIndex.categories=noteIndex.categories.filter(c=>c!==cat)
  if(noteState.currentCategory===cat) noteState.currentCategory=noteIndex.categories[0]||'일반'
  noteSaveIndex(); noteRenderSidebar()
  const r=noteIndex.notes.filter(n=>n.category===noteState.currentCategory)
  if(r.length) noteOpenNote(r[0].id); else noteNewNote()
}
function noteSelectCategory(cat){
  noteSaveCurrentNote(); noteState.currentCategory=cat; noteRenderSidebar()
  const notes=noteIndex.notes.filter(n=>n.category===cat)
  if(notes.length) noteOpenNote(notes[0].id); else noteNewNote()
}

/* ── note CRUD ── */
function noteNewNote(){
  noteSaveCurrentNote()
  const id='note_'+Date.now()
  noteIndex.notes.unshift({id,title:'새 노트',category:noteState.currentCategory,updatedAt:new Date().toISOString()})
  noteSaveIndex()
  noteState.currentNoteId=id
  noteState.strokes=[]; noteState.objects=[]; noteState.undoStack=[]; noteState.redoStack=[]
  noteState.selectedIdxs=[]; noteState.selBBox=null
  const ti=noteEl('noteTitleInputH'); if(ti) ti.value='새 노트'
  noteRedrawCanvas(); noteRenderSidebar(); noteRenderObjects()
  updateEmptyState()
}
function noteOpenNote(id){
  if(noteState.currentNoteId===id) return
  noteSaveCurrentNote(); noteState.currentNoteId=id
  try{
    const raw=JSON.parse(localStorage.getItem(NOTE_LS_DATA(id))||'{}')
    noteState.strokes=raw.strokes||[]
    noteState.objects=raw.objects||[]
    if(raw.bgColor) noteState.bgColor=raw.bgColor
    if(raw.bgType!=null) noteState.bgType=raw.bgType
  }catch{ noteState.strokes=[]; noteState.objects=[] }
  noteState.undoStack=[]; noteState.redoStack=[]
  noteState.selectedIdxs=[]; noteState.selBBox=null
  const meta=noteIndex.notes.find(n=>n.id===id)
  const ti=noteEl('noteTitleInputH'); if(ti) ti.value=meta?.title||'제목 없음'
  const bp=noteEl('noteBgColorPickerH'); if(bp) bp.value=noteState.bgColor||'#1a1a24'
  const bb=noteEl('noteBgBtnH'); if(bb) bb.textContent=NOTE_BG_LABELS[noteState.bgType||0]
  noteRedrawCanvas(); noteRenderSidebar(); noteRenderObjects()
  updateEmptyState()
}
function noteDeleteNote(id){
  if(!confirm('이 노트를 삭제할까요?')) return
  if(noteState.currentNoteId===id){ noteState.currentNoteId=null; noteState.strokes=[]; noteState.objects=[] }
  noteIndex.notes=noteIndex.notes.filter(n=>n.id!==id)
  localStorage.removeItem(NOTE_LS_DATA(id)); noteSaveIndex(); noteRenderSidebar()
  const r=noteIndex.notes.filter(n=>n.category===noteState.currentCategory)
  if(r.length) noteOpenNote(r[0].id); else { noteNewNote() }
}
function noteSaveCurrentNote(){
  if(!noteState.currentNoteId) return
  localStorage.setItem(NOTE_LS_DATA(noteState.currentNoteId),JSON.stringify({
    strokes:noteState.strokes,
    objects:noteState.objects.map(o=>{const c={...o};delete c._imgEl;return c}),
    bgColor:noteState.bgColor, bgType:noteState.bgType
  }))
  const meta=noteIndex.notes.find(n=>n.id===noteState.currentNoteId)
  if(meta){meta.updatedAt=new Date().toISOString(); noteSaveIndex()}
}
function noteUpdateTitle(){
  if(!noteState.currentNoteId) return
  const title=(noteEl('noteTitleInputH')?.value||'').trim()||'제목 없음'
  const meta=noteIndex.notes.find(n=>n.id===noteState.currentNoteId)
  if(meta){meta.title=title; noteSaveIndex(); noteRenderSidebar()}
}

/* ── tools ── */
function noteSetTool(tool){
  noteState.tool=tool
  if(tool!=='lasso'){ noteState.selectedIdxs=[]; noteState.selBBox=null; noteDrawSelCanvas() }
  document.querySelectorAll('.tool-btn').forEach(b=>b.classList.remove('active-tool'))
  noteEl('noteTool-'+tool)?.classList.add('active-tool')
  const c=noteEl('noteCanvas'); if(c) c.style.cursor='crosshair'
  noteUpdateToolOpts(tool)
}
function noteUpdateToolOpts(tool){
  const bar=noteEl('noteToolbar2H'), opts=noteEl('noteToolOptsH')
  if(!bar||!opts) return
  if(tool==='eraser'){
    opts.innerHTML=`
      <span style="color:var(--sub);margin-right:5px;">지우개 모드:</span>
      <span class="mode-pill ${noteState.eraserMode==='pixel'?'active':''}"  onclick="noteSetEraserMode('pixel')">부분 지우기</span>
      <span class="mode-pill ${noteState.eraserMode==='stroke'?'active':''}" onclick="noteSetEraserMode('stroke')">획 단위 지우기</span>
      <span class="mode-pill ${noteState.eraserMode==='region'?'active':''}" onclick="noteSetEraserMode('region')">영역 지우기</span>`
    bar.classList.add('visible')
  } else if(tool==='lasso'){
    opts.innerHTML=`<span style="color:var(--sub);">올가미로 영역을 그리면 스트로크를 선택합니다. 선택 후 드래그로 이동 | Del/Backspace 로 삭제</span>`
    bar.classList.add('visible')
  } else {
    opts.innerHTML=''; bar.classList.remove('visible')
  }
}
function noteSetEraserMode(mode){
  noteState.eraserMode=mode
  document.querySelectorAll('.mode-pill').forEach(p=>{
    p.classList.toggle('active', p.textContent.includes(mode==='pixel'?'부분':mode==='stroke'?'획':'영역'))
  })
}
function noteSetColor(color){
  noteState.color=color
  const cp=noteEl('noteColorPickerH'); if(cp) cp.value=color
  noteRenderColorDots()
}
function noteSetWidth(w){
  noteState.width=parseInt(w)
  const lbl=noteEl('noteWidthLabelH'); if(lbl) lbl.textContent=w
}
function noteToggleBgType(){
  noteState.bgType=(noteState.bgType+1)%NOTE_BG_TYPES.length
  const btn=noteEl('noteBgBtnH'); if(btn) btn.textContent=NOTE_BG_LABELS[noteState.bgType]

}
function noteSetBgColor(color){ noteState.bgColor=color; noteRedrawCanvas() }

/* ── dark canvas quick toggle ── */
let _darkCanvas=true
function toggleDarkCanvas(){
  _darkCanvas=!_darkCanvas
  noteState.bgColor=_darkCanvas?'#1a1a24':'#ffffff'
  const bp=noteEl('noteBgColorPickerH'); if(bp) bp.value=noteState.bgColor
  const btn=noteEl('darkCanvasBtn'); if(btn) btn.textContent=_darkCanvas?'🌙':'☀️'
  noteRedrawCanvas()
}

/* ── grid line color ── */
function noteGridColor(){
  const bg=noteState.bgColor||'#1a1a24'
  const r=parseInt(bg.slice(1,3),16)||26
  const g=parseInt(bg.slice(3,5),16)||26
  const b=parseInt(bg.slice(5,7),16)||36
  const lum=(0.299*r+0.587*g+0.114*b)/255
  return lum>0.5?'rgba(0,0,0,0.13)':'rgba(255,255,255,0.12)'
}

/* ── zoom ── */
function noteZoomChange(delta){ noteApplyZoom(Math.max(0.2,Math.min(4,noteState.zoom+delta))) }
function noteZoomReset(){ noteApplyZoom(1) }
function noteApplyZoom(z){
  noteState.zoom=z
  const cont=noteEl('noteCanvasContainer')
  if(cont) cont.style.transform=`scale(${z})`
  noteUpdateZoomSpacer()
  const lbl=noteEl('noteZoomLabelH'); if(lbl) lbl.textContent=Math.round(z*100)+'%'
}
function noteUpdateZoomSpacer(){
  const sp=noteEl('noteZoomSpacer')
  if(sp){
    sp.style.width=(noteState._W*noteState.zoom)+'px'
    sp.style.height=(noteState._H*noteState.zoom)+'px'
  }
}

/* ── sidebar toggle ── */
function toggleSidebar(){
  sidebarOpen=!sidebarOpen
  const sb=noteEl('sidebar')
  if(sidebarOpen){
    sb.style.width='220px'; sb.style.minWidth='220px'
  } else {
    sb.style.width='0'; sb.style.minWidth='0'
  }
  setTimeout(()=>noteInitCanvas(), 250)

/* ── empty state ── */
function updateEmptyState(){
  const es=noteEl('emptyState')
  if(!es) return
  es.classList.toggle('show', !noteState.currentNoteId)
}

/* ── canvas init ── */
function noteInitCanvas(){
  const canvas=noteEl('noteCanvas'), temp=noteEl('noteTempCanvas'), sel=noteEl('noteSelCanvas')
  const outer=noteEl('noteCanvasOuter')
  if(!canvas||!temp||!sel||!outer) return
  const dpr=window.devicePixelRatio||1
  const W=Math.min(Math.max(outer.clientWidth-40,400),1600)
  const pageH=Math.round(W*Math.sqrt(2))
  noteState._pageH=pageH
  const H=noteState._H||pageH*2
  noteResizeCanvases(W,H,dpr)
  if(!noteState._initialized){
    noteState._initialized=true
    noteAttachEvents(canvas,outer)
    document.addEventListener('keydown',noteKeyDown)
  }
  noteApplyZoom(noteState.zoom)
  noteRedrawCanvas(); noteRenderObjects(); noteDrawSelCanvas()
}

function noteResizeCanvases(W,H,dpr){
  dpr=dpr||noteState._dpr||1
  noteState._dpr=dpr; noteState._W=W; noteState._H=H
  ;[noteEl('noteCanvas'),noteEl('noteTempCanvas'),noteEl('noteSelCanvas')].forEach(c=>{
    if(!c) return
    c.width=Math.round(W*dpr); c.height=Math.round(H*dpr)
    c.style.width=W+'px'; c.style.height=H+'px'
    const ctx=c.getContext('2d'); ctx.setTransform(1,0,0,1,0,0); ctx.scale(dpr,dpr)
    ctx.lineCap='round'; ctx.lineJoin='round'
  })
  const cont=noteEl('noteCanvasContainer'); if(!cont) return
  cont.querySelectorAll('.page-sep').forEach(e=>e.remove())
  for(let y=noteState._pageH;y<H;y+=noteState._pageH){
    const line=document.createElement('div')
    line.className='page-sep'; line.style.top=y+'px'
    cont.appendChild(line)
  }
}

/* ══════════════════════════════════════════
   PALM MODE (펜 전용 / 손가락 허용)
══════════════════════════════════════════ */
function togglePalmMode(){
  noteState.palmMode = !noteState.palmMode
  const btn = noteEl('palmModeBtn')
  if(noteState.palmMode){
    btn.textContent = '🖊 펜 전용'
    btn.className = 'pen-only'
    showToast('🖊 펜 전용 모드 — 손가락 드로잉 차단됨')
  } else {
    btn.textContent = '✋ 터치 허용'
    btn.className = 'finger-ok'
    showToast('✋ 터치 허용 모드 — 손가락으로도 그릴 수 있습니다')
  }
}

/* 서드파티 스타일러스 호환:
   pointerType='pen' 이면 확실히 펜.
   pointerType='touch' 라도 접촉 면적(width/height)이 작으면 스타일러스로 간주.
   손가락은 보통 width/height 15px 이상 */
function _isLikelyFinger(e){
  if(e.pointerType === 'pen') return false      // 정품 펜슬 → 항상 펜
  if(e.pointerType === 'mouse') return false    // 마우스 → 펜처럼 취급
  if(e.pointerType === 'touch'){
    // 접촉면적이 크면 손가락, 작으면 스타일러스
    const w = e.width  || 0
    const h = e.height || 0
    if(w > 0 && h > 0) return (w > 14 || h > 14)
    // 면적 정보 없으면 터치는 손가락으로 간주
    return true
  }
  return false  // 알 수 없는 타입은 허용
}

/* ── pointer coordinate (coalescedEvents로 정밀도 향상) ── */
function noteGetPos(e){
  const canvas = noteEl('noteCanvas')
  const r = canvas.getBoundingClientRect()
  return {
    x: (e.clientX - r.left) / noteState.zoom,
    y: (e.clientY - r.top)  / noteState.zoom,
    p: e.pressure > 0 ? e.pressure : 0.5
  }
}

/* ── attach events ── */
function noteAttachEvents(canvas, outer){

  /* ── 더블탭 Undo 감지 (스타일러스/모든 입력 허용) ── */
  let _lastTapTime = 0, _lastTapPos = null
  canvas.addEventListener('pointerdown', e => {
    // 손가락 더블탭은 핀치줌 오인식 가능 → 스타일러스만
    if(_isLikelyFinger(e)) return
    const now = Date.now()
    const r = canvas.getBoundingClientRect()
    const cx = (e.clientX - r.left) / noteState.zoom
    const cy = (e.clientY - r.top)  / noteState.zoom
    const dt = now - _lastTapTime
    const dist = _lastTapPos ? Math.hypot(cx - _lastTapPos.x, cy - _lastTapPos.y) : 999
    if(dt < 400 && dist < 50){
      // 더블탭 → Undo
      e.preventDefault()
      _lastTapTime = 0; _lastTapPos = null
      noteState.isDrawing = false
      noteState.curStrokePts = []
      noteCtx('noteTempCanvas')?.clearRect(0, 0, noteState._W, noteState._H)
      noteUndo()
      const flash = noteEl('undoFlash')
      if(flash){ flash.classList.add('flash'); setTimeout(()=>flash.classList.remove('flash'), 300) }
    } else {
      _lastTapTime = now
      _lastTapPos  = {x: cx, y: cy}
    }
  }, {passive: false, capture: true})

  /* ── 캔버스 drawing events ── */
  canvas.addEventListener('pointerdown', e => {
    e.preventDefault()
    if(noteState.palmMode && _isLikelyFinger(e)) return  // 펜 전용: 손가락 차단
    notePointerDown(e)
  }, {passive: false})

  canvas.addEventListener('pointermove', e => {
    e.preventDefault()
    if(noteState.palmMode && _isLikelyFinger(e)) return
    notePointerMove(e)
  }, {passive: false})

  canvas.addEventListener('pointerup', e => {
    e.preventDefault()
    if(noteState.palmMode && _isLikelyFinger(e)){
      // 핀치 포인터 정리는 항상
      delete noteState._pinchPtrs[e.pointerId]
      if(Object.keys(noteState._pinchPtrs).length < 2) noteState._pinchDist = 0
      return
    }
    notePointerUp(e)
  }, {passive: false})

  canvas.addEventListener('pointercancel', e => {
    delete noteState._pinchPtrs[e.pointerId]
    if(Object.keys(noteState._pinchPtrs).length < 2) noteState._pinchDist = 0
    if(noteState.palmMode && _isLikelyFinger(e)) return
    notePointerUp(e)
  })

  /* ── 헤더/UI 영역: 펜슬로 텍스트 선택 방지 ── */
  document.getElementById('headerBar')?.addEventListener('pointerdown', e => {
    if(!_isLikelyFinger(e)) e.preventDefault()
  }, {passive: false})
  document.getElementById('noteToolbar2H')?.addEventListener('pointerdown', e => {
    if(!_isLikelyFinger(e)) e.preventDefault()
  }, {passive: false})

  /* ── 핀치 줌 (두 손가락) — 항상 허용 ── */
  outer.addEventListener('wheel', e => {
    if(e.ctrlKey || e.metaKey){
      e.preventDefault()
      noteApplyZoom(Math.max(0.2, Math.min(4, noteState.zoom * (e.deltaY < 0 ? 1.1 : 0.9))))
    }
  }, {passive: false})

  // 손가락 핀치 추적
  const _trackPinch = e => {
    if(!_isLikelyFinger(e)) return
    noteState._pinchPtrs[e.pointerId] = {x: e.clientX, y: e.clientY}
  }
  const _doPinchZoom = () => {
    const ptrs = Object.values(noteState._pinchPtrs)
    if(ptrs.length >= 2){
      const dist = Math.hypot(ptrs[0].x - ptrs[1].x, ptrs[0].y - ptrs[1].y)
      if(noteState._pinchDist > 0){
        noteApplyZoom(Math.max(0.2, Math.min(4, noteState.zoom * (dist / noteState._pinchDist))))
      }
      noteState._pinchDist = dist
      return true
    }
    return false
  }

  outer.addEventListener('pointerdown',  _trackPinch, {passive: true})
  canvas.addEventListener('pointerdown', _trackPinch, {passive: true})

  outer.addEventListener('pointermove', e => {
    if(!_isLikelyFinger(e) || e.target === canvas) return
    _trackPinch(e); _doPinchZoom()
  }, {passive: true})

  canvas.addEventListener('pointermove', e => {
    if(!_isLikelyFinger(e)) return
    _trackPinch(e)
    if(_doPinchZoom()){
      // 핀치 중이면 드로잉 중단
      if(noteState.isDrawing){
        noteState.isDrawing = false
        noteState.curStrokePts = []
        noteCtx('noteTempCanvas')?.clearRect(0, 0, noteState._W, noteState._H)
      }
    }
  }, {passive: true})

  const _releasePinch = e => {
    delete noteState._pinchPtrs[e.pointerId]
    if(Object.keys(noteState._pinchPtrs).length < 2) noteState._pinchDist = 0
  }
  outer.addEventListener('pointerup',     _releasePinch, {passive: true})
  outer.addEventListener('pointercancel', _releasePinch, {passive: true})

  /* ── 드래그앤드롭 이미지 ── */
  outer.addEventListener('dragover', e => e.preventDefault())
  outer.addEventListener('drop', e => {
    e.preventDefault()
    const f = e.dataTransfer.files[0]
    if(f && f.type.startsWith('image/')) noteInsertImageFile(f)
  })

  /* ── 클립보드 붙여넣기 ── */
  document.addEventListener('paste', e => {
    const item = [...e.clipboardData.items].find(i => i.type.startsWith('image/'))
    if(item){ e.preventDefault(); noteInsertImageFile(item.getAsFile()) }
  })

  /* ── 창 크기 변경 ── */
  window.addEventListener('resize', () => noteInitCanvas())
}

/* ── keyboard ── */
function noteKeyDown(e){
  const active=document.activeElement
  const typing=active&&(active.tagName==='INPUT'||active.tagName==='TEXTAREA'||active.isContentEditable)
  if(!typing){
    if(e.key==='p') noteSetTool('pen')
    if(e.key==='f') noteSetTool('fountain')
    if(e.key==='b') noteSetTool('brush')
    if(e.key==='h') noteSetTool('highlight')
    if(e.key==='l') noteSetTool('lasso')
    if(e.key==='e') noteSetTool('eraser')
  }
  if((e.ctrlKey||e.metaKey)&&e.key==='z'&&!e.shiftKey){e.preventDefault();noteUndo()}
  if((e.ctrlKey||e.metaKey)&&(e.key==='y'||(e.key==='z'&&e.shiftKey))){e.preventDefault();noteRedo()}
  if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();noteSaveCurrentNote();showToast('💾 저장됨',true)}
  if((e.key==='Delete'||e.key==='Backspace')&&noteState.selectedIdxs.length&&document.activeElement===document.body){
    e.preventDefault(); noteDeleteSelected()
  }
}

/* ── drawing ── */
function notePointerDown(e){
  if(!noteState.currentNoteId) return
  if(Object.keys(noteState._pinchPtrs).length>=2) return
  const pos=noteGetPos(e)
  if(noteState.tool==='lasso'){
    if(noteState.selBBox&&noteState.selectedIdxs.length){
      const b=noteState.selBBox
      if(pos.x>=b.x&&pos.x<=b.x+b.w&&pos.y>=b.y&&pos.y<=b.y+b.h){
        noteState.selDragging=true
        noteState.selDragOrigin={x:pos.x,y:pos.y}
        noteState.selStrokesOrigin=noteState.selectedIdxs.map(i=>
          noteState.strokes[i].pts.map(p=>[...p]))
        return
      }
    }
    noteState.lassoActive=true; noteState.lassoPts=[[pos.x,pos.y]]
    noteState.selectedIdxs=[]; noteState.selBBox=null; noteDrawSelCanvas()
    return
  }
  if(noteState.tool==='eraser'&&noteState.eraserMode==='stroke'){
    noteEraseStrokeAt(pos.x,pos.y)
    noteState.isDrawing=true; noteState.curStrokePts=[pos]
    return
  }
  noteState.isDrawing=true; noteState.curStrokePts=[pos]
  noteCtx('noteTempCanvas')?.clearRect(0,0,noteState._W,noteState._H)
}
function notePointerMove(e){
  if(Object.keys(noteState._pinchPtrs).length>=2) return
  const pos=noteGetPos(e)
  if(noteState.tool==='lasso'&&noteState.selDragging&&noteState.selDragOrigin){
    const dx=pos.x-noteState.selDragOrigin.x, dy=pos.y-noteState.selDragOrigin.y
    noteState.selectedIdxs.forEach((si,ii)=>{
      noteState.strokes[si].pts=noteState.selStrokesOrigin[ii].map(p=>[p[0]+dx,p[1]+dy,p[2]])
    })
    if(noteState.selBBox) noteState.selBBox=noteCalcSelBBox(noteState.selectedIdxs)
    noteRedrawCanvas(); noteDrawSelCanvas(); return
  }
  if(noteState.tool==='lasso'&&noteState.lassoActive){
    noteState.lassoPts.push([pos.x,pos.y])
    noteDrawLassoPath(); return
  }
  if(!noteState.isDrawing) return
  noteState.curStrokePts.push(pos)
  if(noteState.curStrokePts.length<2) return
  if(noteState.tool==='eraser'&&noteState.eraserMode==='stroke'){
    noteEraseStrokeAt(pos.x,pos.y); return
  }
  const tCtx=noteCtx('noteTempCanvas'); if(!tCtx) return
  tCtx.clearRect(0,0,noteState._W,noteState._H)
  noteDrawStroke(tCtx,{tool:noteState.tool,color:noteState.color,width:noteState.width,
    pts:noteState.curStrokePts.map(p=>[p.x,p.y,p.p])})
  if(noteState.tool==='eraser'&&noteState.eraserMode==='region'){
    tCtx.save(); tCtx.strokeStyle='rgba(200,0,0,0.4)'; tCtx.lineWidth=1; tCtx.setLineDash([4,4])
    tCtx.beginPath()
    noteState.curStrokePts.forEach((p,i)=>i===0?tCtx.moveTo(p.x,p.y):tCtx.lineTo(p.x,p.y))
    tCtx.closePath(); tCtx.stroke(); tCtx.restore()
  }
}
function notePointerUp(e){
  if(Object.keys(noteState._pinchPtrs).length>=2) return
  if(noteState.tool==='lasso'&&noteState.selDragging){
    noteState.selDragging=false; noteState.selDragOrigin=null; noteState.selStrokesOrigin=null
    noteSaveCurrentNote(); return
  }
  if(noteState.tool==='lasso'&&noteState.lassoActive){
    noteState.lassoActive=false
    if(noteState.lassoPts.length>2){
      noteState.selectedIdxs=noteState.strokes.reduce((acc,_,i)=>{
        const pts=noteState.strokes[i].pts
        const inside=pts.filter(p=>notePointInPoly(p[0],p[1],noteState.lassoPts))
        if(inside.length/pts.length>0.4) acc.push(i)
        return acc
      },[])
      if(noteState.selectedIdxs.length) noteState.selBBox=noteCalcSelBBox(noteState.selectedIdxs)
    }
    noteCtx('noteTempCanvas')?.clearRect(0,0,noteState._W,noteState._H)
    noteDrawSelCanvas(); return
  }
  if(!noteState.isDrawing) return
  noteState.isDrawing=false
  const pts=noteState.curStrokePts; if(!pts.length) return
  if(pts.length===1) pts.push({...pts[0]})
  if(noteState.tool==='eraser'&&noteState.eraserMode==='region'){
    const poly=pts.map(p=>[p.x,p.y])
    noteState.undoStack.push(JSON.stringify(noteState.strokes))
    noteState.strokes=noteState.strokes.filter(s=>{
      const inside=s.pts.filter(p=>notePointInPoly(p[0],p[1],poly))
      return inside.length/s.pts.length<0.4
    })
    noteCtx('noteTempCanvas')?.clearRect(0,0,noteState._W,noteState._H)
    noteRedrawCanvas(); noteSaveCurrentNote(); return
  }
  const stroke={
    tool:noteState.tool,color:noteState.color,width:noteState.width,
    pts:pts.map(p=>[Math.round(p.x*10)/10,Math.round(p.y*10)/10,Math.round((p.p||0.5)*100)/100])
  }
  noteState.undoStack.push(JSON.stringify(noteState.strokes))
  if(noteState.undoStack.length>80) noteState.undoStack.shift()
  noteState.redoStack=[]
  noteState.strokes.push(stroke)
  const ctx=noteCtx('noteCanvas'); if(ctx) noteDrawStroke(ctx,stroke)
  noteCtx('noteTempCanvas')?.clearRect(0,0,noteState._W,noteState._H)
  if(stroke.tool==='eraser') noteRedrawCanvas()
  const maxY=Math.max(...pts.map(p=>p.y))
  if(maxY>noteState._H-noteState._pageH*0.5) noteExtendCanvas()
  noteSaveCurrentNote()
}

/* ── eraser stroke mode ── */
function noteEraseStrokeAt(x,y){
  const r=noteState.width*3
  const before=noteState.strokes.length
  noteState.strokes=noteState.strokes.filter(s=>{
    return !s.pts.some(p=>Math.hypot(p[0]-x,p[1]-y)<r)
  })
  if(noteState.strokes.length!==before) noteRedrawCanvas()
}

/* ── lasso helpers ── */
function notePointInPoly(px,py,poly){
  let inside=false
  for(let i=0,j=poly.length-1;i<poly.length;j=i++){
    const xi=poly[i][0],yi=poly[i][1],xj=poly[j][0],yj=poly[j][1]
    if(((yi>py)!==(yj>py))&&(px<(xj-xi)*(py-yi)/(yj-yi)+xi)) inside=!inside
  }
  return inside
}
function noteCalcSelBBox(idxs){
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity
  idxs.forEach(i=>noteState.strokes[i].pts.forEach(p=>{
    minX=Math.min(minX,p[0]);minY=Math.min(minY,p[1])
    maxX=Math.max(maxX,p[0]);maxY=Math.max(maxY,p[1])
  }))
  const pad=14; return {x:minX-pad,y:minY-pad,w:maxX-minX+2*pad,h:maxY-minY+2*pad}
}
function noteDeleteSelected(){
  if(!noteState.selectedIdxs.length) return
  noteState.undoStack.push(JSON.stringify(noteState.strokes))
  noteState.strokes=noteState.strokes.filter((_,i)=>!noteState.selectedIdxs.includes(i))
  noteState.selectedIdxs=[]; noteState.selBBox=null
  noteRedrawCanvas(); noteDrawSelCanvas(); noteSaveCurrentNote()
}
function noteDrawLassoPath(){
  const ctx=noteCtx('noteTempCanvas'); if(!ctx) return
  ctx.clearRect(0,0,noteState._W,noteState._H)
  ctx.save(); ctx.strokeStyle='#7c6af7'; ctx.lineWidth=1.5; ctx.setLineDash([5,4]); ctx.globalAlpha=0.8
  ctx.beginPath()
  noteState.lassoPts.forEach((p,i)=>i===0?ctx.moveTo(p[0],p[1]):ctx.lineTo(p[0],p[1]))
  ctx.stroke(); ctx.restore()
}
function noteDrawSelCanvas(){
  const ctx=noteCtx('noteSelCanvas'); if(!ctx) return
  ctx.clearRect(0,0,noteState._W,noteState._H)
  if(!noteState.selectedIdxs.length) return
  ctx.save(); ctx.globalCompositeOperation='source-over'; ctx.globalAlpha=0.35
  ctx.strokeStyle='#7c6af7'
  noteState.selectedIdxs.forEach(i=>{
    const s=noteState.strokes[i]
    ctx.lineWidth=(s.width||2)+4; ctx.beginPath()
    s.pts.forEach((p,j)=>j===0?ctx.moveTo(p[0],p[1]):ctx.lineTo(p[0],p[1]))
    ctx.stroke()
  })
  if(noteState.selBBox){
    const{x,y,w,h}=noteState.selBBox
    ctx.globalAlpha=1; ctx.strokeStyle='#7c6af7'; ctx.lineWidth=1.5; ctx.setLineDash([5,4])
    ctx.fillStyle='rgba(124,106,247,0.06)'
    ctx.strokeRect(x,y,w,h); ctx.fillRect(x,y,w,h)
    ctx.setLineDash([]); ctx.font='11px Syne,sans-serif'; ctx.fillStyle='#7c6af7'
    ctx.fillText(`${noteState.selectedIdxs.length}개 선택 — 드래그 이동 / Del 삭제`,x,y-5)
  }
  ctx.restore()
}

/* ── stroke rendering ── */
function noteDrawStroke(ctx,stroke){
  const{tool,color,width,pts}=stroke; if(!pts||pts.length<2) return
  ctx.save(); ctx.lineCap='round'; ctx.lineJoin='round'
  if(tool==='eraser'){
    ctx.globalCompositeOperation='destination-out'; ctx.globalAlpha=1
    ctx.lineWidth=width*4; ctx.strokeStyle='rgba(0,0,0,1)'
    _notePath(ctx,pts)
  } else if(tool==='highlight'){
    ctx.globalCompositeOperation='source-over'; ctx.globalAlpha=0.3
    ctx.lineWidth=width*6; ctx.lineCap='square'; ctx.strokeStyle=color
    _notePath(ctx,pts)
  } else if(tool==='brush'){
    ctx.globalCompositeOperation='source-over'
    for(let i=1;i<pts.length;i++){
      const p0=pts[i-1],p1=pts[i],prs=(p0[2]+p1[2])/2
      ctx.globalAlpha=0.15+prs*0.55; ctx.lineWidth=width*(0.5+prs*2.5); ctx.strokeStyle=color
      ctx.beginPath(); ctx.moveTo(p0[0],p0[1])
      i<pts.length-1?ctx.quadraticCurveTo(p1[0],p1[1],(p1[0]+pts[i+1][0])/2,(p1[1]+pts[i+1][1])/2):ctx.lineTo(p1[0],p1[1])
      ctx.stroke()
    }
  } else if(tool==='fountain'){
    ctx.globalCompositeOperation='source-over'; ctx.globalAlpha=0.93; ctx.strokeStyle=color
    for(let i=1;i<pts.length;i++){
      const p0=pts[i-1],p1=pts[i],prs=(p0[2]+p1[2])/2
      ctx.lineWidth=Math.max(0.5,width*(0.2+prs*1.6))
      ctx.beginPath(); ctx.moveTo(p0[0],p0[1])
      i<pts.length-1?ctx.quadraticCurveTo(p1[0],p1[1],(p1[0]+pts[i+1][0])/2,(p1[1]+pts[i+1][1])/2):ctx.lineTo(p1[0],p1[1])
      ctx.stroke()
    }
  } else {
    ctx.globalCompositeOperation='source-over'; ctx.globalAlpha=0.85
    ctx.lineWidth=width; ctx.strokeStyle=color; _notePath(ctx,pts)
  }
  ctx.restore()
}
function _notePath(ctx,pts){
  ctx.beginPath(); ctx.moveTo(pts[0][0],pts[0][1])
  for(let i=1;i<pts.length-1;i++){
    const mx=(pts[i][0]+pts[i+1][0])/2, my=(pts[i][1]+pts[i+1][1])/2
    ctx.quadraticCurveTo(pts[i][0],pts[i][1],mx,my)
  }
  const l=pts[pts.length-1]; ctx.lineTo(l[0],l[1]); ctx.stroke()
}

/* ── full redraw ── */
function noteRedrawCanvas(){
  const canvas=noteEl('noteCanvas'); if(!canvas||!noteState._W) return
  const ctx=canvas.getContext('2d')
  const{_W:W,_H:H}=noteState
  const gc=noteGridColor()
  ctx.save(); ctx.globalCompositeOperation='source-over'; ctx.globalAlpha=1
  ctx.fillStyle=noteState.bgColor||'#1a1a24'; ctx.fillRect(0,0,W,H)
  const bg=NOTE_BG_TYPES[noteState.bgType||0]
  if(bg==='grid'){
    ctx.strokeStyle=gc; ctx.lineWidth=0.6; const s=28
    for(let x=0;x<=W;x+=s){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}
    for(let y=0;y<=H;y+=s){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}
  } else if(bg==='lined'){
    ctx.strokeStyle=gc; ctx.lineWidth=0.6; const s=32
    for(let y=s;y<=H;y+=s){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}
    const lum2=(0.299*(parseInt(noteState.bgColor.slice(1,3),16)||26)+
      0.587*(parseInt(noteState.bgColor.slice(3,5),16)||26)+
      0.114*(parseInt(noteState.bgColor.slice(5,7),16)||36))/255
    ctx.strokeStyle=lum2>0.5?'rgba(210,50,50,0.2)':'rgba(255,100,100,0.3)'
    ctx.lineWidth=0.7; ctx.beginPath();ctx.moveTo(60,0);ctx.lineTo(60,H);ctx.stroke()
  }
  ctx.restore()
  const hasEraser=noteState.strokes.some(s=>s.tool==='eraser')
  if(hasEraser){
    const off=document.createElement('canvas')
    off.width=canvas.width; off.height=canvas.height
    const oc=off.getContext('2d'); oc.scale(noteState._dpr,noteState._dpr)
    oc.lineCap='round'; oc.lineJoin='round'
    noteState.strokes.forEach(s=>noteDrawStroke(oc,s))
    ctx.drawImage(off,0,0,W,H)
  } else { noteState.strokes.forEach(s=>noteDrawStroke(ctx,s)) }
}

/* ── page extension ── */
function noteExtendCanvas(){
  const{_W:W,_H:H,_pageH:PH,_dpr:dpr}=noteState
  const newH=H+PH
  const snap=document.createElement('canvas')
  const mc=noteEl('noteCanvas'); snap.width=mc.width; snap.height=mc.height
  snap.getContext('2d').drawImage(mc,0,0)
  noteResizeCanvases(W,newH,dpr)
  const ctx=noteCtx('noteCanvas')
  ctx.save(); ctx.globalCompositeOperation='source-over'; ctx.globalAlpha=1
  ctx.fillStyle=noteState.bgColor||'#1a1a24'; ctx.fillRect(0,0,W,newH)
  ctx.restore()
  ctx.drawImage(snap,0,0,W,H)
  noteUpdateZoomSpacer()
  noteRenderObjects()
}

/* ── undo / redo ── */
function noteUndo(){
  if(!noteState.undoStack.length) return
  noteState.redoStack.push(JSON.stringify(noteState.strokes))
  noteState.strokes=JSON.parse(noteState.undoStack.pop())
  noteState.selectedIdxs=[]; noteState.selBBox=null
  noteRedrawCanvas(); noteDrawSelCanvas()
}
function noteRedo(){
  if(!noteState.redoStack.length) return
  noteState.undoStack.push(JSON.stringify(noteState.strokes))
  noteState.strokes=JSON.parse(noteState.redoStack.pop())
  noteRedrawCanvas()
}
function noteClearCanvas(){
  if(!noteState.strokes.length&&!noteState.objects.length) return
  if(!confirm('현재 노트의 모든 내용을 지울까요?')) return
  noteState.undoStack.push(JSON.stringify(noteState.strokes))
  noteState.redoStack=[]; noteState.strokes=[]; noteState.objects=[]
  noteState.selectedIdxs=[]; noteState.selBBox=null
  noteRedrawCanvas(); noteRenderObjects(); noteDrawSelCanvas(); noteSaveCurrentNote()
}

/* ── objects (image / text) ── */
function noteRenderObjects(){
  const cont=noteEl('noteCanvasContainer'); if(!cont) return
  cont.querySelectorAll('.note-obj-overlay').forEach(e=>e.remove())
  noteState.objects.forEach((obj,idx)=>noteCreateObjEl(obj,idx))
}
function noteCreateObjEl(obj,idx){
  const cont=noteEl('noteCanvasContainer'); if(!cont) return
  const wrap=document.createElement('div')
  wrap.className='note-obj-overlay'
  wrap.style.left=obj.x+'px'; wrap.style.top=obj.y+'px'
  wrap.style.width=obj.w+'px'; wrap.style.height=obj.h+'px'
  if(obj.type==='image'){
    const img=document.createElement('img')
    img.src=obj.src; img.style.cssText='width:100%;height:100%;object-fit:contain;display:block;border-radius:3px;pointer-events:none;'
    wrap.appendChild(img)
  } else {
    const div=document.createElement('div')
    div.contentEditable='true'
    div.style.cssText=`width:100%;height:100%;font-size:${obj.fontSize||14}px;color:${obj.color||noteState.color};
      padding:5px 7px;box-sizing:border-box;overflow-wrap:break-word;outline:none;line-height:1.5;
      background:${obj.bgColor||'rgba(30,30,42,0.88)'};border-radius:3px;cursor:text;white-space:pre-wrap;
      font-family:'Syne',sans-serif;`
    div.textContent=obj.text||'텍스트 입력...'
    div.addEventListener('focus',()=>{if(div.textContent==='텍스트 입력...') div.textContent=''})
    div.addEventListener('input',()=>{obj.text=div.textContent; noteSaveCurrentNote()})
    div.addEventListener('pointerdown',e=>e.stopPropagation())
    wrap.appendChild(div)
  }
  const del=document.createElement('div')
  del.className='note-del-handle'; del.textContent='✕'; del.title='삭제'
  del.addEventListener('click',e=>{
    e.stopPropagation()
    noteState.objects.splice(idx,1); wrap.remove(); noteSaveCurrentNote(); noteRenderObjects()
  })
  wrap.appendChild(del)
  const rz=document.createElement('div')
  rz.className='note-resize-handle'
  let rSX,rSY,rW,rH
  rz.addEventListener('pointerdown',e=>{
    e.stopPropagation(); rSX=e.clientX; rSY=e.clientY; rW=obj.w; rH=obj.h
    rz.setPointerCapture(e.pointerId)
    const mv=ev=>{ obj.w=Math.max(60,rW+(ev.clientX-rSX)/noteState.zoom); obj.h=Math.max(40,rH+(ev.clientY-rSY)/noteState.zoom); wrap.style.width=obj.w+'px'; wrap.style.height=obj.h+'px' }
    const up=()=>{rz.removeEventListener('pointermove',mv);rz.removeEventListener('pointerup',up);noteSaveCurrentNote()}
    rz.addEventListener('pointermove',mv); rz.addEventListener('pointerup',up)
  })
  wrap.appendChild(rz)
  let dSX,dSY,dOX,dOY
  wrap.addEventListener('pointerdown',e=>{
    if(e.target===rz||e.target.tagName==='DIV'&&e.target.isContentEditable) return
    e.stopPropagation(); dSX=e.clientX; dSY=e.clientY; dOX=obj.x; dOY=obj.y
    wrap.setPointerCapture(e.pointerId)
    const mv=ev=>{ obj.x=Math.max(0,dOX+(ev.clientX-dSX)/noteState.zoom); obj.y=Math.max(0,dOY+(ev.clientY-dSY)/noteState.zoom); wrap.style.left=obj.x+'px'; wrap.style.top=obj.y+'px' }
    const up=()=>{wrap.removeEventListener('pointermove',mv);wrap.removeEventListener('pointerup',up);noteSaveCurrentNote()}
    wrap.addEventListener('pointermove',mv); wrap.addEventListener('pointerup',up)
  })
  cont.appendChild(wrap)
}

/* ── image insert ── */
function noteHandleFileInput(input){
  const f=input.files[0]; if(!f) return
  noteInsertImageFile(f); input.value=''
}
function noteInsertImageFile(file){
  const reader=new FileReader()
  reader.onload=ev=>{
    const obj={type:'image',src:ev.target.result,x:30,y:30,w:320,h:240}
    noteState.objects.push(obj); noteSaveCurrentNote()
    noteCreateObjEl(obj,noteState.objects.length-1)
  }
  reader.readAsDataURL(file)
}
function noteInsertTextBox(){
  const obj={type:'text',text:'',x:60,y:60,w:280,h:100,fontSize:14,color:noteState.color,bgColor:'rgba(30,30,42,0.88)'}
  noteState.objects.push(obj); noteSaveCurrentNote()
  noteCreateObjEl(obj,noteState.objects.length-1)
}

/* ── export ── */
function noteExportPNG(){
  const canvas=noteEl('noteCanvas'),link=document.createElement('a')
  const meta=noteIndex.notes.find(n=>n.id===noteState.currentNoteId)

/* ── GitHub helpers ── */
const GITHUB = { user:"apor76-cmyk", repo:"data" }

function b64EncodeUnicode(str){
  const bytes=new TextEncoder().encode(str); let binary=""
  bytes.forEach(b=>binary+=String.fromCharCode(b)); return btoa(binary)
}
function b64DecodeUnicode(str){
  const binary=atob(str.replace(/\n/g,""))
  const bytes=new Uint8Array(binary.length)
  for(let i=0;i<binary.length;i++) bytes[i]=binary.charCodeAt(i)
  return new TextDecoder().decode(bytes)
}
function safeDirName(cat){
  return (cat||"default").replace(/[\\/:*?"<>|]/g,"").replace(/\s+/g,"_")||"default"
}
function getToken(){
  let t=localStorage.getItem("GH_TOKEN")
  if(!t){ t=prompt("GitHub Personal Access Token\n(repo 권한 필요, 최초 1회)"); if(t) localStorage.setItem("GH_TOKEN",t) }
  return t
}

async function ghPut(token,path,base64Content,message="update"){
  let sha=null
  const check=await fetch(`https://api.github.com/repos/${GITHUB.user}/${GITHUB.repo}/contents/${path}`,
    {headers:{Authorization:`Bearer ${token}`}})
  if(check.ok){const j=await check.json(); sha=j.sha}
  const body={message,content:base64Content}; if(sha) body.sha=sha
  const res=await fetch(`https://api.github.com/repos/${GITHUB.user}/${GITHUB.repo}/contents/${path}`,
    {method:'PUT',headers:{Authorization:`Bearer ${token}`,'Content-Type':'application/json'},body:JSON.stringify(body)})
  if(!res.ok) throw new Error(`업로드 실패 (${res.status})`)
}
async function ghGet(token,path){
  const r=await fetch(`https://api.github.com/repos/${GITHUB.user}/${GITHUB.repo}/contents/${path}`,
    {headers:{Authorization:`Bearer ${token}`}})
  if(!r.ok) throw new Error(`GitHub API 오류 [${r.status}] (${path})`)
  const json=await r.json()
  if(json.content&&json.content.trim()!=="") return json.content
  if(json.download_url){
    const dr=await fetch(json.download_url); if(!dr.ok) throw new Error(`download_url 실패`)
    const blob=await dr.blob()
    return await new Promise(resolve=>{ const reader=new FileReader(); reader.onload=()=>resolve(reader.result.split(",")[1]); reader.readAsDataURL(blob) })
  }
  return null
}

/* ── GitHub sync ── */
async function noteSyncUpload(){
  const token=getToken(); if(!token) return
  try{
    await ghPut(token,NOTE_GH_IDX,b64EncodeUnicode(JSON.stringify(noteIndex,null,2)),'notes index')
    for(const meta of noteIndex.notes){
      const raw=localStorage.getItem(NOTE_LS_DATA(meta.id)); if(!raw) continue
      await ghPut(token,NOTE_GH_PATH(meta.category,meta.id),
        b64EncodeUnicode(JSON.stringify({meta,...JSON.parse(raw)},null,2)),'note '+meta.id)
    }
    showToast('✅ 저장 완료', true)
  }catch(e){ showToast('❌ 저장 실패: '+e.message, false) }
}
async function noteSyncDownload(){
  const token=getToken(); if(!token) return
  try{
    const idxB64=await ghGet(token,NOTE_GH_IDX).catch(()=>null)
    if(!idxB64){ showToast('저장된 노트가 없습니다', false); return }
    noteIndex=JSON.parse(b64DecodeUnicode(idxB64))
    if(!noteIndex.categories?.length) noteIndex.categories=['일반']
    noteSaveIndex()
    for(const meta of noteIndex.notes){
      const raw=await ghGet(token,NOTE_GH_PATH(meta.category,meta.id)).catch(()=>null)
      if(raw){
        const d=JSON.parse(b64DecodeUnicode(raw))
        localStorage.setItem(NOTE_LS_DATA(meta.id),JSON.stringify({
          strokes:d.strokes||[],objects:d.objects||[],bgColor:d.bgColor,bgType:d.bgType
        }))
      }
    }
    noteState.currentNoteId=null; noteRenderSidebar()
    const notes=noteIndex.notes.filter(n=>n.category===noteState.currentCategory)
    if(notes.length) noteOpenNote(notes[0].id); else noteNewNote()
    showToast('✅ 불러오기 완료', true)
  }catch(e){ showToast('❌ 불러오기 실패: '+e.message, false) }
}
