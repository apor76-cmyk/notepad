        saveGroups(); renderGroups(); renderCategories()
      }
      wrap.appendChild(edit); wrap.appendChild(del)
    }
    bar.appendChild(wrap)
  })

  // ★ 숨김 모드일 때 분류 드래그 비활성화
  if(window.groupSortable) window.groupSortable.destroy()
  window.groupSortable=new Sortable(bar,{
    animation:200,
    filter:"[data-all]",
    disabled: isHidden(),
    onEnd(){
      const order=[...bar.children].map(el=>el.dataset&&el.dataset.gid).filter(Boolean)
      const nd=[]
      order.forEach(gid=>{ const g=groupsData.find(x=>x.id===gid); if(g) nd.push(g) })
      groupsData=nd; saveGroups()
    }
  })
}

/* ══════════════════════════════════════════
   카테고리
══════════════════════════════════════════ */
function addCategory(){
  const name=prompt("카테고리 이름"); if(!name) return
  if(data[name]) return alert("이미 존재하는 카테고리입니다")
  data[name]=[]
  if(currentGroup){
    const g=groupsData.find(x=>x.id===currentGroup)
    if(g && !g.cats.includes(name)) g.cats.push(name)
    saveGroups()
    // 루틴 분류이면 practicecheck 영역 생성
    if(g && g.name==='루틴') pcSync.ensureArea(name)
  }
  currentCategory=name; save(); renderGroups(); renderCategories(); renderLinks()
}

function renderCategories(){
  const bar = document.getElementById("categoryBar"); bar.innerHTML=""

  const activeCats = currentGroup
    ? (groupsData.find(g=>g.id===currentGroup)||{cats:[]}).cats
    : null

  const allCats = Object.keys(data).filter(k=>!k.startsWith("__"))
  const cats = activeCats ? allCats.filter(c=>activeCats.includes(c)) : allCats

  if(cats.length && !cats.includes(currentCategory)){
    currentCategory = cats[0]
    renderLinks()
  }

  cats.forEach(cat => {
    const wrap=document.createElement("div"); wrap.style.display="inline-flex"; wrap.style.gap="4px"; wrap.style.alignItems="center"
    wrap.dataset.cat = cat  // 카테고리 이름을 dataset에 저장
    const btn=document.createElement("button")
    btn.className="category-btn"
    const locked = isCatLocked(cat)
    const hasPw = !!catPasswords[cat]
    btn.textContent = (hasPw ? (locked ? "🔒 " : "🔓 ") : "") + cat

    const cColor = getCatColor(cat)
    const dot = cColor
      ? `<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${cColor};margin-right:5px;vertical-align:middle;flex-shrink:0;"></span>`
      : ""
    btn.innerHTML = dot + (hasPw ? (locked ? "🔒 " : "🔓 ") : "") + cat

    if(cat===currentCategory){
      btn.classList.add("active")
      if(cColor){
        btn.style.background=cColor
        btn.style.borderColor="transparent"
        btn.style.color="#fff"
        btn.style.boxShadow=`0 2px 8px ${hexToRgba(cColor,0.35)}`
      }
    } else if(cColor){
      btn.style.borderColor=hexToRgba(cColor,0.45)
      btn.style.color=cColor
      btn.onmouseover=()=>{ btn.style.background=hexToRgba(cColor,0.10); btn.style.borderColor=cColor }
      btn.onmouseout=()=>{ btn.style.background=""; btn.style.borderColor=hexToRgba(cColor,0.45) }
    }

    btn.onclick=async()=>{
      if(locked){
        const ok = await tryUnlockCat(cat)
        if(!ok) return
        renderCategories()
      }
      currentCategory=cat; renderCategories(); renderLinks()
    }
    wrap.appendChild(btn)

    if(manageMode){
      const edit=document.createElement("button"); edit.textContent="✏"; edit.style.padding="4px 8px"
      edit.onclick=()=>{
        const n=prompt("새 이름",cat)
        if(!n||n===cat) return
        if(data[n]) return alert("이미 존재하는 이름입니다")
        data[n]=data[cat]; delete data[cat]
        groupsData.forEach(g=>{ const i=g.cats.indexOf(cat); if(i!==-1) g.cats[i]=n })
        saveGroups()

        if(catPasswords[cat]){
          catPasswords[n] = catPasswords[cat]
          delete catPasswords[cat]
        }
        if(unlockedCats.has(cat)){
          unlockedCats.add(n)
          unlockedCats.delete(cat)
        }
        saveCatPasswords()

        currentCategory=n; save(); renderGroups(); renderCategories()
      }
      const del=document.createElement("button"); del.textContent="🗑"; del.style.padding="4px 8px"
      del.onclick=()=>{
        if(!confirm("카테고리를 삭제하시겠습니까?\n(포함된 링크도 모두 삭제됩니다)")) return
        delete data[cat]
        groupsData.forEach(g=>{ g.cats=g.cats.filter(c=>c!==cat) })
        saveGroups()
        delete catPasswords[cat]
        unlockedCats.delete(cat)
        saveCatPasswords()
        const remaining=Object.keys(data).filter(k=>!k.startsWith("__"))
        currentCategory=remaining[0]||""
        save(); renderGroups(); renderCategories(); renderLinks()
      }

      const assignedGroups = groupsData.filter(g=>g.cats.includes(cat))
      if(assignedGroups.length){
        assignedGroups.forEach(g=>{
          const tag=document.createElement("span"); tag.className="cat-group-tag"
          tag.textContent="📁 "+g.name
          tag.title="클릭하면 이 분류에서 제거"
          tag.onclick=e=>{
            e.stopPropagation()
            if(confirm(`"${cat}"을(를) 분류 "${g.name}"에서 제거하시겠습니까?`)){
              g.cats=g.cats.filter(c=>c!==cat); saveGroups(); renderCategories()
            }
          }
          wrap.appendChild(tag)
        })
      } else {
        const assignBtn=document.createElement("button"); assignBtn.textContent="＋분류"; assignBtn.style.cssText="padding:2px 8px;font-size:11px;"
        assignBtn.onclick=e=>{
          e.stopPropagation()
          if(!groupsData.length) return alert("먼저 분류를 만드세요")
          const names=groupsData.map((g,i)=>`${i+1}. ${g.name}`).join("\n")
          const idx=prompt(`카테고리를 할당할 분류 번호:\n${names}`)
          if(!idx) return
          const g=groupsData[parseInt(idx)-1]
          if(!g) return alert("잘못된 번호")
          if(!g.cats.includes(cat)) g.cats.push(cat)
          saveGroups(); renderGroups(); renderCategories()
        }
        wrap.appendChild(assignBtn)
      }

      const pwBtn=document.createElement("button")
      pwBtn.textContent = catPasswords[cat] ? "🔓" : "🔒"
      pwBtn.title = catPasswords[cat] ? "암호 변경/제거" : "암호 설정"
      pwBtn.style.cssText="padding:4px 8px;"
      pwBtn.onclick=e=>{ e.stopPropagation(); setCatPassword(cat) }
      wrap.appendChild(edit); wrap.appendChild(del); wrap.appendChild(pwBtn)
    }
    bar.appendChild(wrap)
  })

  // ★ 숨김 모드일 때 카테고리 드래그 비활성화
  if(window.categorySortable) window.categorySortable.destroy()
  window.categorySortable=new Sortable(bar,{
    animation:200,
    disabled: isHidden(),
    onEnd(evt){
      // 실제로 위치가 바뀐 경우에만 순서 저장 (렌더 시 오발동 방지)
      if(evt.oldIndex === evt.newIndex) return
      const order=[...bar.children].map(el=>el.dataset?.cat).filter(Boolean)
      if(!order.length) return
      const nd={}
      // 드래그로 정렬된 순서대로 먼저 담고
      order.forEach(n=>{ if(data[n]!==undefined) nd[n]=data[n] })
      // order에 없는 카테고리(숨김그룹 등)도 절대 버리지 않음
      Object.keys(data).forEach(k=>{ if(!(k in nd)) nd[k]=data[k] })
      data=nd; currentCategory=order[0]; save(); renderCategories(); renderLinks()
    }
  })
}

/* ══════════════════════════════════════════
   카드 렌더링
══════════════════════════════════════════ */
function renderLinks(){
  const box=document.getElementById("linkList"), favBox=document.getElementById("favList")
  box.innerHTML=""; favBox.innerHTML=""
  const allKeys = Object.keys(data).filter(k=>!k.startsWith("__"))
  if(!data[currentCategory]||!allKeys.includes(currentCategory))
    currentCategory = allKeys[0] || ""
  if(!currentCategory || !data[currentCategory]) return
  const search=document.getElementById("searchInput").value.toLowerCase()
  const list=data[currentCategory].filter(i=>i.title.toLowerCase().includes(search))

  if(isCatLocked(currentCategory)){
    const lockDiv=document.createElement("div")
    lockDiv.style.cssText="text-align:center;padding:48px 20px;color:var(--sub);"
    lockDiv.innerHTML=`<div style="font-size:48px;margin-bottom:12px;">🔒</div>
      <div style="font-size:16px;font-weight:700;margin-bottom:8px;">${currentCategory}</div>
      <div style="font-size:13px;margin-bottom:20px;">잠긴 카테고리입니다</div>
      <button class="primary" style="padding:8px 24px;" onclick="tryUnlockCat('${currentCategory}').then(ok=>{ if(ok){renderCategories();renderLinks()} })">🔓 암호 입력</button>`
    box.appendChild(lockDiv)
    return
  }

  list.forEach(item => {
    const card=document.createElement("div")
    card.className="link-card"+(item.favorite?" favorite":"")
    card.dataset.linkId = item.id

    const cardColor=getCatColor(currentCategory)
    // 반복 복습 알림 강조 (루틴 분류 && 오늘이 반복일)
    const isRepeatDue = pcSync.isRutine(currentCategory) && pcSync.checkRepeatToday(currentCategory, item.title)
    if(isRepeatDue){
      card.style.borderColor='#f97316'
      card.style.borderWidth='2.5px'
      card.style.boxShadow='0 0 0 3px rgba(249,115,22,0.25)'
      const badge=document.createElement('div')
      badge.style.cssText='position:absolute;top:5px;left:5px;background:#f97316;color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:999px;z-index:3;'
      badge.textContent='🔔 복습일'
      card.appendChild(badge)
    } else if(cardColor){
      card.style.borderColor=hexToRgba(cardColor,0.3)
      card.style.borderLeftColor=cardColor
      card.style.borderLeftWidth="3px"
      card.onmouseenter=()=>{
        card.style.borderColor=cardColor
        card.style.boxShadow=`0 6px 24px ${hexToRgba(cardColor,0.22)}`
        card.style.transform="translateY(-3px) scale(1.015)"
      }
      card.onmouseleave=()=>{
        card.style.borderColor=hexToRgba(cardColor,0.3)
        card.style.borderLeftColor=cardColor
        card.style.boxShadow="var(--shadow)"
        card.style.transform=""
      }
    }


    let thumb=""
    if(item.type==="youtube"){
      const vid=getYoutubeId(item.url)
      if(vid){
        thumb=`<div class="thumb"><img loading="lazy" src="https://img.youtube.com/vi/${vid}/mqdefault.jpg" onerror="this.src='https://img.youtube.com/vi/${vid}/default.jpg'" style="width:100%;height:100%;object-fit:cover;"></div>`
      } else {
        thumb=`<div class="thumb" style="flex-direction:column;gap:4px;background:var(--card2);"><span style="font-size:28px;">▶</span><span style="font-size:10px;color:var(--sub);">유튜브</span></div>`
      }
    } else if(item.type==="link"){
      let iconHtml=""
      const iconSrc=item.iconFile ? imgSrc(item.iconFile) : ""
      if(iconSrc){
        iconHtml=`<img src="${iconSrc}" style="width:100%;height:100%;object-fit:cover">`
      } else {
        try{ const domain=new URL(item.url).hostname
          iconHtml=`<img loading="lazy" src="https://www.google.com/s2/favicons?sz=64&domain=${domain}">`
        }catch{ iconHtml="🌐" }
      }
      thumb=`<div class="thumb">${iconHtml}</div>`
    } else if(item.type==="photo"){
      if(item.encrypted){
        thumb=`<div class="thumb" style="font-size:12px;color:var(--text);background:var(--card);">🔒 암호화된 사진</div>`
      } else {
        const src=item.thumbFile ? imgSrc(item.thumbFile) : ""
        thumb=`<div class="thumb"><img loading="lazy" src="${src}"></div>`
      }
    } else if(item.type==="text"){
      const preview=item.encrypted ? "🔒 암호화된 메모"
        : (item.text ? (item.text.length>150 ? item.text.slice(0,150)+"..." : item.text) : "")
      thumb=`<div class="thumb" style="align-items:flex-start;padding:8px;background:var(--card);font-size:12px;color:var(--text);overflow:hidden;white-space:pre-wrap;word-wrap:break-word;">${preview}</div>`
    } else if(item.type==="file"){
      const ext=(item.ext||"").toLowerCase()
      const iconMap={pdf:"📄",hwp:"📝",hwpx:"📝",doc:"📋",docx:"📋",xls:"📊",xlsx:"📊",ppt:"📑",pptx:"📑"}
      const colorMap={pdf:"#e2290b",hwp:"#0066cc",hwpx:"#0066cc",doc:"#1e5fa7",docx:"#1e5fa7",xls:"#1d6f42",xlsx:"#1d6f42",ppt:"#c55a11",pptx:"#c55a11"}
      const icon=iconMap[ext]||"📁"
      const color=colorMap[ext]||"#6b7280"
      const label=ext?ext.toUpperCase():"FILE"
      if(item.encrypted){
        thumb=`<div class="thumb" style="flex-direction:column;gap:6px;background:var(--card2);">
          <span style="font-size:36px;">🔒</span>
          <span style="font-size:11px;font-weight:700;color:${color};background:${color}22;padding:2px 10px;border-radius:999px;">${label}</span>
          <span style="font-size:10px;color:var(--sub);">암호화된 파일</span>
        </div>`
      } else {
        thumb=`<div class="thumb" style="flex-direction:column;gap:6px;background:var(--card2);">
          <span style="font-size:42px;">${icon}</span>
          <span style="font-size:11px;font-weight:700;color:${color};background:${color}22;padding:2px 10px;border-radius:999px;">${label}</span>
          <span style="font-size:10px;color:var(--sub);max-width:90%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${item.origName||""}">${item.origName||""}</span>
        </div>`
      }
    }

    card.innerHTML=`
      ${thumb}
      <div class="link-body">
        <span class="star ${item.favorite?"active":""}">★</span>
        <div class="link-title title-${item.type}">${item.encrypted?"🔒 ":""}${item.title}</div>
      </div>`

    card.onclick=async()=>{
      // 루틴 분류 카드 클릭 → practicecheck 오늘 체크 (즐겨찾기한 카드만, 모든 타입)
      if(pcSync.isRutine(currentCategory) && item.favorite) {
        pcSync.markDone(currentCategory, item.title)
      }
      if(item.favorite) recordClick(item)
      if(item.type==="photo"){
        if(item.encrypted){
          const pw=prompt("사진 암호 입력"); if(!pw) return
          const cipher=imageCache.get(item.imgFile)||""
          const decrypted=await decryptText(cipher, pw)
          if(!decrypted){ alert("비밀번호 틀림"); return }
          showPhotoModal(decrypted)
        } else {
          const src=imgSrc(item.imgFile)||imgSrc(item.thumbFile)
          showPhotoModal(src)
        }
      } else if(item.type==="link"||item.type==="youtube"){
        openInDock(item.url, item.title, item.type)
      } else if(item.type==="text"){
        // 텍스트 카드 클릭 → 바로 편집 모드로 열기
        let textValue=item.text
        if(item.encrypted){
          const pw=prompt("비밀번호 입력"); if(!pw) return
          const dec=await decryptText(item.text,pw)
          if(!dec){ alert("비밀번호 틀림"); return }
          textValue=dec
        }
        openTextEditor(item, textValue)
      } else if(item.type==="file"){
        let stored = imageCache.get(item.fileData)||""
        if(!stored){ alert("파일 데이터를 찾을 수 없습니다."); return }
        if(item.encrypted){
          const pw=prompt("파일 암호 입력"); if(!pw) return
          const dec=await decryptText(stored, pw)
          if(!dec){ alert("비밀번호 틀림"); return }
          stored=dec
        }
        openFilePreview(item, stored)
      }
    }

    card.querySelector(".star").onclick=e=>{
      e.stopPropagation(); item.favorite=!item.favorite
      // 루틴 분류이면 즐겨찾기 ON→항목 등록, OFF→항목 제거
      if(pcSync.isRutine(currentCategory) && (item.type==='link'||item.type==='youtube')){
        if(item.favorite) pcSync.ensureHabit(currentCategory, item.title)
        else pcSync.removeHabit(currentCategory, item.title)
      }
      save(); renderLinks()
    }

    if(manageMode){
      const actions=document.createElement("div"); actions.className="manage-actions"

      const edit=document.createElement("button"); edit.textContent="✏"
      edit.onclick=async e=>{
        e.stopPropagation()
        const t=prompt("제목",item.title); if(t) item.title=t

        if(item.type==="link"||item.type==="youtube"){
          const u=prompt("URL",item.url); if(u) item.url=u
          save(); renderLinks()

          const capturedItem = item
          const capturedId   = item.id
          if(confirm("썸네일 이미지도 변경하시겠습니까?")){
            const inp=document.createElement("input"); inp.type="file"; inp.accept="image/*"
            inp.style.cssText="position:fixed;top:-9999px;left:-9999px;opacity:0;pointer-events:none;"
            inp.onchange=async ev=>{
              const f=ev.target.files[0]; if(!f) return
              const iconDataURL=await compressToDataURL(f,128,0.8)
              const newIconFile=makeImgPath(capturedId,"icon_"+Date.now(),currentCategory)
              if(capturedItem.iconFile) imageCache.delete(capturedItem.iconFile)
              imageCache.set(newIconFile, iconDataURL)
              saveImageCache()
              capturedItem.iconFile=newIconFile
              save(); renderLinks()
              if(inp.parentNode) inp.parentNode.removeChild(inp)
            }
            document.body.appendChild(inp)
            inp.click()
            setTimeout(()=>{ if(inp.parentNode) inp.parentNode.removeChild(inp) }, 60000)
          }
          return
        }

        if(item.type==="text"){
          let textValue=item.text
          if(item.encrypted){
            const pw=prompt("비밀번호 입력"); if(!pw) return
            const dec=await decryptText(item.text,pw)
            if(!dec){ alert("비밀번호 틀림"); return }
            textValue=dec
          }
          openTextEditor(item, textValue)
          return
        }
        if(item.type==="file"){
          if(confirm("파일을 다른 파일로 교체하시겠습니까?")){
            const inp=document.createElement("input"); inp.type="file"
            inp.accept=".pdf,.hwp,.hwpx,.doc,.docx,.xls,.xlsx,.ppt,.pptx,application/*"
            inp.style.cssText="position:fixed;top:-9999px;left:-9999px;opacity:0;pointer-events:none;"
            inp.onchange=async ev=>{
              const f=ev.target.files[0]; if(!f) return
              const newDataURL=await new Promise(resolve=>{
                const r=new FileReader(); r.onload=e=>resolve(e.target.result); r.readAsDataURL(f)
              })
              let stored=newDataURL
              if(item.encrypted){
                const pw=prompt("기존 암호 입력"); if(!pw) return
                stored=await encryptText(newDataURL,pw)
              }
              if(item.fileData) imageCache.delete(item.fileData)
              const newPath=makeImgPath(item.id,"file_"+f.name.split(".").pop().toLowerCase(),currentCategory)
              imageCache.set(newPath,stored); saveImageCache()
              item.fileData=newPath; item.ext=f.name.split(".").pop().toLowerCase(); item.origName=f.name
              save(); renderLinks()
              if(inp.parentNode) inp.parentNode.removeChild(inp)
            }
            document.body.appendChild(inp); inp.click()
            setTimeout(()=>{ if(inp.parentNode) inp.parentNode.removeChild(inp) },60000)
          } else { save(); renderLinks() }
          return
        }
        save(); renderLinks()
      }

      const del=document.createElement("button"); del.textContent="🗑"
      del.onclick=e=>{
        e.stopPropagation()
        if(confirm("삭제?")){
          for(const key of ["imgFile","thumbFile","iconFile","fileData"]){
            if(item[key]){ imageCache.delete(item[key]) }
          }
          saveImageCache()
          const delIdx = data[currentCategory].indexOf(item)
          if(delIdx !== -1) data[currentCategory].splice(delIdx, 1)
          save(); renderLinks()
        }
      }

      // 카테고리 이동 버튼
      const move=document.createElement("button"); move.textContent="📂"
      move.title="다른 카테고리로 이동"
      move.onclick=e=>{
        e.stopPropagation()
        openMoveModal(item)
      }

      actions.appendChild(edit); actions.appendChild(move); actions.appendChild(del); card.appendChild(actions)
    }

    if(item.favorite) favBox.appendChild(card)
    else box.appendChild(card)
  })

  if(sortable) sortable.destroy()
  if(favSortable) favSortable.destroy()
  const hidden = isHidden()

  sortable=new Sortable(box,{
    animation:200,
    disabled:hidden,
    onEnd(){
      const nonFavIds=[...box.children].map(el=>Number(el.dataset.linkId)).filter(Boolean)
      const nonFavMap={}
      data[currentCategory].filter(i=>!i.favorite).forEach(i=>{ nonFavMap[i.id]=i })
      const reorderedNonFav=nonFavIds.map(id=>nonFavMap[id]).filter(Boolean)
      data[currentCategory].filter(i=>!i.favorite).forEach(i=>{ if(!reorderedNonFav.includes(i)) reorderedNonFav.push(i) })
      const favItems=data[currentCategory].filter(i=>i.favorite)
      data[currentCategory]=[...favItems,...reorderedNonFav]
      save()
    }
  })

  favSortable=new Sortable(favBox,{
    animation:200,
    disabled:hidden,
    onEnd(){
      const favIds=[...favBox.children].map(el=>Number(el.dataset.linkId)).filter(Boolean)
      const favMap={}
      data[currentCategory].filter(i=>i.favorite).forEach(i=>{ favMap[i.id]=i })
      const reorderedFav=favIds.map(id=>favMap[id]).filter(Boolean)
      data[currentCategory].filter(i=>i.favorite).forEach(i=>{ if(!reorderedFav.includes(i)) reorderedFav.push(i) })
      const nonFavItems=data[currentCategory].filter(i=>!i.favorite)
      data[currentCategory]=[...reorderedFav,...nonFavItems]
      save()
    }
  })

  const favSection = document.getElementById("favSection")
  if(favSection) favSection.style.display = favBox.children.length ? "block" : "none"
}

/* ══════════════════════════════════════════

/* XLSX / XLS — SheetJS로 테이블 변환 */
async function _previewXLSX(dataURL, body, sheetTabs){
  if(typeof XLSX==="undefined") throw new Error("SheetJS 라이브러리 로딩 실패")
  const base64=dataURL.split(",")[1]
  const wb=XLSX.read(base64,{type:"base64"})
  const sheetNames=wb.SheetNames

  body.style.padding="0"
  body.innerHTML=""

  const wrap=document.createElement("div"); wrap.className="xlsx-table-wrap"
  body.appendChild(wrap)

  function showSheet(name){
    const ws=wb.Sheets[name]
    const html=XLSX.utils.sheet_to_html(ws,{editable:false})
    const styledHtml=html.replace(/<table/,'<table style="border-collapse:collapse;font-size:12.5px;width:100%;"')
      .replace(/<td/g,'<td style="padding:4px 10px;border:1px solid var(--border);"')
      .replace(/<th/g,'<th style="padding:5px 10px;border:1px solid var(--border);background:var(--card2);font-weight:600;position:sticky;top:0;"')
    wrap.innerHTML=styledHtml
    sheetTabs.querySelectorAll(".xlsx-tab").forEach(t=>t.classList.toggle("active",t.dataset.sheet===name))
  }

  if(sheetNames.length>1){
    sheetTabs.style.display="flex"
    sheetNames.forEach(name=>{
      const tab=document.createElement("button"); tab.className="xlsx-tab"; tab.textContent=name; tab.dataset.sheet=name
      tab.onclick=()=>showSheet(name)
      sheetTabs.appendChild(tab)
    })
  }
  showSheet(sheetNames[0])
}

/* DOCX — mammoth.js로 HTML 변환 */
async function _previewDOCX(dataURL, body){
  if(typeof mammoth==="undefined") throw new Error("mammoth.js 라이브러리 로딩 실패")
  const base64=dataURL.split(",")[1]
  const binary=atob(base64)
  const bytes=new Uint8Array(binary.length)
  for(let i=0;i<binary.length;i++) bytes[i]=binary.charCodeAt(i)
  const result=await mammoth.convertToHtml({arrayBuffer:bytes.buffer})
  body.innerHTML=`<div class="docx-preview">${result.value}</div>`
}

/* PPTX — JSZip으로 슬라이드 텍스트 추출 */
async function _previewPPTX(dataURL, body){
  if(typeof JSZip==="undefined") throw new Error("JSZip 라이브러리 로딩 실패")
  const base64=dataURL.split(",")[1]
  const binary=atob(base64)
  const bytes=new Uint8Array(binary.length)
  for(let i=0;i<binary.length;i++) bytes[i]=binary.charCodeAt(i)
  const zip=await JSZip.loadAsync(bytes.buffer)

  const slideFiles=Object.keys(zip.files).filter(n=>/^ppt\/slides\/slide[0-9]+\.xml$/.test(n))
    .sort((a,b)=>{
      const na=parseInt(a.match(/slide(\d+)/)[1]), nb=parseInt(b.match(/slide(\d+)/)[1])
      return na-nb
    })

  if(!slideFiles.length){ body.innerHTML=`<div style="padding:30px;color:var(--sub);">슬라이드를 찾을 수 없습니다.</div>`; return }

  let html=`<div style="font-size:12px;color:var(--sub);margin-bottom:12px;">⚠ 텍스트만 추출됩니다. 이미지·도형 레이아웃은 표시되지 않습니다.</div>`
  for(let i=0;i<slideFiles.length;i++){
    const xmlStr=await zip.files[slideFiles[i]].async("string")
    const parser=new DOMParser()
    const doc=parser.parseFromString(xmlStr,"text/xml")
    const texts=[...doc.querySelectorAll("t")].map(t=>t.textContent).filter(t=>t.trim())
    const unique=[...new Set(texts)]
    html+=`<div class="pptx-slide">
      <div class="pptx-slide-num">슬라이드 ${i+1}</div>
      <div style="font-size:13px;line-height:1.7;">${unique.join(" · ")||"<span style=color:var(--sub)>텍스트 없음</span>"}</div>
    </div>`
  }
  body.innerHTML=html
}

/* HWPX — JSZip으로 텍스트 추출 */
async function _previewHWPX(dataURL, body){
  if(typeof JSZip==="undefined") throw new Error("JSZip 라이브러리 로딩 실패")
  const base64=dataURL.split(",")[1]
  const binary=atob(base64)
  const bytes=new Uint8Array(binary.length)
  for(let i=0;i<binary.length;i++) bytes[i]=binary.charCodeAt(i)
  const zip=await JSZip.loadAsync(bytes.buffer)

  // HWPX 텍스트 위치: Contents/section*.xml
  const sectionFiles=Object.keys(zip.files).filter(n=>/^Contents\/section[0-9]+\.xml$/i.test(n)||/^contents\/section[0-9]+\.xml$/i.test(n))
    .sort()

  let allText=""
  for(const sf of sectionFiles){
    const xmlStr=await zip.files[sf].async("string")
    const parser=new DOMParser()
    const doc=parser.parseFromString(xmlStr,"text/xml")
    // 한글 XML 텍스트 노드: <hp:t> 또는 <t>
    const textNodes=[...doc.querySelectorAll("t")]
    allText+=textNodes.map(t=>t.textContent).filter(t=>t.trim()).join("\n")
  }

  if(!allText.trim()){ body.innerHTML=`<div style="padding:30px;color:var(--sub);">텍스트를 추출할 수 없습니다.<br>HWPX 파일 구조를 인식하지 못했습니다.</div>`; return }

  body.innerHTML=`
    <div style="font-size:12px;color:var(--sub);margin-bottom:12px;">⚠ 텍스트만 추출됩니다. 서식·표·이미지는 표시되지 않습니다.</div>
    <div class="hwpx-preview">${allText.replace(/</g,"&lt;").replace(/>/g,"&gt;")}</div>`
}

/* ══════════════════════════════════════════
   현재 DOM 순서를 data에 즉시 저장
   — 숨김 모드 진입 전 호출하여 드래그 순서 보존
══════════════════════════════════════════ */
function _saveCurrentDOMOrder(){
  if(!currentCategory || !data[currentCategory]) return
  const box    = document.getElementById("linkList")
  const favBox = document.getElementById("favList")
  if(!box || !favBox) return

  // ID → 아이템 맵
  const allMap = {}
  data[currentCategory].forEach(i => { allMap[i.id] = i })

  // 현재 DOM에 보이는 항목 순서 읽기
  const favIds    = [...favBox.children].map(el => Number(el.dataset.linkId)).filter(id => id && allMap[id])
  const nonFavIds = [...box.children].map(el => Number(el.dataset.linkId)).filter(id => id && allMap[id])

  // 검색 필터 등으로 DOM에 없는 항목(고아)은 기존 순서 유지
  const usedIds = new Set([...favIds, ...nonFavIds])
  const orphans = data[currentCategory].filter(i => !usedIds.has(i.id))

  data[currentCategory] = [
    ...favIds.map(id => allMap[id]),
    ...nonFavIds.map(id => allMap[id]),
    ...orphans
  ]
  save()
}

function getWeekDates(offset){
  const now = new Date()
  const day = now.getDay()
  const mon = new Date(now)
  mon.setDate(now.getDate() - (day===0 ? 6 : day-1) + offset*7)
  const dates = []
  for(let i=0;i<7;i++){
    const d = new Date(mon); d.setDate(mon.getDate()+i)
    dates.push(getLocalDateStr(d))
  }
  return dates
}

/* ══════════════════════════════════════════
   미완료 할일 이월
   오늘 이전 날짜 중 미완료 항목을 오늘로 복사.
   이월된 항목에는 carriedFrom 필드를 기록해
   중복 이월을 방지하고 원래 날짜를 표시.
══════════════════════════════════════════ */
function carryOverIncompleteTodos(){
  const today = getLocalDateStr()
  let all = {}
  try{ all = JSON.parse(localStorage.getItem("lmTodos")||"{}") }catch{ return }

  const todayList = all[today] || []
  const alreadyCarried = new Set(todayList.filter(t=>t.carriedFrom).map(t=>t.originalId||t.id))

  let changed = false
  Object.keys(all).sort().forEach(dateStr => {
    if(dateStr >= today) return
    const list = all[dateStr]
    if(!Array.isArray(list)) return
    list.forEach(todo => {
      if(todo.done) return
      const origId = String(todo.originalId || todo.id)
      if(alreadyCarried.has(origId)) return
      todayList.push({
        id: Date.now() + Math.floor(Math.random()*10000),
        text: todo.text,
        done: false,
        carriedFrom: dateStr,
        originalId: origId
      })
      alreadyCarried.add(origId)
      changed = true
    })
  })

  if(changed){
    all[today] = todayList
    localStorage.setItem("lmTodos", JSON.stringify(all))
  }
}

function addTodo(){
  const inp = document.getElementById("todoInput")
  const text = inp.value.trim(); if(!text) return
  const list = getTodos()
  list.push({ id: Date.now(), text, done: false })
  saveTodos(list); inp.value = ""
  renderTodos()
}
function toggleTodo(id){
  const list = getTodos()
  const item = list.find(t=>t.id==id)
  if(item) item.done = !item.done
  saveTodos(list)
  renderTodos()
  if(currentTodoTab==="done") renderDoneList()
}
function deleteTodo(id){
  saveTodos(getTodos().filter(t=>t.id!=id))
  renderTodos()
}
function renderTodos(){
  const list = getTodos()
  const el = document.getElementById("todoList"); if(!el) return
  el.innerHTML = ""

  // 미완료만 표시
  const pending = list.filter(t=>!t.done)
  const doneCount = list.filter(t=>t.done).length
  const badge = document.getElementById("todoBadge")
  if(badge) badge.textContent = doneCount+"/"+list.length

  const dateLabel = document.getElementById("todoDateLabel")
  const today = getLocalDateStr()
  if(dateLabel){
    const isToday = todoSelectedDate === today
    dateLabel.textContent = isToday ? "오늘" : todoSelectedDate.slice(5).replace("-","/")
    dateLabel.style.color = isToday ? "var(--accent)" : "var(--sub)"
  }

  renderCal()

  if(!pending.length){
    el.innerHTML = '<div style="text-align:center;padding:14px;color:var(--sub);font-size:12px;">'+
      (list.length > 0 ? '🎉 모두 완료했어요!' : '할일을 추가해보세요')+'</div>'
    return
  }

  pending.forEach(todo=>{
    const row = document.createElement("div")
    row.className = "todo-row"
    row.dataset.id = todo.id
    const carriedBadge = todo.carriedFrom
      ? `<span title="이월된 항목: ${todo.carriedFrom}" style="
          font-size:10px;padding:1px 5px;border-radius:4px;flex-shrink:0;
          background:rgba(245,158,11,0.15);color:#b45309;
          border:1px solid rgba(245,158,11,0.3);white-space:nowrap;">
          ↩ ${todo.carriedFrom.slice(5).replace("-","/")}
         </span>`
      : ""
    row.innerHTML = `
      <span class="todo-drag-handle" style="cursor:grab;color:var(--sub);font-size:13px;
        flex-shrink:0;padding:0 2px;user-select:none;line-height:1;opacity:0.5;">⠿</span>
      <input type="checkbox" onchange="toggleTodo(${todo.id})"
        style="width:15px;height:15px;cursor:pointer;accent-color:var(--accent);flex-shrink:0;">
      <span style="flex:1;font-size:12.5px;min-width:0;overflow:hidden;text-overflow:ellipsis;">${todo.text}</span>
      ${carriedBadge}
      <button onclick="deleteTodo(${todo.id})"
        style="min-height:18px;padding:0 5px;font-size:11px;border-radius:4px;
        color:var(--sub);background:transparent;border:none;flex-shrink:0;">🗑</button>`
    el.appendChild(row)
  })

  // 드래그 정렬 초기화
  if(window.Sortable){
    Sortable.create(el, {
      handle: ".todo-drag-handle",
      animation: 120,
      ghostClass: "todo-drag-ghost",
      onEnd(evt){
        const list = getTodos()
        const pending = list.filter(t=>!t.done)
        const done    = list.filter(t=>t.done)
        // DOM 순서대로 id 배열 추출
        const newOrder = [...el.querySelectorAll(".todo-row")].map(r=>Number(r.dataset.id))
        const reordered = newOrder.map(id=>pending.find(t=>t.id===id)).filter(Boolean)
        saveTodos([...reordered, ...done])
      }
    })
  }
}

function renderDoneList(){
  const list = getTodos()
  const el = document.getElementById("doneList"); if(!el) return
  el.innerHTML = ""
  const done = list.filter(t=>t.done)
  if(!done.length){
    el.innerHTML = '<div style="text-align:center;padding:14px;color:var(--sub);font-size:12px;">아직 완료한 항목이 없어요</div>'
    return
  }
  done.forEach(todo=>{
    const row = document.createElement("div")
    row.className = "todo-row"
    row.innerHTML = `
      <input type="checkbox" checked onchange="toggleTodo(${todo.id})"
        style="width:15px;height:15px;cursor:pointer;accent-color:var(--accent);flex-shrink:0;">
      <span style="flex:1;font-size:12.5px;min-width:0;overflow:hidden;text-overflow:ellipsis;text-decoration:line-through;color:var(--sub);">${todo.text}</span>
      <button onclick="deleteTodo(${todo.id})"
        style="min-height:18px;padding:0 5px;font-size:11px;border-radius:4px;
        color:var(--sub);background:transparent;border:none;flex-shrink:0;">🗑</button>`
    el.appendChild(row)
  })

/* ══════════════════════════════════════════
   달력 패널
══════════════════════════════════════════ */
let calYear = new Date().getFullYear()
let calMonth = new Date().getMonth()

function calMove(dir){
  calMonth += dir
  if(calMonth > 11){ calMonth=0; calYear++ }
  if(calMonth < 0){ calMonth=11; calYear-- }
  renderCal()
}
function renderCal(){
  const titleEl = document.getElementById("calTitle"); if(!titleEl) return
  titleEl.textContent = calYear+"."+(String(calMonth+1).padStart(2,"0"))
  const grid = document.getElementById("calGrid")
  grid.innerHTML = ""
  const today = getLocalDateStr()
  const DAY_LABELS = ["일","월","화","수","목","금","토"]

  DAY_LABELS.forEach((d,i)=>{
    const el = document.createElement("div")
    el.textContent = d
    el.style.cssText = `font-weight:700;font-size:11px;padding:4px 0;color:${i===0?"#e55353":i===6?"#2563eb":"var(--sub)"};`
    grid.appendChild(el)
  })

  const firstDay = new Date(calYear, calMonth, 1).getDay()
  for(let i=0;i<firstDay;i++){
    grid.appendChild(document.createElement("div"))
  }

  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate()
  let todoAll = {}
  try{ todoAll = JSON.parse(localStorage.getItem("lmTodos")||"{}") }catch{}
  let schedAll = {}
  try{ schedAll = (JSON.parse(localStorage.getItem("scheduleData")||"{}"))||{} }catch{}
  const schedEvents = schedAll.events || {}

  for(let d=1;d<=daysInMonth;d++){
    const dateStr = calYear+"-"+String(calMonth+1).padStart(2,"0")+"-"+String(d).padStart(2,"0")
    const isToday = dateStr === today
    const dow = new Date(calYear,calMonth,d).getDay()
    const hasTodo = (todoAll[dateStr]||[]).length > 0
    const doneTodo = (todoAll[dateStr]||[]).filter(t=>t.done).length
    const totalTodo = (todoAll[dateStr]||[]).length
    const hasSched = (schedEvents[dateStr]||[]).length > 0

    const el = document.createElement("div")
    el.style.cssText = `
      position:relative;padding:4px 2px 8px;border-radius:6px;cursor:pointer;
      font-size:12px;font-weight:${isToday?"700":"500"};
      color:${isToday?"#fff":dow===0?"#e55353":dow===6?"#2563eb":"var(--text)"};
      background:${isToday?"var(--accent,#2d6a4f)":"transparent"};
    `
    el.textContent = d

    // 할일 도트 (빨강/파랑)
    if(hasTodo){
      const dot = document.createElement("div")
      dot.style.cssText = `
        position:absolute;bottom:2px;left:${hasSched?"30%":"50%"};transform:translateX(-50%);
        width:4px;height:4px;border-radius:50%;
        background:${doneTodo===totalTodo?"var(--accent)":"#e55353"};
      `
      el.appendChild(dot)
    }

    // 일정 도트 (주황)
    if(hasSched){
      const dot2 = document.createElement("div")
      dot2.style.cssText = `
        position:absolute;bottom:2px;left:${hasTodo?"70%":"50%"};transform:translateX(-50%);
        width:4px;height:4px;border-radius:50%;background:#f59e0b;
      `
      el.appendChild(dot2)
    }

    el.onclick = ()=>{
      todoSelectedDate = dateStr
      document.querySelectorAll("#calGrid .cal-day").forEach(e=>{
        e.style.outline = "none"
        if(!e.dataset.today) e.style.background = "transparent"
      })
      el.style.outline = isToday ? "none" : "2px solid var(--accent)"
      const todoP = document.getElementById("todoPanel")
      todoP.style.display = "block"
      renderTodos()
      if(currentTodoTab==="done") renderDoneList()
      renderScheduleForDate(dateStr)
      adjustPanelPositions()
    }
    el.classList.add("cal-day")
    if(isToday) el.dataset.today = "1"
    el.onmouseover = ()=>{ if(!isToday) el.style.background="var(--border)" }
    el.onmouseout  = ()=>{ if(!isToday) el.style.background="transparent" }
    grid.appendChild(el)
  }
}
function toggleCalPanel(){
  const p = document.getElementById("calPanel")
  const open = p.style.display !== "none"
  p.style.display = open ? "none" : "block"
  if(!open){
    calYear = new Date().getFullYear()
    calMonth = new Date().getMonth()
    renderCal()
    adjustPanelPositions()
  } else { adjustPanelPositions() }
}

/* ── schedule.html 일정 연동 렌더 ── */
function renderScheduleForDate(dateStr){
  const list = document.getElementById("scheduleList")
  if(!list) return

  let sd = {}
  try{ sd = JSON.parse(localStorage.getItem("scheduleData")||"{}") }catch{}
  const events = (sd.events||{})[dateStr] || []
  const cats   = sd.categories || []

  list.innerHTML = ""
  if(!events.length){
    list.innerHTML = '<div style="text-align:center;padding:12px;color:var(--sub);font-size:12px;">이 날 일정이 없어요</div>'
    return
  }

  events.forEach((ev, idx) => {
    const cat = cats.find(c=>c.name===ev.category)
    const color = cat?.color || "#8b909a"
    const row = document.createElement("div")
    row.style.cssText = `display:flex;align-items:center;gap:6px;padding:5px 8px;
      border-radius:7px;background:${color}22;font-size:12.5px;margin-bottom:2px;`
    row.innerHTML = `
      <span style="width:7px;height:7px;border-radius:50%;background:${color};flex-shrink:0;display:inline-block;"></span>
      <span style="flex:1;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${ev.text}</span>
      ${ev.category ? `<span style="font-size:10px;color:${color};font-weight:600;">${ev.category}</span>` : ""}
      <button onclick="deleteScheduleEvent('${dateStr}',${idx})"
        style="min-height:16px;padding:0 5px;font-size:11px;border-radius:4px;
        color:var(--sub);background:transparent;border:none;flex-shrink:0;">🗑</button>
    `
    list.appendChild(row)
  })
}

/* ══════════════════════════════════════════
   패널 위치 자동 스택 조정
══════════════════════════════════════════ */
function adjustPanelPositions(){
  const panels = [
    document.getElementById("pomoPanel"),
    document.getElementById("todoPanel"),
    document.getElementById("calPanel"),
  ]
  let bottom = 20
  const gap = 12
  panels.forEach(p=>{
    if(!p) return
    if(p.dataset.dragged) return   // 수동 이동된 패널은 위치 고정 유지
    p.style.right = "20px"
    if(p.style.display !== "none"){
      p.style.bottom = bottom + "px"
      bottom += p.offsetHeight + gap
    }
  })
}

/* ══════════════════════════════════════════
   인앱 뽀모도로 타이머
══════════════════════════════════════════ */
const POMO_CIRC = 2 * Math.PI * 36

let pomo = {
  mode: "pomo",
  cfg: { pomo:25, short:5, long:15 },
  totalSecs: 25*60,
  remainSecs: 25*60,
  running: false,
  timerId: null,
  pomosThisRound: 0,
  roundCount: 1
}

try{ Object.assign(pomo.cfg, JSON.parse(localStorage.getItem("pomoConfig")||"{}")) }catch{}
pomo.totalSecs = pomo.remainSecs = pomo.cfg.pomo * 60

function togglePomoPanel(){
  const panel = document.getElementById("pomoPanel")
  const visible = panel.style.display === "flex"
  panel.style.display = visible ? "none" : "flex"
  if(!visible) pomoUpdateUI()
  setTimeout(adjustPanelPositions, 50)
}

function pomoGetLog(){ try{ return JSON.parse(localStorage.getItem("lmPomoLog")||"{}") }catch{ return {} } }
function pomoSaveLog(log){ localStorage.setItem("lmPomoLog", JSON.stringify(log)) }
function pomoGetToday(){
  const today = getLocalDateStr()
  const log = pomoGetLog()
  return log[today] || { count:0, focusMin:0 }
}
function pomoRecordComplete(){
  const today = getLocalDateStr()
  const log = pomoGetLog()
  if(!log[today]) log[today] = { count:0, focusMin:0 }
  log[today].count += 1
  log[today].focusMin += pomo.cfg.pomo
  pomoSaveLog(log)
  updatePomoBadge()
}

function pomoUpdateUI(){
  const m = String(Math.floor(pomo.remainSecs/60)).padStart(2,"0")
  const s = String(pomo.remainSecs%60).padStart(2,"0")
  const timeEl = document.getElementById("pomoTime")
  if(timeEl) timeEl.textContent = m+":"+s

  const ring = document.getElementById("pomoRing")
  if(ring){
    const pct = pomo.remainSecs / pomo.totalSecs
    ring.style.strokeDashoffset = POMO_CIRC * (1 - pct)
    const colors = { pomo:"#e55353", short:"var(--accent2,#40916c)", long:"var(--accent,#2d6a4f)" }
    ring.style.stroke = colors[pomo.mode]
  }

  const labels = { pomo:"집중 시간", short:"짧은 휴식", long:"긴 휴식" }
  const lbl = document.getElementById("pomoModeLabel")
  if(lbl) lbl.textContent = labels[pomo.mode]

  ;["pomo","short","long"].forEach(m2 => {
    const t = document.getElementById("ptab-"+m2)
    if(!t) return
    if(m2 === pomo.mode){
      const c = m2==="pomo"?"#e55353":"var(--accent,#2d6a4f)"
      t.style.background = c; t.style.color = "#fff"
    } else {
      t.style.background = "transparent"; t.style.color = "var(--sub)"
    }
  })

  const sl = document.getElementById("pomoSetLabel")
  if(sl) sl.textContent = pomo.cfg[pomo.mode] + "분"

  const sb = document.getElementById("pomoStartBtn")
  if(sb){
    sb.textContent = pomo.running ? "⏸" : "▶"
    const btnColors = { pomo:"#e55353", short:"var(--accent2,#22c55e)", long:"var(--accent,#3a5bd9)" }
    sb.style.background = btnColors[pomo.mode]
    sb.style.boxShadow = pomo.mode==="pomo"
      ? "0 4px 14px rgba(229,83,83,0.4)"
      : pomo.mode==="short"
        ? "0 4px 14px rgba(34,197,94,0.35)"
        : "0 4px 14px rgba(58,91,217,0.35)"
  }

  const dot = document.getElementById("pomoModeDot")
  if(dot){
    const dotColors = { pomo:"#e55353", short:"var(--accent2,#40916c)", long:"var(--accent,#2d6a4f)" }
    dot.style.background = dotColors[pomo.mode]
    dot.style.animation = pomo.running ? "pomoBlink 1.2s ease-in-out infinite" : "none"
  }

  const d = pomoGetToday()
  const tb = document.getElementById("pomoTodayBadge")
  if(tb) tb.textContent = d.count + "🍅"
}

function pomoSetMode(m, autoStart=false){
  if(pomo.running && !autoStart){
    if(!confirm("진행 중입니다. 전환할까요?")) return
  }
  pomoStop()
  pomo.mode = m
  pomo.totalSecs = pomo.cfg[m] * 60
  pomo.remainSecs = pomo.totalSecs
  pomoUpdateUI()
  if(autoStart) pomoStart()
}

function pomoStart(){
  if(pomo.running) return
  pomo.running = true
  pomo.timerId = setInterval(pomoTick, 1000)
  pomoUpdateUI()
}
function pomoStop(){
  pomo.running = false
  clearInterval(pomo.timerId); pomo.timerId = null
  pomoUpdateUI()
}
function pomoToggle(){ pomo.running ? pomoStop() : pomoStart() }

function pomoTick(){
  if(pomo.remainSecs <= 0){ pomoComplete(); return }
  pomo.remainSecs--
  pomoUpdateUI()
  const m = String(Math.floor(pomo.remainSecs/60)).padStart(2,"0")
  const s = String(pomo.remainSecs%60).padStart(2,"0")
  if(pomo.running) document.title = m+":"+s+" ⏱ StudyLink"
  else document.title = "Study Link Manager"
}

function pomoComplete(){
  pomoStop()
  try{
    const ctx = new (window.AudioContext||window.webkitAudioContext)()
    const osc = ctx.createOscillator(), gain = ctx.createGain()
    osc.connect(gain); gain.connect(ctx.destination)
    osc.frequency.value = 880
    gain.gain.setValueAtTime(0.3, ctx.currentTime)
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+1.2)
    osc.start(); osc.stop(ctx.currentTime+1.2)
  }catch{}

  if(pomo.mode === "pomo"){
    pomoRecordComplete()
    pomo.pomosThisRound++
    if(pomo.pomosThisRound >= 4){
      pomo.pomosThisRound = 0; pomo.roundCount++
      pomoSetMode("long", true)
    } else {
      pomoSetMode("short", true)
    }
  } else {
    pomoSetMode("pomo", true)
  }
}

function pomoClickTime(){
  const modes = ["pomo","short","long"]
  const next = modes[(modes.indexOf(pomo.mode)+1)%3]
  pomoSetMode(next)
}
function pomoSkipBack(){
  pomoStop()
  pomo.remainSecs = pomo.totalSecs
  pomoUpdateUI()
}
function pomoSkipNext(){
  if(!confirm("현재 타이머를 건너뛸까요?")) return
  pomoComplete()
}
function pomoAdjTime(delta){
  const min = pomo.mode==="pomo"?5:1, max = pomo.mode==="pomo"?60:30
  pomo.cfg[pomo.mode] = Math.max(min, Math.min(max, pomo.cfg[pomo.mode]+delta))
  localStorage.setItem("pomoConfig", JSON.stringify(pomo.cfg))
  pomo.totalSecs = pomo.cfg[pomo.mode]*60
  pomo.remainSecs = pomo.totalSecs
  pomoUpdateUI()
}

  window.ytToggleEmbed = function(id, vid, forceClose=false){
    const embedArea = document.getElementById("ytEmbedArea-"+id)
    const thumbArea = document.getElementById("ytThumbArea-"+id)
    const btn       = document.getElementById("ytEmbedBtn-"+id)
    const iframeEl  = document.getElementById("ytIframe-"+id)
    const errDiv    = document.getElementById("ytEmbedErr-"+id)
    if(!embedArea) return

    const isOpen = embedArea.style.display === "flex"
    if(isOpen || forceClose){
      // 닫기
      embedArea.style.display = "none"
      thumbArea.style.display = "flex"
      if(iframeEl) iframeEl.src = ""
      if(btn) btn.textContent = "📺 임베드 시도"
    } else {
      // 열기: 임베드 시도

      thumbArea.style.display = "none"
      if(btn) btn.textContent = "🖼 미리보기로"
      if(errDiv) errDiv.style.display = "none"
      const embedUrl = `https://www.youtube-nocookie.com/embed/${vid}?autoplay=1&rel=0&modestbranding=1`
      if(iframeEl){
        // 로드 실패 or 오류 153 감지
        iframeEl.onerror = ()=>{
          if(errDiv) errDiv.style.display = "flex"
        }
        // 5초 후 여전히 빈 페이지면 오류로 간주
        iframeEl.onload = ()=>{

            if(!d || !d.body || d.body.innerHTML.trim()===""){
              if(errDiv) errDiv.style.display = "flex"
            }
          }catch{ /* cross-origin = 정상 */ }
        }
        iframeEl.src = embedUrl

          const fsEl = document.fullscreenElement || document.webkitFullscreenElement

            document.getElementById("tabBar").style.display = "none"
          } else {
            document.getElementById("topMenuBar").style.display = ""
            document.getElementById("tabBar").style.display = ""

     탭 열기 (메인)
  ───────────────────────────────────── */
  window.openInDock = function(url, title, type){
    for(const [id, t] of Object.entries(tabs)){
      if(t.url === url){ setActiveTab(id); return }
    }
    const id = "tab-" + (++tabCounter)
    const vid = getYoutubeId(url)
    const isYoutube = (type === "youtube") || !!vid

    // ── 탭 버튼 ──
    const tabEl = document.createElement("div")
    tabEl.className = "tab-item"
    tabEl.id = "tabBtn-" + id
    let faviconHtml = isYoutube
      ? `<span style="font-size:12px;color:#ff0000;flex-shrink:0;">▶</span>`
      : ""
    if(!isYoutube){
      try{
        const domain = new URL(url.startsWith("http")?url:"http://"+url).hostname
        faviconHtml = `<img class="tab-favicon" src="https://www.google.com/s2/favicons?sz=32&domain=${domain}" onerror="this.style.display='none'">`
      }catch{}
    }
    const shortTitle = title.length > 18 ? title.slice(0,18)+"…" : title
    tabEl.innerHTML = `
      ${faviconHtml}
      <span class="tab-label" title="${title}">${shortTitle}</span>
      <span class="tab-close" onclick="closeTab('${id}',event)" title="닫기">✕</span>`
    tabEl.addEventListener("click", e=>{
      if(!e.target.classList.contains("tab-close")) setActiveTab(id)
    })
    tabBar.appendChild(tabEl)

    // ── 패널 ──
    let panelEl
    let iframeEl = null

    if(isYoutube && vid){
      // YouTube 전용 미니 플레이어
      panelEl = buildYoutubePanel(id, vid, url, title)
      document.body.appendChild(panelEl)
    } else {
      // 일반 사이트 iframe
      // ── GitHub .html 파일 → htmlpreview 자동 변환 ──
      // raw.githubusercontent.com/.../xxx.html  →  htmlpreview
      // github.com/.../blob/.../xxx.html        →  htmlpreview
      function toHtmlPreview(u){
        try{
          // raw URL: https://raw.githubusercontent.com/user/repo/branch/path.html
          const rawMatch = u.match(/^https?:\/\/raw\.githubusercontent\.com\/([^/]+\/[^/]+\/.+\.html)(\?.*)?$/i)
          if(rawMatch){
            return `https://htmlpreview.github.io/?https://github.com/${rawMatch[1].replace(/^([^/]+\/[^/]+)\//, '$1/blob/')}`
          }
          // blob URL: https://github.com/user/repo/blob/branch/path.html
          const blobMatch = u.match(/^https?:\/\/github\.com\/.+\/blob\/.+\.html(\?.*)?$/i)
          if(blobMatch){
            return `https://htmlpreview.github.io/?${u.split('?')[0]}`
          }
        }catch{}
        return u
      }
      const embedUrl = toHtmlPreview(url)
      panelEl = document.createElement("div")
      panelEl.className = "iframe-panel"
      panelEl.id = "panel-" + id
      panelEl.style.cssText = "position:fixed;z-index:99980;"

      panelEl.innerHTML = `
        <div class="iframe-toolbar">
          <button onclick="tabNav('${id}','back')" title="뒤로">◀</button>
          <button onclick="tabNav('${id}','fwd')"  title="앞으로">▶</button>
          <button onclick="tabNav('${id}','reload')" title="새로고침">↺</button>
          <div class="iframe-url-bar">
            <span style="color:var(--accent);flex-shrink:0;font-size:12px;">🔗</span>
            <span class="iframe-url-text" id="urlText-${id}">${embedUrl}</span>
          </div>
          <button onclick="tabOpenNew('${id}')" title="새 탭에서 열기" style="color:var(--accent);font-weight:700;">↗</button>
          <button id="fsBtn-${id}" onclick="toggleFullscreen('${id}')" title="전체화면" style="font-size:14px;">⛶</button>
          <button onclick="closeTab('${id}')" title="닫기" style="color:var(--pomo);font-weight:700;">✕</button>
        </div>
        <div class="iframe-overlay" id="overlay-${id}">
          <div class="tab-spinner"></div>
          <div style="font-size:12px;color:var(--sub);margin-top:4px;">페이지 로딩 중...</div>
        </div>
        <div class="iframe-overlay hidden" id="blocked-${id}">
          <div style="font-size:36px;">🚫</div>
          <div style="font-size:15px;font-weight:700;color:var(--text);margin-top:8px;">이 사이트는 iframe 표시를 차단했습니다</div>
          <div style="font-size:13px;color:var(--sub);max-width:380px;line-height:1.6;margin-top:4px;">보안 정책(X-Frame-Options)으로 인해 내장 표시가 불가합니다.</div>
          <button class="primary" onclick="tabOpenNew('${id}')" style="margin-top:12px;">새 탭에서 열기 ↗</button>
        </div>
        <iframe id="iframe-${id}"
          class="iframe-frame"
          sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox allow-top-navigation-by-user-activation allow-presentation"
          allow="autoplay *; fullscreen *; picture-in-picture *; encrypted-media *; camera *; microphone *"
          allowfullscreen
          referrerpolicy="no-referrer-when-downgrade"></iframe>`

      document.body.appendChild(panelEl)
      iframeEl = document.getElementById("iframe-"+id)

      const handleFsChange = ()=>{
        const fsEl = document.fullscreenElement || document.webkitFullscreenElement
        if(fsEl){
          document.getElementById("topMenuBar").style.display = "none"
          document.getElementById("tabBar").style.display = "none"
          const hotCorner = document.getElementById("fsHotCorner")
          if(hotCorner) hotCorner.style.display = "none"
        } else {
          document.getElementById("topMenuBar").style.display = ""
          document.getElementById("tabBar").style.display = ""
        }
      }
      document.addEventListener("fullscreenchange", handleFsChange)
      document.addEventListener("webkitfullscreenchange", handleFsChange)

      iframeEl.addEventListener("load", ()=>{
        document.getElementById("overlay-"+id)?.classList.add("hidden")
        try{
          const doc = iframeEl.contentDocument || iframeEl.contentWindow.document
          if(!doc || !doc.body || doc.body.innerHTML.trim()===""){
            // 차단됨 → 자동으로 새 탭 열고 탭 닫기
            window._iframeAutoOpen(id)
          }
        }catch{
          // cross-origin = 정상 로드 (접근 불가한 것이 정상)
        }
      })
      iframeEl.addEventListener("error", ()=>{
        document.getElementById("overlay-"+id)?.classList.add("hidden")
        // 에러 → 자동으로 새 탭 열고 탭 닫기
        window._iframeAutoOpen(id)
      })
      setTimeout(()=>{ iframeEl.src = embedUrl }, 60)
    }

    tabs[id] = { url, embedUrl: url, title, type, tabEl, panelEl, iframeEl }
    setActiveTab(id)
    setTimeout(()=>{ tabEl.scrollIntoView({ behavior:"smooth", inline:"end" }) }, 80)
  }

  /* ─────────────────────────────────────
     탭 전환
  ───────────────────────────────────── */
  function setActiveTab(id){
    // 전체화면 해제
    exitFullscreen()
    activeTabId = id
    document.querySelectorAll(".tab-item").forEach(el => el.classList.remove("active"))
    const btn = id === "home"
      ? document.getElementById("tab-home")
      : document.getElementById("tabBtn-"+id)
    if(btn) btn.classList.add("active")

    lmPanel.style.display = id === "home" ? "" : "none"
    Object.keys(tabs).forEach(tid => {
      const p = document.getElementById("panel-"+tid)
      if(p) p.classList.toggle("panel-active", tid === id)
    })
  }

  /* ─────────────────────────────────────
     탭 닫기
  ───────────────────────────────────── */
  window.closeTab = function(id, e){
    if(e) e.stopPropagation()
    const t = tabs[id]; if(!t) return
    if(activeTabId === id) exitFullscreen()
    t.tabEl.remove()
    t.panelEl.remove()
    delete tabs[id]
    if(activeTabId === id){
      const rem = Object.keys(tabs)
      setActiveTab(rem.length ? rem[rem.length-1] : "home")
    }
  }

  /* ─────────────────────────────────────
     iframe 네비게이션
  ───────────────────────────────────── */
  window.tabNav = function(id, action){
    const t = tabs[id]; if(!t) return
    if(action==="back")   try{ t.iframeEl.contentWindow.history.back()    }catch{}
    if(action==="fwd")    try{ t.iframeEl.contentWindow.history.forward() }catch{}
    if(action==="reload"){
      document.getElementById("overlay-"+id)?.classList.remove("hidden")
      document.getElementById("blocked-"+id)?.classList.add("hidden")
      t.iframeEl.src = t.embedUrl
    }
  }
  window.tabOpenNew = function(id){
    const t = tabs[id]; if(!t) return
    window.open(t.url, "_blank")
  }

  /* ═══════════════════════════════════════
     전체화면 — 두 모드 독립 동작
     ① 탭 전체화면  : 탭 패널 상단바 숨김
     ② 브라우저 전체화면 : 브라우저 크롬 숨김
     → 동시에 켤 수 있음, 해제 버튼만 위치 분리
  ═══════════════════════════════════════ */
  let fsTabId = null

  /* ── ① 탭 전체화면 ── */
  window.toggleFullscreen = function(id){
    if(fsTabId === id){ _exitTabFs(); return }
    if(fsTabId) _exitTabFs()
    fsTabId = id
    document.body.classList.add("tab-fs")
    const btn = document.getElementById("fsBtn-"+id)
    if(btn) btn.textContent = "⊡"
    _showFsCorner()
  }

  function _exitTabFs(){
    if(!fsTabId) return
    document.body.classList.remove("tab-fs")
    const btn = document.getElementById("fsBtn-"+fsTabId)
    if(btn) btn.textContent = "⛶"
    _hideFsCorner()
    fsTabId = null
  }
  window.exitFullscreen = _exitTabFs

  /* 탭 전체화면 해제 버튼 — 사이드바 오른쪽 상단에 표시 */
  function _showFsCorner(){
    let ov = document.getElementById("fsHotCorner")
    if(!ov){
      ov = document.createElement("div")
      ov.id = "fsHotCorner"
      ov.innerHTML = `<span style="font-size:14px;">⊡</span><span>탭화면 해제 (ESC)</span>`
      ov.addEventListener("click", _exitTabFs)
      document.body.appendChild(ov)
    }
    ov.style.top          = "0"
    ov.style.borderRadius = "0 0 0 14px"
    ov.style.display      = "flex"
  }
  function _hideFsCorner(){
    const ov = document.getElementById("fsHotCorner")
    if(ov) ov.style.display = "none"
    _adjustCornerPositions()
  }

  /* ── ② 브라우저 전체화면 ── */
  window.toggleBrowserFullscreen = function(){
    if(!document.fullscreenElement && !document.webkitFullscreenElement){
      const el  = document.documentElement
      const req = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen
      if(req) req.call(el)
    } else {
      const ex = document.exitFullscreen || document.webkitExitFullscreen || document.mozCancelFullScreen
      if(ex) ex.call(document)
    }
  }

  /* 브라우저 fs 버튼 텍스트 동기화 */
  function _onBrowserFsChange(){
    const isFs = !!(document.fullscreenElement || document.webkitFullscreenElement)
    const btn  = document.getElementById("browserFsBtn")
    if(btn){
      const icon  = btn.querySelector(".sb-icon")
      const label = btn.querySelector(".sb-label")
      if(icon)  icon.textContent  = isFs ? "⊡" : "⛶"
      if(label) label.textContent = isFs ? "복원" : "전체"
      btn.style.background = isFs ? "var(--sub)" : "var(--accent)"
    }
    _adjustCornerPositions()
  }
  document.addEventListener("fullscreenchange",       _onBrowserFsChange)
  document.addEventListener("webkitfullscreenchange", _onBrowserFsChange)

  /* ── 해제 버튼 위치 겹침 방지 ──
     탭 해제 버튼(fsHotCorner)과 브라우저fs 버튼(browserFsBtn)이
     동시에 우상단에 생길 때 세로로 쌓이도록 조정 */
  function _adjustCornerPositions(){
    const tabCorner = document.getElementById("fsHotCorner")
    const bfsBtn    = document.getElementById("browserFsBtn")
    if(!tabCorner || !bfsBtn) return

    const tabVisible = tabCorner.style.display === "flex"
    const bfsVisible = !!(document.fullscreenElement || document.webkitFullscreenElement)
      || bfsBtn.textContent.includes("복원")

    if(tabVisible){
      // 탭 해제 버튼: 우상단 0
      tabCorner.style.top   = "0"
      tabCorner.style.right = "0"
      // 브라우저fs 버튼은 그 아래
      bfsBtn.style.marginTop = "0"  // 상단바에 있으므로 별도 조정 불필요
    } else {
      tabCorner.style.top = "0"
    }
  }

  /* ESC: 탭 전체화면만 해제 */
  document.addEventListener("keydown", e=>{
    if(e.key === "Escape" && fsTabId) _exitTabFs()
  })

  /* ─────────────────────────────────────
     iframe 차단 자동 감지 → 새 탭으로
  ───────────────────────────────────── */
  window._iframeAutoOpen = function(id){
    const t = tabs[id]; if(!t) return
    window.open(t.url, "_blank")
    closeTab(id)
  }

  window.closeDock = ()=> switchToHomeTab()

})()
</script>

<!-- ══════════════════════════════════════
     패널 드래그 이동 + scale 비율 조절
     transform:scale — top-left 고정 확대/축소
══════════════════════════════════════ -->
<style>
.panel-resize-handle {
  position: absolute;
  bottom: 0; right: 0;
  width: 22px; height: 22px;
  cursor: nwse-resize;
  z-index: 10;
  display: flex; align-items: flex-end; justify-content: flex-end;
  padding: 4px;
  opacity: 0.30;
  transition: opacity 0.15s;
  touch-action: none;
  border-radius: 0 0 14px 0;
}
.panel-resize-handle:hover { opacity: 0.9; }
.panel-resize-handle svg { pointer-events: none; }
</style>

<script>
;(function setupPanelDragResize(){

  const PANEL_IDS  = ['pomoPanel', 'todoPanel', 'calPanel']
  const MIN_SCALE  = 0.5
  const MAX_SCALE  = 2.2
  const BASE_W     = 280   // 패널 기본 CSS 너비

  function getScale(panel){ return parseFloat(panel.dataset.scale || '1') }
  function applyScale(panel, s){
    s = Math.max(MIN_SCALE, Math.min(MAX_SCALE, s))
    panel.dataset.scale       = s
    panel.style.transform     = `scale(${s})`
    panel.style.transformOrigin = 'top left'
  }

  /* bottom/right → top/left (최초 1회) */
  function ensureTopLeft(panel){
    if(panel.dataset.dragged) return
    const rect = panel.getBoundingClientRect()   // 화면 실좌표
    panel.style.top    = rect.top  + 'px'
    panel.style.left   = rect.left + 'px'
    panel.style.bottom = 'auto'
    panel.style.right  = 'auto'
    panel.dataset.dragged = '1'
  }

  function pinchDist(t){ return Math.hypot(t[0].clientX-t[1].clientX, t[0].clientY-t[1].clientY) }

  PANEL_IDS.forEach(id => {
    const panel = document.getElementById(id)
    if(!panel) return
    panel.style.position       = 'fixed'
    panel.style.transformOrigin = 'top left'

    const header = panel.querySelector('div')
    if(!header) return
    header.style.cursor = 'grab'
    header.title = '드래그: 이동 | 더블클릭: 원위치'

    /* ── 리사이즈 핸들 ── */
    const rh = document.createElement('div')
    rh.className = 'panel-resize-handle'
    rh.title = '드래그: 크기 조절'
    rh.innerHTML = `<svg width="13" height="13" viewBox="0 0 13 13" fill="none">
      <path d="M12 1L1 12M12 5L5 12M12 9L9 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </svg>`
    panel.appendChild(rh)

    /* ══ 1. 헤더 드래그 — 이동 ══
       panel.style.left/top 은 CSS 좌표(pre-scale)
       transform-origin이 top-left 이므로 화면 left = CSS left  */
    let dragging = false, ox = 0, oy = 0

    header.addEventListener('pointerdown', e => {
      if(e.pointerType === 'touch' && !e.isPrimary) return
      if(e.target.closest('button, input, select, .panel-resize-handle')) return
      ensureTopLeft(panel)
      dragging = true
      header.setPointerCapture(e.pointerId)
      header.style.cursor = 'grabbing'
      // CSS left/top 기준 오프셋 (화면 좌표 - CSS 좌표가 같으므로 그대로)
      ox = e.clientX - parseFloat(panel.style.left)
      oy = e.clientY - parseFloat(panel.style.top)
    })
    header.addEventListener('pointermove', e => {
      if(!dragging) return
      const s   = getScale(panel)
      const visW = BASE_W * s                         // 화면상 패널 너비
      const visH = panel.offsetHeight * s             // 화면상 패널 높이
      let nx = Math.max(0, Math.min(window.innerWidth  - visW, e.clientX - ox))
      let ny = Math.max(0, Math.min(window.innerHeight - visH, e.clientY - oy))
      panel.style.left = nx + 'px'
      panel.style.top  = ny + 'px'
    })
    const stopDrag = () => { dragging = false; header.style.cursor = 'grab' }
    header.addEventListener('pointerup',     stopDrag)
    header.addEventListener('pointercancel', stopDrag)

    /* ══ 2. 핸들 드래그 — scale 변경 (PC)
       핸들은 패널 우하단에 있고, 화면상 핸들 위치 = CSS(left + BASE_W*s, top + H*s)
       드래그 delta(화면픽셀) / (BASE_W * scale) → 비율 변화
       → scale_new = scale_old * (BASE_W*scale_old + delta_screen) / (BASE_W*scale_old)
         = scale_old + delta_screen / BASE_W
    ══ */
    let resizing = false, rStartX = 0, rStartY = 0, rStartScale = 1

    rh.addEventListener('pointerdown', e => {
      if(e.pointerType === 'touch') return
      e.stopPropagation()
      ensureTopLeft(panel)
      resizing     = true
      rh.setPointerCapture(e.pointerId)
      rStartX      = e.clientX
      rStartY      = e.clientY
      rStartScale  = getScale(panel)
    })
    rh.addEventListener('pointermove', e => {
      if(!resizing) return
      // 대각선 드래그 → scale 변화
      // 기준: BASE_W px 드래그 = scale 1.0 변화
      const dx    = e.clientX - rStartX
      const dy    = e.clientY - rStartY
      const delta = (dx + dy) / 2 / (BASE_W * rStartScale)
      applyScale(panel, rStartScale + delta * rStartScale)
    })
    const stopResize = () => { resizing = false }
    rh.addEventListener('pointerup',     stopResize)
    rh.addEventListener('pointercancel', stopResize)

    /* ══ 3. 핀치 — scale 변경 (모바일) ══ */
    let pinching = false, pDist0 = 0, pScale0 = 1

    panel.addEventListener('touchstart', e => {
      if(e.touches.length !== 2) return
      e.preventDefault()
      ensureTopLeft(panel)
      pinching = true
      pDist0   = pinchDist(e.touches)
      pScale0  = getScale(panel)
    }, { passive: false })
    panel.addEventListener('touchmove', e => {
      if(!pinching || e.touches.length !== 2) return
      e.preventDefault()
      applyScale(panel, pScale0 * pinchDist(e.touches) / pDist0)
    }, { passive: false })
    panel.addEventListener('touchend',    () => { pinching = false })
    panel.addEventListener('touchcancel', () => { pinching = false })

    /* ══ 4. 더블클릭 — 원위치 복귀 ══ */
    header.addEventListener('dblclick', e => {
      if(e.target.closest('button, input, select')) return
      delete panel.dataset.dragged
      delete panel.dataset.scale
      panel.style.top       = ''
      panel.style.left      = ''
      panel.style.bottom    = ''
      panel.style.right     = ''
      panel.style.transform = ''
      adjustPanelPositions()
    })
  })

})()
</script>

<script>
/* ══════════════════════════════════════════
   전체 앱 동기화 — 4개 앱의 GitHub 경로 및
   localStorage 키를 직접 읽고 씀
══════════════════════════════════════════ */
const ALL_APPS = [
  {
    id:    'linkmanage',
    label: '🔗 Link Manager',
    ghPath: 'linkmanager.json',
    upload: async (token) => {
      // 전달받은 tok을 캐시에 주입 후 syncToGit 재활용 (재인증 방지)
      _tokenCache = token
      await syncToGit(true)
    },
    download: async (token) => {
      _tokenCache = token
      await syncFromGit()
    }
  },
  {
    id:    'practicecheck',
    label: '✅ Practice Check',
    ghPath: 'data/practicecheck.json',
    upload: async (token) => {
      const areas   = JSON.parse(localStorage.getItem('pc_areas')   || '[]')
      const repeats = JSON.parse(localStorage.getItem('pc_repeats') || '{}')
      const pack    = { areas, repeats }
      await _allSyncPut(token, 'data/practicecheck.json', JSON.stringify(pack, null, 2), 'backup')
    },
    download: async (token) => {
      const raw = await _allSyncGet(token, 'data/practicecheck.json')
      if (!raw) throw new Error('파일 없음')
      const pack = JSON.parse(raw)
      if (pack.areas)   localStorage.setItem('pc_areas',   JSON.stringify(pack.areas))
      if (pack.repeats) localStorage.setItem('pc_repeats', JSON.stringify(pack.repeats))
    }
  },
  {
    id:    'memorycard',
    label: '🃏 Memory Card',
    ghPath: 'data/memory_orange.json',
    upload: async (token) => {
      // collectAllCategoryData 형식을 localStorage에서 직접 재구성
      const CAT_KEY = 'MP_categories'
      const cats = JSON.parse(localStorage.getItem(CAT_KEY) || '["기본"]')
      const packData = {}
      cats.forEach(c => {
        packData[c] = {
          memoryPathState:    localStorage.getItem('memoryPathState_'    + c) || '{}',
          sessions:           localStorage.getItem('sessions_'           + c) || '{}',
          completedSessions:  localStorage.getItem('completedSessions_'  + c) || '{}'
        }
      })
      const pack = { categories: cats, data: packData, darkMode: localStorage.getItem('darkMode') || 'false' }
      await _allSyncPut(token, 'data/memory_orange.json', JSON.stringify(pack, null, 2), 'MemoryPath 백업')
    },
    download: async (token) => {
      const raw = await _allSyncGet(token, 'data/memory_orange.json')
      if (!raw) throw new Error('파일 없음')
      const pack = JSON.parse(raw)
      if (pack.categories) localStorage.setItem('MP_categories', JSON.stringify(pack.categories))
      if (pack.data) {
        Object.keys(pack.data).forEach(c => {
          const d = pack.data[c]
          if (d.memoryPathState)   localStorage.setItem('memoryPathState_'   + c, d.memoryPathState)
          if (d.sessions)          localStorage.setItem('sessions_'          + c, d.sessions)
          if (d.completedSessions) localStorage.setItem('completedSessions_' + c, d.completedSessions)
        })
      }
    }
  },
  {
    id:    'schedule',
    label: '📅 Schedule',
    ghPath: 'schedule.json',
    upload: async (token) => {
      const raw = localStorage.getItem('scheduleData') || '{}'
      await _allSyncPut(token, 'schedule.json', raw, 'schedule sync')
    },
    download: async (token) => {
      const raw = await _allSyncGet(token, 'schedule.json')
      if (!raw) throw new Error('파일 없음')
      localStorage.setItem('scheduleData', raw)
    }
  },
  {
    id:    'studykit',
    label: '📚 StudyKit Extra',
    ghPath: 'studykit_extra.json',
    upload: async (token) => {
      const pack = {
        sk_routines: localStorage.getItem('sk_routines') || '[]',
        sk_routineChecks: localStorage.getItem('sk_routineChecks') || '{}'
      }
      await _allSyncPut(token, 'studykit_extra.json', JSON.stringify(pack, null, 2), 'studykit sync')
    },
    download: async (token) => {
      const raw = await _allSyncGet(token, 'studykit_extra.json')
      if (!raw) throw new Error('파일 없음')
      const pack = JSON.parse(raw)
      if (pack.sk_routines)      localStorage.setItem('sk_routines',      pack.sk_routines)
      if (pack.sk_routineChecks) localStorage.setItem('sk_routineChecks', pack.sk_routineChecks)
    }
  }
]

/* ── GitHub 공통 헬퍼 ── */
const _GH_BASE = `https://api.github.com/repos/${GITHUB.user}/${GITHUB.repo}/contents/`

async function _allSyncPut(token, path, jsonStr, message) {
  const content = b64EncodeUnicode(jsonStr)
  let sha = null
  const check = await fetch(_GH_BASE + path, { headers: { Authorization: `Bearer ${token}` } })
  if (check.ok) { const j = await check.json(); sha = j.sha }
  const res = await fetch(_GH_BASE + path, {
    method: 'PUT',
    headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ message, content, ...(sha ? { sha } : {}) })
  })
  if (!res.ok) throw new Error(`업로드 실패 (${res.status})`)
}

async function _allSyncGet(token, path) {
  const res = await fetch(_GH_BASE + path, { headers: { Authorization: `Bearer ${token}` } })
  if (!res.ok) return null
  const j = await res.json()
  return b64DecodeUnicode(j.content)
}

/* ── 상태 표시 ── */
function _allSyncSetStatus(id, icon, text, color) {
  const el = document.getElementById('asr-' + id)
  if (!el) return
  el.querySelector('.asr-icon').textContent = icon
  el.querySelector('.asr-text').textContent = text
  el.querySelector('.asr-text').style.color = color || 'var(--text2)'
}

function _allSyncLog(msg, ok) {
  const log = document.getElementById('allSyncLog')
  log.style.display = 'block'
  const line = document.createElement('div')
  line.style.color = ok ? 'var(--ok)' : (ok === false ? 'var(--no)' : 'var(--sub)')
  line.textContent = msg
  log.appendChild(line)
  log.scrollTop = log.scrollHeight
}

/* ── 모달 열기/닫기 ── */
function openAllSyncModal() {
  const modal = document.getElementById('allSyncModal')
  const list  = document.getElementById('allSyncList')
  const log   = document.getElementById('allSyncLog')
  log.innerHTML = ''; log.style.display = 'none'

  list.innerHTML = ALL_APPS.map(a => `
    <div id="asr-${a.id}" style="display:flex;align-items:center;gap:10px;
      padding:10px 12px;background:var(--surface);border:1px solid var(--border);
      border-radius:10px;">
      <span style="font-size:15px;">${a.label.split(' ')[0]}</span>
      <div style="flex:1;">
        <div style="font-size:13px;font-weight:600;">${a.label.slice(a.label.indexOf(' ')+1)}</div>
        <div style="font-size:11px;color:var(--sub);margin-top:1px;">${a.ghPath}</div>
      </div>
      <span class="asr-icon" style="font-size:15px;">—</span>
      <span class="asr-text" style="font-size:11.5px;font-weight:600;min-width:48px;text-align:right;">대기</span>
    </div>`).join('')

  modal.style.display = 'flex'
}
function closeAllSyncModal() {
  document.getElementById('allSyncModal').style.display = 'none'
}

/* ── 전체 업로드 ── */
async function allSyncUpload() {
  const tok = await getToken()
  if(!tok) return
  const log = document.getElementById('allSyncLog')
  log.innerHTML = ''; log.style.display = 'block'

  for (const app of ALL_APPS) {
    _allSyncSetStatus(app.id, '⏳', '업로드 중...', 'var(--sub)')
    _allSyncLog(`[${app.label}] 업로드 중...`)
    try {
      await app.upload(tok)
      _allSyncSetStatus(app.id, '✅', '완료', 'var(--ok)')
      _allSyncLog(`[${app.label}] ✅ 완료`, true)
    } catch(e) {
      _allSyncSetStatus(app.id, '❌', '실패', 'var(--no)')
      _allSyncLog(`[${app.label}] ❌ ${e.message}`, false)
    }
  }
  _allSyncLog('─── 전체 업로드 완료 ───', null)
}

/* ── 전체 다운로드 ── */
async function allSyncDownload() {
  const tok = await getToken()
  if(!tok) return
  const log = document.getElementById('allSyncLog')
  log.innerHTML = ''; log.style.display = 'block'

  for (const app of ALL_APPS) {
    _allSyncSetStatus(app.id, '⏳', '다운로드 중...', 'var(--sub)')
    _allSyncLog(`[${app.label}] 다운로드 중...`)
    try {
      await app.download(tok)
      _allSyncSetStatus(app.id, '✅', '완료', 'var(--ok)')
      _allSyncLog(`[${app.label}] ✅ 완료`, true)
    } catch(e) {
      _allSyncSetStatus(app.id, '❌', '실패', 'var(--no)')
      _allSyncLog(`[${app.label}] ❌ ${e.message}`, false)
    }
  }
  _allSyncLog('─── 전체 다운로드 완료 ───', null)
}

/* ── 토큰 초기화 ── */
function allSyncResetToken() {
  if (!confirm('저장된 암호화 토큰을 삭제하시겠습니까?')) return
  localStorage.removeItem('GH_TOKEN_ENC')
  _tokenCache = ""
  _allSyncLog('🔑 토큰이 삭제되었습니다.', null)
  ALL_APPS.forEach(a => _allSyncSetStatus(a.id, '—', '대기', 'var(--sub)'))
}
</script>
</body>
</html>
